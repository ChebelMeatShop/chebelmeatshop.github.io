  var entries = ((STATE.cashRegister && STATE.cashRegister.entries) || []).slice()
    .sort(function (a, b) { return (b.date || "").localeCompare(a.date || ""); });

  var h = '<div class="overlay" onclick="if(event.target===this)closeOverlay()">';
  h += '<div class="sheet">';

  // Header
  h += '<div class="sheet-hd">';
  h += '<div><div class="sheet-title">Cash &amp; Bank</div>';
  h += '<div class="sheet-sub">Account ending 647</div></div>';
  h += '<button class="sheet-close" onclick="closeOverlay()">x</button>';
  h += '</div>';

  // Balance bar — always visible
  h += '<div style="background:var(--forest);padding:12px 16px;display:flex;gap:10px;flex-shrink:0">';
  h += '<div style="flex:1;background:rgba(255,255,255,0.10);border-radius:10px;padding:10px 12px">';
  h += '<div style="font-size:10px;color:var(--sage-light);font-family:var(--mono);letter-spacing:1px">BANK</div>';
  h += '<div style="font-size:18px;font-weight:700;color:#fff;font-family:var(--mono)">Rs ' + fmt(bal.bank) + '</div>';
  h += '</div>';
  h += '<div style="flex:1;background:rgba(255,255,255,0.10);border-radius:10px;padding:10px 12px">';
  h += '<div style="font-size:10px;color:var(--sage-light);font-family:var(--mono);letter-spacing:1px">CASH IN HAND</div>';
  h += '<div style="font-size:18px;font-weight:700;color:#fff;font-family:var(--mono)">Rs ' + fmt(bal.cash) + '</div>';
  h += '</div></div>';

  // Tabs
  h += '<div style="display:flex;border-bottom:1px solid var(--rule);flex-shrink:0">';
  var tabs = [["register","Register"],["reconcile","Reconcile"],["settings","Settings"]];
  for (var ti = 0; ti < tabs.length; ti++) {
    var tk = tabs[ti][0], tl = tabs[ti][1];
    h += '<button style="flex:1;padding:11px 0;border:none;background:' + (tab===tk?"var(--white)":"var(--ivory)") + ';font-family:var(--sans);font-size:13px;font-weight:' + (tab===tk?"700":"400") + ';color:' + (tab===tk?"var(--forest)":"var(--mid)") + ';border-bottom:2px solid ' + (tab===tk?"var(--forest)":"transparent") + ';cursor:pointer" onclick="crSetTab(\'' + tk + '\')">' + tl + '</button>';
  }
  h += '</div>';

  h += '<div class="sheet-body">';

  // ── REGISTER TAB ──
  if (tab === "register") {

    // Entry form
    if (crForm) {
      h += '<div class="card" id="cr-entry-form" style="border:2px solid var(--forest);margin-bottom:12px">';
      h += '<div class="card-title">New Entry</div>';

      // Type selector
      h += '<div class="field"><label>Type</label><select onchange="crSetForm(\'type\',this.value)">';
      var groups = [
        ["Money In", ["cash_sales","juice_in","cheque_in","credit_payment","bank_transfer_in","other_in"]],
        ["Money Out", ["supplier_cash","supplier_bank","wages","overhead","drawings","other_out"]],
        ["Transfers", ["cash_to_bank","bank_to_cash"]]
      ];
      for (var gi = 0; gi < groups.length; gi++) {
        h += '<optgroup label="' + groups[gi][0] + '">';
        for (var oi = 0; oi < groups[gi][1].length; oi++) {
          var ot = groups[gi][1][oi];
          h += '<option value="' + ot + '" ' + (crForm.type === ot ? "selected" : "") + '>' + CR_TYPES[ot].label + '</option>';
        }
        h += '</optgroup>';
      }
      h += '</select></div>';

      h += '<div class="field"><label>Date</label><input type="date" value="' + esc(crForm.date) + '" onchange="crSetForm(\'date\',this.value)"></div>';
      h += '<div class="field"><label>Amount (Rs)</label><input type="number" inputmode="decimal" placeholder="0.00" value="' + esc(crForm.amount) + '" onchange="crSetForm(\'amount\',this.value)"></div>';

      // Supplier field for supplier payments
      if (crForm.type === "supplier_cash" || crForm.type === "supplier_bank") {
        h += '<div class="field"><label>Supplier</label><select onchange="crSetForm(\'supplier\',this.value)">';
        h += '<option value="">-- select --</option>';
        for (var sp = 0; sp < STATE.lists.suppliers.length; sp++) {
          h += '<option ' + (crForm.supplier === STATE.lists.suppliers[sp] ? "selected" : "") + '>' + esc(STATE.lists.suppliers[sp]) + '</option>';
        }
        h += '</select></div>';
        h += '<div class="field"><label>Invoice / Ref No.</label><input type="text" placeholder="e.g. LN-2025-441" value="' + esc(crForm.ref) + '" oninput="crSetForm(\'ref\',this.value)"></div>';
      }

      h += '<div class="field"><label>Description / Notes</label><input type="text" placeholder="Optional detail" value="' + esc(crForm.description) + '" oninput="crSetForm(\'description\',this.value)"></div>';

      h += '<div class="btn-row">';
      h += '<button class="btn btn-secondary btn-sm" onclick="STATE.crForm=null;rerender()">Cancel</button>';
      h += '<button class="btn btn-primary btn-sm" onclick="crSaveEntry()">Save</button>';
      h += '</div></div>';
    } else {
      h += '<button class="btn btn-primary" style="margin-bottom:14px" onclick="crOpenForm()">+ New Entry</button>';
    }

    // Entry list grouped by date
    if (entries.length === 0) {
      h += '<div class="empty">No entries yet. Tap + New Entry to start.</div>';
    } else {
      var lastDate = null;
      for (var ei = 0; ei < entries.length; ei++) {
        var e = entries[ei];
        var eType = CR_TYPES[e.type] || { label: e.type, dir: "in", account: "cash" };
        var eAmt = parseFloat(e.amount) || 0;
        var isOut = eType.dir === "out";
        var isTransfer = eType.dir === "transfer";

        if (e.date !== lastDate) {
          if (lastDate !== null) h += '</div>';
          h += '<div style="font-size:11px;font-family:var(--mono);color:var(--mid);letter-spacing:1px;margin:12px 0 6px">' + shortDate(e.date) + '</div>';
          h += '<div style="display:flex;flex-direction:column;gap:4px">';
          lastDate = e.date;
        }

        h += '<div style="display:flex;align-items:center;gap:8px;background:var(--white);border-radius:9px;padding:9px 11px">';
        h += '<div style="flex:1">';
        h += '<div style="font-size:13px;font-weight:600;color:var(--ink)">' + esc(eType.label) + '</div>';
        var sub = [];
        if (e.supplier) sub.push(esc(e.supplier));
        if (e.ref) sub.push('<span style="font-family:var(--mono);font-size:10px">' + esc(e.ref) + '</span>');
        if (e.description) sub.push(esc(e.description));
        if (sub.length) h += '<div style="font-size:11px;color:var(--mid);margin-top:2px">' + sub.join(' · ') + '</div>';
        h += '</div>';
        var amtColor = isTransfer ? "#888" : isOut ? "#b91c1c" : "#16a34a";
        var amtPrefix = isTransfer ? "⇄ Rs " : isOut ? "– Rs " : "+ Rs ";
        h += '<div style="font-family:var(--mono);font-weight:700;color:' + amtColor + ';font-size:14px;white-space:nowrap">' + amtPrefix + fmt(eAmt) + '</div>';
        h += '<button style="background:none;border:none;color:var(--mid);font-size:11px;cursor:pointer;padding:4px" onclick="crDeleteEntry(\'' + e.id + '\')">✕</button>';
        h += '</div>';
      }
      if (entries.length > 0) h += '</div>';

      // Running totals summary
      var totalIn = 0, totalOut = 0;
      for (var si = 0; si < entries.length; si++) {
        var se = entries[si];
        var st = CR_TYPES[se.type] || { dir: "in" };
        if (st.dir === "in") totalIn += parseFloat(se.amount) || 0;
        else if (st.dir === "out") totalOut += parseFloat(se.amount) || 0;
      }
      h += '<div style="margin-top:14px;background:var(--ivory-warm);border-radius:10px;padding:12px 14px">';
      h += '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="color:var(--mid)">Total In</span><span style="color:#16a34a;font-weight:700">+ Rs ' + fmt(totalIn) + '</span></div>';
      h += '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="color:var(--mid)">Total Out</span><span style="color:#b91c1c;font-weight:700">– Rs ' + fmt(totalOut) + '</span></div>';
      h += '<div style="display:flex;justify-content:space-between;font-size:14px;border-top:1px solid var(--rule);padding-top:8px;margin-top:2px"><span style="font-weight:700">Net Movement</span><span style="font-weight:700;font-family:var(--mono)">Rs ' + fmt(totalIn - totalOut) + '</span></div>';
      h += '</div>';
    }
  }

  // ── RECONCILE TAB ──
  else if (tab === "reconcile") {
    var rec = buildCRReconciliation();

    h += '<div class="card" style="margin-bottom:12px">';
    h += '<div class="card-title">This Week vs Register</div>';
    h += '<div style="font-size:11px;color:var(--mid);margin-bottom:10px">Comparing weekly P&amp;L entries against cash register records for the current draft week.</div>';

    function recRow(label, expected, recorded) {
      var gap = expected - recorded;
      var gapColor = Math.abs(gap) < 0.01 ? "#16a34a" : "#b91c1c";
      var gapStr = Math.abs(gap) < 0.01 ? "✓ Match" : (gap > 0 ? "– Rs " + fmt(gap) + " unrecorded" : "+ Rs " + fmt(Math.abs(gap)) + " excess");
      return '<tr style="border-bottom:1px solid var(--rule)">' +
        '<td style="padding:7px 0;font-size:13px">' + label + '</td>' +
        '<td style="text-align:right;font-size:13px;font-weight:600">Rs ' + fmt(expected) + '</td>' +
        '<td style="text-align:right;font-size:13px;font-weight:600">Rs ' + fmt(recorded) + '</td>' +
        '<td style="text-align:right;font-size:11px;color:' + gapColor + ';font-weight:700">' + gapStr + '</td>' +
        '</tr>';
    }

    h += '<table style="width:100%;border-collapse:collapse">';
    h += '<thead><tr style="font-size:10px;color:var(--mid);font-family:var(--mono)">';
    h += '<th style="text-align:left;padding-bottom:6px">Source</th>';
    h += '<th style="text-align:right;padding-bottom:6px">P&amp;L</th>';
    h += '<th style="text-align:right;padding-bottom:6px">Recorded</th>';
    h += '<th style="text-align:right;padding-bottom:6px">Gap</th>';
    h += '</tr></thead><tbody>';
    h += recRow("Cash Sales", rec.expectedCash, rec.recordedCash);
    h += recRow("Juice / Mobile", rec.expectedJuice, rec.recordedJuice);
    h += recRow("Cheque", rec.expectedCheque, rec.recordedCheque);
    h += '</tbody></table></div>';

    // Profit disposition
    h += '<div class="card" style="margin-bottom:12px">';
    h += '<div class="card-title">Where Did the Profit Go?</div>';
    h += '<div style="background:var(--forest);border-radius:10px;padding:12px 14px;margin-bottom:10px">';
    h += '<div style="font-size:10px;color:var(--sage-light);font-family:var(--mono);letter-spacing:1px">GROSS PROFIT THIS WEEK</div>';
    h += '<div style="font-size:22px;font-weight:700;color:#fff;font-family:var(--mono)">Rs ' + fmt(rec.grossProfit) + '</div>';
    h += '</div>';
    h += '<div style="font-size:13px;color:var(--mid);margin-bottom:8px">Payments recorded this week:</div>';
    // List out payments from register in current week
    var weekEntries = (STATE.cashRegister && STATE.cashRegister.entries || []).filter(function(e) {
      var ws = STATE.data.weekStart, we = STATE.data.weekEnd;
      if (!ws || !we) return false;
      return e.date >= ws && e.date <= we;
    });
    var byType = {};
    weekEntries.forEach(function(e) {
      var t = CR_TYPES[e.type] || { dir: "in", label: e.type };
      if (t.dir === "out") {
        if (!byType[t.label]) byType[t.label] = 0;
        byType[t.label] += parseFloat(e.amount) || 0;
      }
    });
    var outKeys = Object.keys(byType);
    var totalOut2 = 0;
    if (outKeys.length === 0) {
      h += '<div style="color:var(--mid);font-size:12px;font-style:italic">No outgoing entries recorded for this week yet.</div>';
    } else {
      for (var oi2 = 0; oi2 < outKeys.length; oi2++) {
        totalOut2 += byType[outKeys[oi2]];
        h += '<div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--rule)">';
        h += '<span>' + esc(outKeys[oi2]) + '</span>';
        h += '<span style="color:#b91c1c;font-weight:600">– Rs ' + fmt(byType[outKeys[oi2]]) + '</span>';
        h += '</div>';
      }
      h += '<div style="display:flex;justify-content:space-between;font-size:13px;padding:8px 0;font-weight:700">';
      h += '<span>Net retained</span>';
      var retained = rec.grossProfit - totalOut2;
      h += '<span style="color:' + (retained >= 0 ? "#16a34a" : "#b91c1c") + ';font-family:var(--mono)">Rs ' + fmt(retained) + '</span>';
      h += '</div>';
    }
    h += '</div>';

    // Bank growth
    h += '<div class="card">';
    h += '<div class="card-title">Bank Account Growth</div>';
    h += '<div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--rule)">';
    h += '<span style="color:var(--mid)">Opening balance</span><span style="font-family:var(--mono)">Rs ' + fmt((STATE.cashRegister && STATE.cashRegister.bankOpening) || 1301006.14) + '</span></div>';
    h += '<div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--rule)">';
    h += '<span style="color:var(--mid)">Current bank balance</span><span style="font-family:var(--mono);font-weight:700">Rs ' + fmt(bal.bank) + '</span></div>';
    var growth = bal.bank - ((STATE.cashRegister && STATE.cashRegister.bankOpening) || 1301006.14);
    h += '<div style="display:flex;justify-content:space-between;font-size:14px;padding:8px 0;font-weight:700">';
    h += '<span>Growth since start</span><span style="font-family:var(--mono);color:' + (growth >= 0 ? "#16a34a" : "#b91c1c") + '">Rs ' + fmt(growth) + '</span></div>';
    h += '</div>';
  }

  // ── SETTINGS TAB ──
  else if (tab === "settings") {
    h += '<div class="card">';
    h += '<div class="card-title">Bank Opening Balance</div>';
    h += '<div style="font-size:12px;color:var(--mid);margin-bottom:10px">Set once to seed the bank balance. Updates immediately.</div>';
    h += '<div class="field"><label>Opening Balance (Rs)</label>';
    h += '<input type="number" inputmode="decimal" value="' + fmt((STATE.cashRegister && STATE.cashRegister.bankOpening) || 1301006.14).replace(/,/g,"") + '" onchange="crSetBankOpening(this.value)"></div>';
    h += '<div style="font-size:11px;color:var(--mid);margin-top:4px">Current: Rs ' + fmt((STATE.cashRegister && STATE.cashRegister.bankOpening) || 1301006.14) + ' (account ending 647)</div>';
    h += '</div>';
  }

  h += '<div style="height:20px"></div>';
  h += '</div></div></div></div>';
  return h;
}

function openCustomers() {
  STATE.overlay = "customers";
  STATE.selectedCustomerId = "";
  STATE.showCustomerEditor = false;
  STATE.showPaymentForm = false;
  rerender();
}
function setSelectedCustomer(id) {
  STATE.selectedCustomerId = id;
  STATE.customerTab = "invoice";
  STATE.showCustomerEditor = false;
  STATE.showPaymentForm = false;
  rerender();
}
function setCustomerTab(t) { STATE.customerTab = t; rerender(); }
function newCustomer() {
  STATE.customerEditorMode = "create";
  STATE.customerForm = { id:"", name:"", code:"", address:"", paymentTerms:7, hasStockHolding:false, stockType:"", openingBalance:0, notes:"" };
  STATE.showCustomerEditor = true;
  rerender();
}
function editCustomer(id) {
  var c = getCustomer(id);
  if (!c) return;
  STATE.customerEditorMode = "edit";
  STATE.customerForm = {
    id: c.id, name: c.name || "", code: c.code || "",
    address: c.address || "", paymentTerms: c.paymentTerms || 7,
    hasStockHolding: !!c.hasStockHolding, stockType: c.stockType || "",
    openingBalance: c.openingBalance || 0, notes: c.notes || ""
  };
  STATE.showCustomerEditor = true;
  rerender();
}
function setCust(k, v) {
  // Layout-changing fields need re-render (toggle button state, etc.)
  if (k === "hasStockHolding") {
    STATE.customerForm[k] = !!v;
    rerender();
    return;
  }
  // Plain text/number fields: just update state silently.
  // The <input> element already shows the typed character natively,
  // so a full re-render is wasteful and causes lag on mobile.
  STATE.customerForm[k] = v;
}
function cancelCust() {
  STATE.showCustomerEditor = false;
  rerender();
}
function saveCust() {
  var f = STATE.customerForm;
  if (!f.name || !f.code) {
    toast("Name and code are required", 2500, "err");
    return;
  }
  if (STATE.customerEditorMode === "create") {
    var newCust = {
      id: f.code.toLowerCase().replace(/[^a-z0-9]/g, "_"),
      name: f.name, code: f.code, address: f.address || "",
      paymentTerms: parseInt(f.paymentTerms, 10) || 7,
      hasStockHolding: !!f.hasStockHolding,
      stockType: f.hasStockHolding ? "dry-aged" : "",
      rollingNo: 1, currentYear: new Date().getFullYear(),
      openingBalance: parseFloat(f.openingBalance) || 0,
      notes: f.notes || ""
    };
    STATE.customers.push(newCust);
    toast("Customer added");
  } else {
    for (var i = 0; i < STATE.customers.length; i++) {
      if (STATE.customers[i].id === f.id) {
        STATE.customers[i].name = f.name;
        STATE.customers[i].code = f.code;
        STATE.customers[i].address = f.address;
        STATE.customers[i].paymentTerms = parseInt(f.paymentTerms, 10) || 7;
        STATE.customers[i].hasStockHolding = !!f.hasStockHolding;
        STATE.customers[i].openingBalance = parseFloat(f.openingBalance) || 0;
        STATE.customers[i].notes = f.notes;
        break;
      }
    }
    toast("Customer updated");
  }
  saveCustomers();
  STATE.showCustomerEditor = false;
  rerender();
}
function deleteCust() {
  var f = STATE.customerForm;
  if (f.id === "cowfish" || f.id === "azad") {
    toast("Cannot delete default customers", 2500, "err");
    return;
  }
  if (!confirm("Delete customer " + f.name + "?")) return;
  STATE.customers = STATE.customers.filter(function (c) { return c.id !== f.id; });
  saveCustomers();
  STATE.showCustomerEditor = false;
  STATE.selectedCustomerId = "";
  toast("Customer deleted");
  rerender();
}
function newPayment(customerId) {
  STATE.paymentForm = {
    customerId: customerId,
    date: new Date().toISOString().split("T")[0],
    amount: "", method: "Bank Transfer", reference: "", notes: ""
  };
  STATE.showPaymentForm = true;
  rerender();
}
function setPay(k, v) { STATE.paymentForm[k] = v; }
function cancelPay() { STATE.showPaymentForm = false; rerender(); }
function savePay() {
  var f = STATE.paymentForm;
  if (!f.customerId || !f.amount || !f.date) {
    toast("Date and amount required", 2500, "err");
    return;
  }
  STATE.payments.push({
    id: uid(),
    customerId: f.customerId,
    date: f.date,
    amount: parseFloat(f.amount).toFixed(2),
    method: f.method || "",
    reference: f.reference || "",
    notes: f.notes || ""
  });
  savePayments();
  STATE.showPaymentForm = false;
  toast("Payment recorded");
  rerender();
}
function removePayment(id) {
  if (!confirm("Delete this payment?")) return;
  STATE.payments = STATE.payments.filter(function (p) { return p.id !== id; });
  savePayments();
  toast("Payment removed");
  rerender();
}
function setCashFlow(k, v) {
  var weekKey = STATE.data.id || "current";
  if (!STATE.cashFlow[weekKey]) STATE.cashFlow[weekKey] = {};
  STATE.cashFlow[weekKey][k] = v;
  saveCashFlow();
  rerender();
}

// Edit an existing stock delivery. weekId is "" or null for current draft,
// otherwise the archived week's id.
function editStockDelivery(deliveryId, weekId) {
  var deliveries;
  if (weekId) {
    var wk = null;
    for (var i = 0; i < STATE.weeks.length; i++) {
      if (STATE.weeks[i].id === weekId) { wk = STATE.weeks[i]; break; }
    }
    deliveries = wk && wk.data ? wk.data.stockDeliveries : null;
  } else {
    deliveries = STATE.data.stockDeliveries;
  }
  if (!deliveries) return;
  for (var d = 0; d < deliveries.length; d++) {
    if (deliveries[d].id === deliveryId) {
      var sd = deliveries[d];
      STATE.stockDeliveryForm = {
        customerId: sd.customerId,
        product: sd.product,
        qty: sd.qty,
        date: sd.date,
        editingId: deliveryId,
        editingWeekId: weekId || null
      };
      STATE.showStockDeliveryForm = true;
      rerender();
      return;
    }
  }
}

// Delete a stock delivery from current draft or archived week
function deleteStockDelivery(deliveryId, weekId) {
  if (!confirm("Delete this delivery?")) return;
  if (weekId) {
    // From an archived week
    for (var i = 0; i < STATE.weeks.length; i++) {
      if (STATE.weeks[i].id === weekId) {
        var arr = STATE.weeks[i].data.stockDeliveries || [];
        STATE.weeks[i].data.stockDeliveries = arr.filter(function (sd) { return sd.id !== deliveryId; });
        saveWeeks();
        break;
      }
    }
  } else {
    STATE.data.stockDeliveries = (STATE.data.stockDeliveries || []).filter(function (sd) { return sd.id !== deliveryId; });
    autoSave();
  }
  toast("Delivery deleted");
  rerender();
}

function setSD(k, v) { STATE.stockDeliveryForm[k] = v; }
function cancelSD() {
  STATE.showStockDeliveryForm = false;
  STATE.stockDeliveryForm = { customerId:"", product:"", qty:"", date:"", editingId:null, editingWeekId:null };
  rerender();
}
function saveSD() {
  var f = STATE.stockDeliveryForm;
  if (!f.product || !f.qty || !f.date) {
    toast("Fill all fields", 2500, "err");
    return;
  }
  if (f.editingId) {
    // Update existing delivery (in current draft or archived week)
    var target = null;
    var arr;
    if (f.editingWeekId) {
      for (var i = 0; i < STATE.weeks.length; i++) {
        if (STATE.weeks[i].id === f.editingWeekId) {
          arr = STATE.weeks[i].data.stockDeliveries || [];
          for (var j = 0; j < arr.length; j++) {
            if (arr[j].id === f.editingId) {
              arr[j] = { id: f.editingId, customerId: f.customerId, product: normalizeCut(f.product), qty: parseFloat(f.qty).toFixed(3), date: f.date };
              target = "archived";
              break;
            }
          }
          break;
        }
      }
      if (target) saveWeeks();
    } else {
      arr = STATE.data.stockDeliveries || [];
      for (var k = 0; k < arr.length; k++) {
        if (arr[k].id === f.editingId) {
          arr[k] = { id: f.editingId, customerId: f.customerId, product: normalizeCut(f.product), qty: parseFloat(f.qty).toFixed(3), date: f.date };
          target = "current";
          break;
        }
      }
      if (target) autoSave();
    }
    toast(target ? "Delivery updated" : "Delivery not found");
  } else {
    if (!STATE.data.stockDeliveries) STATE.data.stockDeliveries = [];
    STATE.data.stockDeliveries.push({
      id: uid(),
      customerId: f.customerId,
      product: normalizeCut(f.product),
      qty: parseFloat(f.qty).toFixed(3),
      date: f.date
    });
    autoSave();
    toast("Delivery recorded");
  }
  STATE.showStockDeliveryForm = false;
  STATE.stockDeliveryForm = { customerId:"", product:"", qty:"", date:"", editingId:null, editingWeekId:null };
  rerender();
}

function renderStockDeliveryForm() {
  var f = STATE.stockDeliveryForm;
  var cust = getCustomer(f.customerId);
  var ledger = customerStockLedger(f.customerId);
  var availableCuts = Object.keys(ledger).filter(function (k) { return ledger[k].balance > 0; });

  var h = '<div class="card"><div class="card-title">Record Stock Delivery</div>';
  h += '<div style="font-size:13px;color:var(--mid);margin-top:-8px;margin-bottom:12px">' + esc(cust ? cust.name : "") + '</div>';

  if (availableCuts.length === 0) {
    h += '<div class="empty">No stock available to deliver</div>';
    h += '<div style="font-size:12px;color:var(--mid);margin-top:6px">Add credit sales marked "On Stock" to this customer first.</div>';
    h += '<button class="btn btn-secondary btn-sm" style="margin-top:12px;width:100%" onclick="cancelSD()">Back</button>';
    h += '</div>';
    return h;
  }

  h += '<div class="field"><label>Product / Cut</label><select onchange="setSD(\'product\',this.value)">';
  h += '<option value="">-- select --</option>';
  for (var i = 0; i < availableCuts.length; i++) {
    var cut = availableCuts[i];
    var bal = ledger[cut].balance;
    h += '<option value="' + esc(cut) + '" ' + (f.product === cut ? "selected" : "") + '>' + esc(cut) + ' (' + bal.toFixed(3) + ' kg available)</option>';
  }
  h += '</select></div>';

  h += '<div class="field"><label>Quantity Delivered (kg)</label>';
  h += '<input type="number" inputmode="decimal" step="0.001" placeholder="0.000" value="' + esc(f.qty) + '" oninput="setSD(\'qty\',this.value)">';
  if (f.product && ledger[f.product]) {
    h += '<div style="font-size:11px;color:var(--mid);margin-top:4px">Available: ' + ledger[f.product].balance.toFixed(3) + ' kg</div>';
  }
  h += '</div>';

  h += '<div class="field"><label>Date</label>';
  h += '<input type="date" value="' + esc(f.date) + '" onchange="setSD(\'date\',this.value)"></div>';

  h += '<div class="btn-row" style="margin-top:12px">';
  h += '<button class="btn btn-secondary btn-sm" style="width:100%" onclick="cancelSD()">Cancel</button>';
  h += '<button class="btn btn-primary btn-sm" style="width:100%" onclick="saveSD()">Save</button>';
  h += '</div></div>';
  return h;
}

// Customer invoice & report text builders
function buildInvoiceText(cust) {
  var d = STATE.data;
  var entries = (d.creditEntries || []).filter(function (e) { return e.customerId === cust.id; });
  var subtotal = sum(entries.map(function (e) { return e.amount; }));
  var invoiceNo = generateInvoiceNumber(cust.id, d.weekStart);
  var stmt = buildAccountStatement(cust, d, subtotal);
  var t = "";
  t += "CHEBEL MEAT SHOP\n";
  t += "Premium Fresh & Dry-Aged Beef Supplier\n";
  t += "BRN: C25227216 | Royal Road, Chebel | Tel: 4674122\n";
  t += repeat("=", 56) + "\n\n";
  t += "INVOICE " + invoiceNo + "\n";
  t += "Bill To: " + cust.name + "\n";
  if (cust.address) t += "         " + cust.address + "\n";
  t += "Period:  " + wkLbl(d.weekStart) + " - " + wkLbl(d.weekEnd) + "\n";
  t += "Date:    " + wkLbl(d.weekEnd || new Date().toISOString()) + "\n\n";
  t += repeat("-", 56) + "\n";
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    var stockMark = e.deliveryStatus === "on_stock" ? " (STOCK)" : "";
    t += shortDate(e.date || d.weekStart) + " " + e.product + stockMark;
    if (e.qty) t += " " + e.qty + " kg";
    if (e.rate) t += " @ Rs " + e.rate;
    t += " = Rs " + fmt(e.amount) + "\n";
  }
  t += repeat("-", 56) + "\n";
  t += "Subtotal: Rs " + fmt(subtotal) + "\n\n";
  t += "ACCOUNT STATEMENT\n";
  t += "Balance brought forward: Rs " + fmt(stmt.balanceBf) + "\n";
  for (var p = 0; p < stmt.payments.length; p++) {
    var pay = stmt.payments[p];
    t += "Less: Payment " + shortDate(pay.date) + " (" + pay.method + (pay.reference ? " - " + pay.reference : "") + "): (Rs " + fmt(pay.amount) + ")\n";
  }
  if (stmt.payments.length > 0) t += "Net balance b/f: Rs " + fmt(stmt.netBalanceBf) + "\n";
  t += "Current Invoice " + invoiceNo + ": Rs " + fmt(subtotal) + "\n";
  t += repeat("=", 56) + "\n";
  t += "TOTAL DUE: Rs " + fmt(stmt.totalDue) + "\n";
  t += repeat("=", 56) + "\n";
  t += "Payment due within " + (cust.paymentTerms || 7) + " days.\n";
  t += "DS BEEF LTD MCB Account: 000455039647 | BRN: C25227216\n";
  return t;
}

function buildAzadAccountText(cust) {
  var d = STATE.data;
  var beefEntries = (d.creditEntries || []).filter(function (e) { return e.customerId === cust.id; });
  var beefTotal = sum(beefEntries.map(function (e) { return e.amount; }));
  var chickenPurchases = (d.purchases || []).filter(function (p) {
    return p.supplier && p.supplier.toLowerCase().indexOf("azad") > -1;
  });
  var chickenTotal = sum(chickenPurchases.map(function (p) { return p.amount; }));
  var t = "";
  t += "AZAD ACCOUNT (" + wkLbl(d.weekStart) + " - " + wkLbl(d.weekEnd) + ")\n";
  t += repeat("=", 50) + "\n\n";
  t += "Date          Beef To Azad   Chicken From Azad\n";
  t += repeat("-", 50) + "\n";
  var dateMap = {};
  beefEntries.forEach(function (e) {
    var dt = e.date || d.weekStart || "";
    if (!dateMap[dt]) dateMap[dt] = { beef: 0, chicken: 0 };
    dateMap[dt].beef += parseFloat(e.amount) || 0;
  });
  chickenPurchases.forEach(function (p) {
    var dt = p.date || d.weekStart || "";
    if (!dateMap[dt]) dateMap[dt] = { beef: 0, chicken: 0 };
    dateMap[dt].chicken += parseFloat(p.amount) || 0;
  });
  var sortedDates = Object.keys(dateMap).sort();
  for (var di = 0; di < sortedDates.length; di++) {
    var dt = sortedDates[di];
    var dm = dateMap[dt];
    t += (dt ? shortDate(dt) : "-").padEnd(14, " ");
    t += (dm.beef > 0 ? ("Rs " + fmt(dm.beef)).padStart(13, " ") : "-".padStart(13, " "));
    t += "   ";
    t += (dm.chicken > 0 ? ("Rs " + fmt(dm.chicken)).padStart(13, " ") : "-".padStart(13, " ")) + "\n";
  }
  t += repeat("-", 50) + "\n";
  t += "TOTAL".padEnd(14, " ") + ("Rs " + fmt(beefTotal)).padStart(13, " ") + "   " + ("Rs " + fmt(chickenTotal)).padStart(13, " ") + "\n";
  t += "\n";
  var weekNet = beefTotal - chickenTotal;
  t += "Week Net: Rs " + fmt(Math.abs(weekNet)) + " " + (weekNet > 0 ? "(Azad owes you)" : weekNet < 0 ? "(You owe Azad)" : "(Settled)") + "\n";
  // Rolling balance using per-week nets
  var archivedNets = 0;
  for (var w = 0; w < STATE.weeks.length; w++) {
    var wd = STATE.weeks[w].data || {};
    var wBeef = 0, wChicken = 0;
    (wd.creditEntries || []).forEach(function (e) { if (e.customerId === cust.id) wBeef += parseFloat(e.amount) || 0; });
    (wd.purchases || []).forEach(function (p) { if (p.supplier && p.supplier.toLowerCase().indexOf("azad") > -1) wChicken += parseFloat(p.amount) || 0; });
    archivedNets += (wBeef - wChicken);
  }
  var paymentsTotal = 0;
  for (var pp = 0; pp < STATE.payments.length; pp++) {
    if (STATE.payments[pp].customerId === cust.id) paymentsTotal += parseFloat(STATE.payments[pp].amount) || 0;
  }
  var rolling = (parseFloat(cust.openingBalance) || 0) + archivedNets + weekNet - paymentsTotal;
  t += "Rolling Balance: Rs " + fmt(Math.abs(rolling)) + " " + (rolling > 0 ? "(Azad owes you)" : rolling < 0 ? "(You owe Azad)" : "(Settled)") + "\n";
  return t;
}

function setWeekDate(k, v) {
  STATE.data[k] = v;
  // When weekStart changes, reset activeDay and auto-fill weekEnd if empty
  if (k === "weekStart" && v) {
    try {
      var ws = new Date(v);
      var jsDay = ws.getDay();
      var jsToShort = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      STATE.activeDay = jsToShort[jsDay];
      // Auto-suggest weekEnd as +6 days from start if not already set
      if (!STATE.data.weekEnd) {
        var we = new Date(ws);
        we.setDate(we.getDate() + 6);
        STATE.data.weekEnd = we.toISOString().split("T")[0];
      }
    } catch (e) { /* keep current */ }
  }
  autoSave();
  rerender();

    setTimeout(function () {
      STATE.copyOk = false;
      STATE.monthCopyOk = false;

    }, 3000);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(function () { fallbackCopy(text, done); });
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, cb) {
  try {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    ta.style.top = "0";
    ta.style.left = "0";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    if (cb) cb();
  } catch (e) {
    toast("Copy failed - select text manually", 3000, "err");
  }
}

// Archive & history
function archiveWeek() {
  var errs = validateWeek(STATE.data);
  if (errs.length > 0) {
    toast("Fix " + errs.length + " issue(s) before archiving", 3000, "err");
    return;
  }
  var d = STATE.data;
  var T = computeTotals(d);
  d.status = "archived";
  d.updated_at = new Date().toISOString();
  var record = {
    id: d.id,
    weekStart: d.weekStart,
    weekEnd: d.weekEnd,
    savedAt: new Date().toISOString(),
    revenue: T.totalRevenue,
    cos: T.realCOS,
    profit: T.grossProfit,
    data: JSON.parse(JSON.stringify(d))
  };
  STATE.weeks = [record].concat(STATE.weeks).slice(0, 52);
  saveWeeks();

  // Carry closing stock of archived week as opening stock of new week
  var prevClosing = (d.closingStock || []).map(function (s) {
    var qty = parseFloat(s.qty) || 0;
    var rate = parseFloat(s.rate) || 0;
    var amount = s.amount || (qty * rate).toFixed(2);
    return { id: uid(), name: s.name, qty: s.qty, rate: s.rate, amount: amount, type: "opening" };
  });

  STATE.data = EMPTY_DATA();

  // Auto-suggest next week dates
  var lastEnd = new Date(d.weekEnd);
  if (!isNaN(lastEnd.getTime())) {
    var nextStart = new Date(lastEnd);
    nextStart.setDate(nextStart.getDate() + 1);
    var nextEnd = new Date(nextStart);
    nextEnd.setDate(nextEnd.getDate() + 6);
    STATE.data.weekStart = nextStart.toISOString().split("T")[0];
    STATE.data.weekEnd = nextEnd.toISOString().split("T")[0];
  }

  STATE.data.openingStock = prevClosing;
  STATE.step = 0;
  saveData();
  saveStep();
  toast("Week archived! Closing stock carried forward as opening stock.", 3500);
  rerender();
}
function loadWeek(id) {
  for (var i = 0; i < STATE.weeks.length; i++) {
    if (STATE.weeks[i].id === id) {
      // Warn if there's a current draft with data that would be overwritten
      var curr = STATE.data;
      var hasCurrentData = curr && (curr.weekStart || (curr.creditEntries && curr.creditEntries.length > 0) || (curr.purchases && curr.purchases.length > 0));
      if (hasCurrentData) {
        if (!confirm("Loading this week will replace your current draft. Continue?")) return;
      }
      // Load the archived data as the current draft for editing
      STATE.data = JSON.parse(JSON.stringify(STATE.weeks[i].data));
      STATE.data.status = "draft"; // reset to draft so it can be edited and re-archived
      // Remove the archived copy so re-archiving cleanly replaces it (no duplicate)
      STATE.weeks.splice(i, 1);
      saveWeeks();
      STATE.step = 7;
      STATE.overlay = null;
      saveData();
      saveStep();
      toast("Loaded " + wkLbl(STATE.data.weekStart) + " for editing. Re-archive when done.", 3500);
      rerender();
      return;
    }
  }
}
function deleteWeek(id) {
  if (!confirm("Delete this week?")) return;
  STATE.weeks = STATE.weeks.filter(function (w) { return w.id !== id; });
  saveWeeks();
  rerender();
}
function newWeek() {
  if (!confirm("Start a new week? Current draft will be cleared.")) return;

  // Carry closing stock from most recently archived week
  var prevClosing = [];
  if (STATE.weeks && STATE.weeks.length > 0) {
    var lastWeekData = STATE.weeks[0].data || {};
    prevClosing = (lastWeekData.closingStock || []).map(function (s) {
      var qty = parseFloat(s.qty) || 0;
      var rate = parseFloat(s.rate) || 0;
      var amount = s.amount || (qty * rate).toFixed(2);
      return { id: uid(), name: s.name, qty: s.qty, rate: s.rate, amount: amount, type: "opening" };
    });
  }

  STATE.data = EMPTY_DATA();

  // Auto-suggest next week dates
  if (STATE.weeks && STATE.weeks.length > 0) {
    var lastWeek = STATE.weeks[0];
    if (lastWeek && lastWeek.weekEnd) {
      var lastEnd = new Date(lastWeek.weekEnd);
      if (!isNaN(lastEnd.getTime())) {
        var nextStart = new Date(lastEnd);
        nextStart.setDate(nextStart.getDate() + 1);
        var nextEnd = new Date(nextStart);
        nextEnd.setDate(nextEnd.getDate() + 6);
        STATE.data.weekStart = nextStart.toISOString().split("T")[0];
        STATE.data.weekEnd = nextEnd.toISOString().split("T")[0];
      }
    }
  }

  STATE.data.openingStock = prevClosing;
  STATE.step = 1;
  saveData();
  saveStep();
  rerender();
}

// Monthly
function setMonth(m) {
  STATE.selectedMonth = m;
  STATE.showExpenseForm = false;
  STATE.monthCopyOk = false;
  rerender();
}
function showExpenseForm() {
  if (!STATE.expenseForm.date) {
    STATE.expenseForm.date = new Date().toISOString().split("T")[0];
  }
  STATE.showExpenseForm = true;
  rerender();
}
function cancelEF() {
  STATE.showExpenseForm = false;
  STATE.expenseForm = { category: "", description: "", amount: "", date: "" };
  rerender();
}
function setEF(k, v) { STATE.expenseForm[k] = v; }
function addExpense() {
  var f = STATE.expenseForm;
  if (!f.category || !f.amount) {
    toast("Category and amount required", 2500, "err");
    return;
  }
  var mk = STATE.selectedMonth;
  if (!STATE.monthlyExpenses[mk]) STATE.monthlyExpenses[mk] = [];
  STATE.monthlyExpenses[mk].push({
    id: uid(),
    category: f.category,
    description: f.description || "",
    amount: parseFloat(f.amount).toFixed(2),
    date: f.date || ""
  });
  saveMonthlyExpenses();
  STATE.expenseForm = { category: f.category, description: "", amount: "", date: f.date };
  STATE.showExpenseForm = false;
  toast("Expense added");
  rerender();
}
function removeExpense(id) {
  var mk = STATE.selectedMonth;
  if (!STATE.monthlyExpenses[mk]) return;
  STATE.monthlyExpenses[mk] = STATE.monthlyExpenses[mk].filter(function (e) { return e.id !== id; });
  saveMonthlyExpenses();
  rerender();
}

// ============================================================
// AUTO-SAVE & RERENDER
// ============================================================
var _saveTimer = null;
function autoSave() {
  STATE.dirty = true;
  if (_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(function () { saveData(); }, 800);
}

var _renderPending = false;
function rerender() {
  if (_renderPending) return;
  _renderPending = true;
  if (typeof requestAnimationFrame !== "undefined") {
    requestAnimationFrame(function () { _renderPending = false; render(); });
  } else {
    setTimeout(function () { _renderPending = false; render(); }, 16);
  }
}

  };
}

// ============================================================
// BOOT
// ============================================================
function boot() {
  var statusEl = document.getElementById("loadStatus");
  function setStatus(s) { try { if(statusEl) statusEl.textContent = s; } catch(e){} }
  try {
    setStatus("Loading state...");
    loadState();
    setStatus("Rendering...");
    render();
  } catch (e) {
    var app = document.getElementById("app");
    if (app) {
      app.innerHTML = '<div class="loading"><div style="color:#c0392b;font-family:monospace;font-size:12px;text-align:center;padding:20px;line-height:1.6">Boot failed:<br><b>' + (e.message || "Unknown error") + '</b><br><br>' + (e.stack ? '<div style="font-size:10px;color:#666;text-align:left;background:#f5f5f5;padding:8px;margin:8px 0;max-height:120px;overflow:auto">' + (e.stack || "").replace(/</g, "&lt;").substring(0, 500) + '</div>' : '') + '<button onclick="localStorage.clear();location.reload(true)" style="background:#1b3a2d;color:white;border:none;padding:12px 18px;border-radius:8px;font-weight:600">Reset and Reload</button></div></div>';
    }
  }
}

// Safety net: if boot doesn't replace the loading spinner within 1.5 seconds,
// surface a hard error with a reset button so the user is never stuck.
setTimeout(function () {
  try {
    var app = document.getElementById("app");
    if (app && app.innerHTML.indexOf("Loading") > -1) {
      app.innerHTML = '<div class="loading"><div style="color:#c0392b;font-family:monospace;font-size:13px;text-align:center;padding:24px;line-height:1.6">App stuck loading.<br>Old cache may be interfering.<br><br><button onclick="try{if(navigator.serviceWorker)navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.unregister();});});if(window.caches)caches.keys().then(function(ks){ks.forEach(function(k){caches.delete(k);});});localStorage.clear();sessionStorage.clear();}catch(e){}setTimeout(function(){location.reload(true);},500);" style="background:#1b3a2d;color:white;border:none;padding:12px 18px;border-radius:8px;font-weight:600;margin-bottom:8px">Clear Cache and Reload</button><br><button onclick="location.reload(true)" style="background:#e4ede4;color:#1a2a1e;border:none;padding:12px 18px;border-radius:8px;font-weight:600">Just Reload</button></div></div>';
    }
  } catch (e) { /* silent */ }
}, 2500);

// Try to boot RIGHT NOW (script runs at end of body so DOM is ready)
try { boot(); } catch(e) { /* will be caught by safety net */ }

// Also hook DOMContentLoaded as backup
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", boot);
}
