// PWA manifest registration (inline) - GitHub Pages compatible
(function(){
  try {
    var MANIFEST = {
      name: "Chebel Meat Shop",
      short_name: "Chebel Meat",
      start_url: "./",
      display: "standalone",
      background_color: "#f8f6f0",
      theme_color: "#1b3a2d",
      icons: [{
        src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%231b3a2d'/%3E%3Ctext y='.9em' font-size='72' x='50%25' text-anchor='middle'%3E%F0%9F%A5%A9%3C/text%3E%3C/svg%3E",
        sizes: "any",
        type: "image/svg+xml"
      }]
    };
    var manifestBlob = new Blob([JSON.stringify(MANIFEST)], {type:"application/json"});
    var manifestLink = document.createElement("link");
    manifestLink.rel = "manifest";
    manifestLink.href = URL.createObjectURL(manifestBlob);
    document.head.appendChild(manifestLink);
  } catch(e){ /* silent - manifest is non-essential, PWA still installable */ }
})();

// Service Worker registration (only when not on file://)
// NOTE: Safari blocks Blob-URL workers with SecurityError - this is expected
// and not a real problem. The app works fully without the SW; the SW is only
// used to cache Google Fonts for repeat offline visits. We swallow the error
// silently so it doesn't clutter the console on iPhone.
(function(){
  if(!("serviceWorker" in navigator)) return;
  if(location.protocol === "file:") return;
  // ALWAYS unregister any previously registered service workers and clear their
  // caches. This prevents an old/broken SW from serving stale HTML/JS on update.
  // Without this, iOS Safari can get stuck on a cached "Loading..." spinner.
  try {
    navigator.serviceWorker.getRegistrations().then(function(regs){
      for(var i=0;i<regs.length;i++){ regs[i].unregister(); }
    }).catch(function(){});
  } catch(e){}
  try {
    if(window.caches){
      caches.keys().then(function(keys){
        for(var k=0;k<keys.length;k++){ caches.delete(keys[k]); }
      }).catch(function(){});
    }
  } catch(e){}
  // Do NOT re-register a new service worker. Fonts will load from the network
  // each time, but that's a tiny price for guaranteed updates and zero cache
  // bugs. localStorage handles all the actual offline data persistence.
})();
</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }

:root {
  --forest: #1b3a2d;
  --forest-mid: #2a5c42;
  --sage: #4a8c6a;
  --sage-light: #8ab89a;
  --ivory: #f8f6f0;
  --ivory-warm: #eef5ee;
  --ivory-dark: #e4ede4;
  --rule: #b8ccb8;
  --ink: #0d1a10;
  --mid: #2d4a37;
  --mid-soft: #4a6b55;
  --white: #ffffff;
  --danger: #c0392b;
  --warn: #e67e22;
  --gold: #c89a2e;
  --info: #2980b9;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'DM Mono', 'Courier New', monospace;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html { height: 100%; overflow: hidden; }
body { font-family: var(--sans); background: var(--ivory); color: var(--ink); height: 100%; overflow: hidden; font-size: 16px; font-weight: 500; }

#app { max-width: 480px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; position: relative; padding-top: var(--safe-top); }

.progress-bar { height: 3px; background: var(--ivory-dark); flex-shrink: 0; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--forest), var(--sage)); transition: width 0.35s ease; }

.header { background: var(--forest); color: var(--white); padding: 10px 12px 8px; flex-shrink: 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 7px; }
.header-shop { font-family: var(--serif); font-size: 19px; font-weight: 900; letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; }
.header-step { font-family: var(--mono); font-size: 9px; color: var(--sage-light); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
.header-btns { display: flex; gap: 5px; flex-shrink: 0; }
.header-btns-row { display: flex; gap: 5px; justify-content: flex-end; }
.hbtn { background: rgba(255,255,255,0.12); border: none; border-radius: 8px; color: var(--white); min-width: 40px; height: 34px; padding: 0 8px; cursor: pointer; font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; position: relative; -webkit-user-select: none; user-select: none; }
.hbtn:active { background: rgba(255,255,255,0.28); }
.hbtn-dot { position: absolute; top: 3px; right: 3px; width: 7px; height: 7px; border-radius: 50%; border: 1.5px solid var(--forest); }
.dot-green { background: #6fd98a; }
.dot-amber { background: #f0c040; }
.dot-red { background: #e74c3c; }

.screen { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px 18px calc(90px + var(--safe-bottom)); display: flex; flex-direction: column; gap: 16px; }
.screen.anim { animation: fadeUp 0.22s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.nav { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 16px calc(12px + var(--safe-bottom)); background: var(--white); border-top: 1px solid var(--rule); display: flex; gap: 10px; }

.card { background: var(--white); border-radius: 14px; padding: 20px; border: 1px solid var(--rule); }
.card-title { font-family: var(--serif); font-size: 20px; font-weight: 700; color: var(--forest); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; letter-spacing: -0.2px; text-transform: none; }
.card-title-mono { font-family: var(--mono); font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--mid); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }

.s-hero { background: linear-gradient(135deg, var(--forest), var(--forest-mid)); border-radius: 12px; padding: 18px; color: var(--white); }
.s-icon { font-size: 26px; margin-bottom: 5px; }
.s-title { font-family: var(--serif); font-size: 20px; font-weight: 700; }
.s-desc { font-size: 12px; color: var(--sage-light); margin-top: 3px; line-height: 1.5; }

.w-hero { background: var(--forest); border-radius: 14px; padding: 28px 20px; color: var(--white); text-align: center; }
.w-title { font-family: var(--serif); font-size: 26px; font-weight: 900; line-height: 1.2; margin-bottom: 6px; }
.w-sub { font-size: 13px; color: var(--sage-light); line-height: 1.6; }

.step-pill { display: flex; align-items: center; gap: 10px; background: var(--ivory-warm); border: 1px solid var(--rule); border-radius: 9px; padding: 10px 13px; margin-bottom: 7px; }
.step-num { width: 24px; height: 24px; border-radius: 50%; background: var(--forest); color: var(--white); font-family: var(--mono); font-size: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

.resume-banner { background: linear-gradient(135deg, var(--forest), var(--forest-mid)); border-radius: 12px; padding: 16px; color: var(--white); }
.resume-title { font-family: var(--serif); font-size: 17px; font-weight: 700; margin-bottom: 2px; }
.resume-meta { font-family: var(--mono); font-size: 10px; color: var(--sage-light); letter-spacing: 1px; margin-bottom: 10px; }
.r2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
.field:last-child { margin-bottom: 0; }
.field label { font-family: var(--sans); font-size: 15px; font-weight: 700; letter-spacing: -0.1px; text-transform: none; color: var(--ink); }
.field label.mono { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--mid); font-weight: 400; }
.field input, .field select { width: 100%; padding: 15px 16px; border: 1.5px solid var(--rule); border-radius: 10px; font-family: var(--sans); font-size: 17px; color: var(--ink); background: var(--white); outline: none; -webkit-appearance: none; appearance: none; transition: border-color 0.18s; }
.field input:focus, .field select:focus { border-color: var(--sage); }
.field input[type=number] { font-family: var(--mono); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.day-tabs { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 14px; }
.day-tab { padding: 10px 0; border-radius: 8px; border: 1.5px solid var(--rule); font-family: var(--mono); font-size: 10px; font-weight: 600; text-align: center; cursor: pointer; background: var(--white); color: var(--mid); transition: all 0.12s; -webkit-user-select: none; user-select: none; }
.day-tab.active { background: var(--forest); color: var(--white); border-color: var(--forest); }
.day-tab.has-data { border-color: var(--sage); color: var(--sage); }
.day-tab.active.has-data { background: var(--forest); color: var(--white); border-color: var(--forest); }

.btn { width: 100%; padding: 16px; border-radius: 11px; border: none; cursor: pointer; font-family: var(--sans); font-size: 16px; font-weight: 600; transition: all 0.15s; -webkit-user-select: none; user-select: none; letter-spacing: -0.1px; }
.btn-primary { background: var(--forest); color: var(--white); }
.btn-primary:active, .btn-primary:disabled { opacity: 0.75; }
.btn-secondary { background: var(--ivory-dark); color: var(--ink); }
.btn-danger { background: #fdf0f0; color: var(--danger); border: 1px solid #f0c0c0; }
.btn-gold { background: var(--gold); color: var(--white); }
.btn-info { background: var(--info); color: var(--white); }
.btn-sm { padding: 10px 14px; font-size: 13px; width: auto; border-radius: 8px; }
.btn-add { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 11px; border-radius: 9px; border: 1.5px dashed var(--rule); background: transparent; cursor: pointer; font-size: 14px; color: var(--mid); width: 100%; font-family: var(--sans); -webkit-user-select: none; user-select: none; }
.btn-add:active { background: var(--ivory-warm); }
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.entry-row { display: flex; align-items: center; gap: 9px; background: var(--ivory-warm); border-radius: 9px; padding: 12px 13px; border: 1px solid var(--rule); margin-bottom: 7px; }
.entry-info { flex: 1; min-width: 0; }
.entry-name { font-size: 14px; font-weight: 700; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.entry-detail { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--ink); margin-top: 3px; opacity: 0.8; }
.entry-amount { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--forest); white-space: nowrap; }
.del-btn { background: none; border: none; cursor: pointer; color: #bbb; font-size: 20px; padding: 0 4px; line-height: 1; flex-shrink: 0; }
.del-btn:active { color: var(--danger); }
.edit-btn { background: none; border: none; cursor: pointer; color: var(--forest); font-family: var(--mono); font-size: 11px; font-weight: 700; padding: 4px 8px; line-height: 1; flex-shrink: 0; border: 1.5px solid var(--forest); border-radius: 6px; }
.edit-btn:active { background: var(--forest); color: var(--white); }

.chip { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 9px; font-family: var(--mono); margin-left: 4px; vertical-align: middle; }
.chip-beef { background: #fdf0ec; color: #8a3020; }
.chip-lamb { background: #f5f0fa; color: #5c3a8a; }
.chip-chicken { background: #fff8e7; color: #7a6010; }

.total-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: var(--forest); border-radius: 11px; color: var(--white); }
.total-label { font-family: var(--sans); font-size: 14px; font-weight: 600; }
.total-value { font-family: var(--mono); font-size: 16px; font-weight: 600; }

.form-panel { background: var(--ivory-warm); border-radius: 10px; padding: 14px; border: 1px solid var(--rule); margin-top: 9px; }
.auto-calc { font-family: var(--mono); font-size: 12px; color: var(--forest); margin-bottom: 8px; padding: 6px 9px; background: var(--ivory-dark); border-radius: 6px; }

.rev-block { background: var(--white); border-radius: 12px; overflow: hidden; border: 1px solid var(--rule); }
.rev-hd { background: var(--forest); color: var(--white); padding: 12px 16px; font-family: var(--sans); font-size: 14px; font-weight: 700; letter-spacing: -0.1px; text-transform: none; }
.rev-line { display: flex; justify-content: space-between; align-items: center; padding: 11px 16px; border-bottom: 1px solid var(--ivory-dark); font-size: 14px; color: var(--ink); }
.rev-line:last-child { border-bottom: none; }
.rev-line.sub { color: var(--ink); font-size: 14px; }
.rev-line.bold { font-weight: 700; }
.rev-line.total { background: var(--ivory-warm); font-weight: 700; font-family: var(--mono); font-size: 13px; color: var(--ink); }
.rev-line.grand { background: var(--forest); color: var(--white); font-weight: 700; font-family: var(--mono); font-size: 15px; }
.rev-line span:last-child { font-family: var(--mono); }

.output-box { background: #1a2a1e; color: #ffffff; border-radius: 10px; padding: 16px; font-family: var(--mono); font-size: 13px; font-weight: 500; line-height: 1.75; white-space: pre-wrap; word-break: break-word; max-height: 70vh; min-height: 400px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.copy-ok { color: var(--sage); font-family: var(--mono); font-size: 11px; text-align: center; padding: 5px; }

.val-panel { background: #fff5f5; border: 1px solid #e74c3c; border-radius: 10px; padding: 14px; }
.val-title { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--danger); margin-bottom: 8px; }
.val-item { display: flex; gap: 8px; align-items: flex-start; padding: 5px 0; border-bottom: 1px solid #fdd; font-size: 13px; }
.val-item:last-child { border-bottom: none; }
.val-icon { flex-shrink: 0; font-size: 15px; }

.toast { position: fixed; bottom: calc(80px + var(--safe-bottom) + 10px); left: 50%; transform: translateX(-50%); background: var(--forest); color: var(--white); padding: 9px 20px; border-radius: 22px; font-family: var(--mono); font-size: 11px; letter-spacing: 1px; z-index: 1000; pointer-events: none; opacity: 0; transition: opacity 0.25s; white-space: nowrap; max-width: 90vw; text-align: center; }
.toast.show { opacity: 1; }
.toast.warn-toast { background: var(--warn); }
.toast.err-toast { background: var(--danger); }

.backup-banner { background: linear-gradient(135deg, #b84a1e, #e67e22); border-radius: 12px; padding: 14px 16px; color: var(--white); display: flex; gap: 12px; align-items: flex-start; }
.backup-icon { font-size: 28px; flex-shrink: 0; }
.backup-title { font-weight: 700; font-size: 15px; margin-bottom: 3px; }
.backup-sub { font-size: 12px; opacity: 0.85; line-height: 1.5; }
.backup-dismiss { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 18px; cursor: pointer; padding: 0; margin-left: auto; flex-shrink: 0; }

.install-banner { background: linear-gradient(135deg, #1b3a2d, #2a5c42); border-radius: 12px; padding: 14px 16px; color: var(--white); display: flex; gap: 12px; align-items: flex-start; }
.install-dismiss { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 18px; cursor: pointer; margin-left: auto; flex-shrink: 0; }

.week-display { font-family: var(--serif); font-size: 15px; font-weight: 700; color: var(--forest); text-align: center; padding: 10px; background: var(--ivory-warm); border-radius: 9px; border: 1px solid var(--rule); margin-top: 9px; }

.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; }
.spinner { width: 34px; height: 34px; border: 3px solid var(--rule); border-top-color: var(--forest); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.badge { display: inline-flex; align-items: center; justify-content: center; min-width: 17px; height: 17px; padding: 0 5px; border-radius: 10px; background: var(--sage); color: white; font-size: 9px; font-family: var(--mono); }
.empty { text-align: center; padding: 16px; color: var(--mid); font-size: 13px; font-style: italic; }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; display: flex; align-items: flex-end; justify-content: center; }

/* Print preview overlay - replaces popup window approach for cleaner mobile UX */
.print-overlay { background: rgba(0,0,0,0.85); align-items: stretch; z-index: 700; }
.print-sheet { background: white; width: 100%; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; height: 100vh; }
.print-toolbar { background: var(--forest); color: var(--white); padding: 14px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; padding-top: max(14px, env(safe-area-inset-top)); }
.print-toolbar .print-title { flex: 1; font-family: var(--sans); font-size: 14px; font-weight: 600; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn-close-print { background: rgba(255,255,255,0.15); border: none; color: var(--white); padding: 9px 14px; border-radius: 8px; font-family: var(--sans); font-size: 14px; font-weight: 600; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
.btn-close-print:active { background: rgba(255,255,255,0.25); }
.btn-print-action { background: var(--gold); border: none; color: var(--white); padding: 9px 14px; border-radius: 8px; font-family: var(--sans); font-size: 14px; font-weight: 700; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
.btn-print-action:active { opacity: 0.85; }
.print-content { flex: 1; overflow-y: auto; padding: 20px 18px; background: white; -webkit-overflow-scrolling: touch; }
.print-bottombar { flex-shrink: 0; background: var(--forest); padding: 12px 14px; padding-bottom: max(12px, env(safe-area-inset-bottom)); display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
.btn-bb-back { flex: 1; background: rgba(255,255,255,0.18); border: none; color: var(--white); padding: 14px; border-radius: 10px; font-family: var(--sans); font-size: 15px; font-weight: 700; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.btn-bb-back:active { background: rgba(255,255,255,0.28); }
.btn-bb-print { flex: 1; background: var(--gold); border: none; color: var(--white); padding: 14px; border-radius: 10px; font-family: var(--sans); font-size: 15px; font-weight: 700; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.btn-bb-print:active { opacity: 0.85; }
/* Invoice/report tables inside print content */
.inv-table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 12px; font-family: Arial, sans-serif; }
.inv-table th { background: #1b3a2d; color: white; text-align: left; padding: 8px 9px; font-weight: 700; border: 1px solid #1b3a2d; }
.inv-table td { padding: 7px 9px; border: 1px solid #d4d4cb; color: #000; vertical-align: top; }
.inv-table tr:nth-child(even) td { background: #f8f6f0; }
.inv-table td.num, .inv-table th.num { text-align: right; font-variant-numeric: tabular-nums; }
.inv-table tr.total-row td { font-weight: 800; background: #e8efe9; border-top: 2px solid #1b3a2d; }
.inv-table tr.subtotal-row td { font-weight: 700; background: #f0f0e8; }
.inv-section-title { font-family: Georgia, serif; font-size: 15px; font-weight: 800; color: #1b3a2d; margin: 18px 0 4px; }
.inv-meta { font-family: Arial, sans-serif; font-size: 12px; color: #000; margin: 3px 0; }
.inv-meta strong { color: #1b3a2d; }
.inv-divider { border-top: 2px solid #1b3a2d; margin: 12px 0; }
/* When printing - hide everything except the print content */
@media print {
  body.printing #app { display: none !important; }
  body.printing .overlay.print-overlay { position: static !important; display: block !important; background: white !important; padding: 0 !important; }
  body.printing .print-sheet { height: auto !important; max-width: 100% !important; }
  body.printing .print-toolbar,
  body.printing .print-bottombar { display: none !important; }
  body.printing .print-content { padding: 0 !important; overflow: visible !important; }
  @page { margin: 15mm; }
}

/* Mini edit/delete buttons used inline in stock delivery list */
.mini-btn { background: none; border: 1px solid var(--forest); color: var(--forest); font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 5px; cursor: pointer; line-height: 1; -webkit-tap-highlight-color: transparent; }
.mini-btn:active { background: var(--forest); color: var(--white); }
.mini-btn-del { border-color: var(--danger); color: var(--danger); }
.mini-btn-del:active { background: var(--danger); color: var(--white); }
.sheet { background: var(--ivory); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; max-height: 90vh; display: flex; flex-direction: column; animation: slideUp 0.26s ease; padding-bottom: var(--safe-bottom); }

<body>
<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--mid)" id="loadStatus">Loading...</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";

// ============================================================
// CONSTANTS
// ============================================================
var SCHEMA_VERSION = 2;

var SK = {
  data: "chebel:data",
  lists: "chebel:lists",
  step: "chebel:step",
  weeks: "chebel:weeks",
  install: "chebel:install",
  reminder: "chebel:reminder_dismissed",
  monthlyExp: "chebel:monthly_expenses",
  expCats: "chebel:expense_categories",
  customers: "chebel:customers",
  payments: "chebel:payments",
  invoices: "chebel:invoices",
  cashFlow: "chebel:cash_flow",
  creditLedger: "chebel:credit_ledger",
  cashRegister: "chebel:cash_register",
  icloudEnabled: "chebel:icloud_enabled",
  icloudLastSync: "chebel:icloud_last_sync"
};

var DEFAULT_LISTS = {
  clients: ["Cowfish", "Carmagnole", "Azad", "Bolom Sinwa", "Daren", "Peint"],
  suppliers: ["SOCOVIA", "DADAI", "Living Nature", "Azad (Chicken)"],
  beefCuts: ["Carcass", "Fillet", "Sirloin", "Ribeye", "Mince Beef", "Short Ribs", "Rump", "Blade", "Trim", "Offals"],
  lambCuts: ["Rack", "Mince Lamb", "Leg", "Shoulder", "Chops"],
  chickenCuts: ["Whole Chicken", "Chicken Pieces", "Chicken Fillet"],
  stockItems: ["Boneless", "Bone-in", "Mince", "Fillet", "Ribeye"]
};

var DEFAULT_EXPENSE_CATEGORIES = [
  "Salary", "Consumables", "Electricity", "Water", "Permits",
  "Promotions / Adverts", "Maintenance", "Assets / Equipment",
  "Legal", "Accountant", "Consultants", "Services", "Personal", "Other"
];

// Default customer profiles - each has a fixed customer code that follows them year to year
// rolling_no increments per invoice issued; resets to 1 each new year
var DEFAULT_CUSTOMERS = [
  { id: "cowfish", name: "Cowfish (Mauritius) Ltd", code: "2601", address: "Montbello Mall",
    paymentTerms: 7, hasStockHolding: true, stockType: "dry-aged",
    rollingNo: 15, currentYear: 2026, openingBalance: 0, notes: "" },
  { id: "azad", name: "Azad Soreefan", code: "2602", address: "",
    paymentTerms: 7, hasStockHolding: false, stockType: "barter",
    rollingNo: 1, currentYear: 2026, openingBalance: 0, notes: "Barter: Beef from us, Chicken from him at cost" }
];

var PAYMENT_METHODS = ["Bank Transfer", "Juice (MCB)", "Cheque", "Cash"];

// Suppliers whose kg figures are the canonical beef weight denominator.
// Used in Meat Dashboard Mode A and Mode B cost-per-kg calculations.
var BEEF_WEIGHT_SUPPLIERS = ["socovia", "yusuf", "dadai", "living nature"];

var DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
var DAY_FULL = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
var STEPS = ["welcome", "week", "cash", "juice", "credit", "purchases", "stock", "review"];
var STEP_NAMES = ["Welcome", "Week", "Cash", "Juice", "Credit", "Purchases", "Stock", "Review"];

var LIST_TABS = [
  { key: "clients", label: "Clients", ph: "e.g. Hotel Meridien" },
  { key: "suppliers", label: "Suppliers", ph: "e.g. Quality Farms" },
  { key: "beefCuts", label: "Beef", ph: "e.g. Chuck" },
  { key: "lambCuts", label: "Lamb", ph: "e.g. Loin Chops" },
  { key: "chickenCuts", label: "Chicken", ph: "e.g. Wings" },
  { key: "stockItems", label: "Stock", ph: "e.g. Liver" }
];

function EMPTY_DATA() {
  var now = new Date().toISOString();
  return {
    id: uid(),
    business_id: "chebel_meat_shop",
    schema_version: SCHEMA_VERSION,
    created_at: now,
    updated_at: now,
    status: "draft",
    synced_to_supabase: false,
    weekStart: "",
    weekEnd: "",
    cash: { Mon: "", Tue: "", Wed: "", Thu: "", Fri: "", Sat: "", Sun: "" },
    juice: { Mon: "", Tue: "", Wed: "", Thu: "", Fri: "", Sat: "", Sun: "" },
    cheque: "",
    // Credit entries - now with customer linkage and delivery status:
    //   customerId: links to customer profile (cowfish, azad, etc) or null for walk-in credit
    //   deliveryStatus: "delivered" | "on_stock" - if on_stock, item is held for customer
    creditEntries: [],
    purchases: [],
    openingStock: [],
    closingStock: [],
    // Stock deliveries to customers who have dry-aged holdings
    // {id, customerId, product, qty, date, notes}
    stockDeliveries: [],
    notes: ""
  };
}

// ============================================================
// HELPERS
// ============================================================
var _id = Date.now();
function uid() { return "id" + (_id++); }

function fmt(n) {
  if (n === "" || n === null || n === undefined || isNaN(n)) return "0.00";
  return Number(n).toLocaleString("en-MU", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtNum(n) {
  if (n === "" || n === null || n === undefined || isNaN(n)) return 0;
  return Number(n);
}

function sum(arr) {
  if (!arr || !arr.length) return 0;
  var t = 0;
  for (var i = 0; i < arr.length; i++) {
    var v = parseFloat(arr[i]);
    if (!isNaN(v)) t += v;
  }
  return t;
}

function wkLbl(d) {
  if (!d) return "?";
  try {
    return new Date(d).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
  } catch (e) { return "?"; }
}

// Short date label "07 May" for inline display on entries
function shortDate(d) {
  if (!d) return "";
  try {
    return new Date(d).toLocaleDateString("en-GB", { day: "2-digit", month: "short" });
  } catch (e) { return ""; }
}

function esc(s) {
  if (s === null || s === undefined) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function auto(q, r) {
  if (!q || !r) return "";
  var p = parseFloat(q) * parseFloat(r);
  if (isNaN(p)) return "";
  return p.toFixed(2);
}

function lsGet(key) {
  try {
    var v = localStorage.getItem(key);
    return v ? JSON.parse(v) : null;
  } catch (e) {
    return null;
  }
}

function lsSet(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
    return true;
  } catch (e) {
    return false;
  }
}

function isToday(d) {
  try { return new Date(d).toDateString() === new Date().toDateString(); }
  catch (e) { return false; }
}

function isSunday() {
  return new Date().getDay() === 0;
}

function pad2(n) { return String(n).padStart(2, "0"); }

function currentMonthKey() {
  var d = new Date();
  return d.getFullYear() + "-" + pad2(d.getMonth() + 1);
}

function monthKey(dateStr) {
  if (!dateStr) return null;
  try {
    var d = new Date(dateStr);
    return d.getFullYear() + "-" + pad2(d.getMonth() + 1);
  } catch (e) { return null; }
}

function monthLabel(mk) {
  if (!mk) return "?";
  try {
    var parts = mk.split("-");
    var y = parseInt(parts[0], 10);
    var m = parseInt(parts[1], 10) - 1;
    return new Date(y, m, 1).toLocaleDateString("en-GB", { month: "long", year: "numeric" });
  } catch (e) { return "?"; }
}

// ============================================================
// COMPUTED TOTALS
// ============================================================
function computeTotals(d) {
  if (!d) d = STATE.data;
  var cashTotal = sum(Object.keys(d.cash || {}).map(function (k) { return d.cash[k]; }));
  var juiceTotal = sum(Object.keys(d.juice || {}).map(function (k) { return d.juice[k]; }));
  var chequeTotal = parseFloat(d.cheque) || 0;
  var creditTotal = sum((d.creditEntries || []).map(function (e) { return e.amount; }));
  var totalRevenue = cashTotal + juiceTotal + chequeTotal + creditTotal;
  var purchaseTotal = sum((d.purchases || []).map(function (p) { return p.amount; }));
  var openingTotal = sum((d.openingStock || []).map(function (s) { return s.amount; }));
  var closingTotal = sum((d.closingStock || []).map(function (s) { return s.amount; }));
  var realCOS = purchaseTotal + openingTotal - closingTotal;
  var grossProfit = totalRevenue - realCOS;
  var margin = totalRevenue > 0 ? ((grossProfit / totalRevenue) * 100).toFixed(1) : "0.0";
  return {
    cashTotal: cashTotal, juiceTotal: juiceTotal, chequeTotal: chequeTotal, creditTotal: creditTotal,
    totalRevenue: totalRevenue, purchaseTotal: purchaseTotal, openingTotal: openingTotal,
    closingTotal: closingTotal, realCOS: realCOS, grossProfit: grossProfit, margin: margin
  };
}

// ============================================================
// VALIDATION
// ============================================================
function validateWeek(d) {
  var errors = [];
  if (!d.weekStart || !d.weekEnd) {
    errors.push({ field: "dates", msg: "Week start and end dates are required" });
  }
  if (d.weekStart && d.weekEnd && new Date(d.weekStart) > new Date(d.weekEnd)) {
    errors.push({ field: "dates", msg: "Week end must be after week start" });
  }
  var T = computeTotals(d);
  var hasAnySale = T.cashTotal > 0 || T.juiceTotal > 0 || T.creditTotal > 0 || T.chequeTotal > 0;
  if (!hasAnySale) {
    errors.push({ field: "sales", msg: "At least one sale must be recorded (cash, juice, credit or cheque)" });
  }
  if ((d.purchases || []).length === 0) {
    errors.push({ field: "purchases", msg: "No purchases recorded - add at least one purchase / cost of sales entry" });
  }
  if (T.purchaseTotal > 0 && T.totalRevenue > 0 && (T.purchaseTotal / T.totalRevenue) > 0.95) {
    errors.push({ field: "margin", msg: "Purchases exceed 95% of revenue - verify figures before archiving" });
  }
  for (var i = 0; i < (d.creditEntries || []).length; i++) {
    var e = d.creditEntries[i];
    if (!e.client || !e.product || !e.amount) {
      errors.push({ field: "credit_" + i, msg: "Credit entry " + (i + 1) + ": missing client, product or amount" });
    }
  }
  for (var j = 0; j < (d.purchases || []).length; j++) {
    var p = d.purchases[j];
    if (!p.supplier || !p.description || !p.amount) {
      errors.push({ field: "purchase_" + j, msg: "Purchase entry " + (j + 1) + ": missing supplier, item or amount" });
    }
  }
  return errors;
}

// ============================================================
// ICLOUD AUTO-SYNC
// ============================================================
// Strategy: build a full JSON snapshot of all storage, then download it
// to the user's Files app (which iOS routes to iCloud Drive when enabled).
// We debounce so we don't spam the Files app on every keystroke.
// First-time setup requires user to tap "Enable iCloud Sync" so they
// understand the system will prompt for downloads.
var _icloudTimer = null;
function triggerICloudSync() {
  if (!STATE.icloudEnabled) return;
  if (_icloudTimer) clearTimeout(_icloudTimer);
  // Debounce: only sync 5 seconds after the last change
  _icloudTimer = setTimeout(function () { doICloudSync(false); }, 5000);
}

function doICloudSync(manualTrigger) {
  if (!STATE.icloudEnabled && !manualTrigger) return;
  try {
    var snapshot = {
      app: "Chebel Meat Shop",
      version: SCHEMA_VERSION,
      exported_at: new Date().toISOString(),
      data: {
        weeklyData: lsGet(SK.data),
        lists: lsGet(SK.lists),
        step: lsGet(SK.step),
        weeks: lsGet(SK.weeks),
        monthlyExpenses: lsGet(SK.monthlyExp),
        expenseCategories: lsGet(SK.expCats),
        customers: lsGet(SK.customers),
        payments: lsGet(SK.payments),
        invoices: lsGet(SK.invoices),
        cashFlow: lsGet(SK.cashFlow)
      }
    };
    var blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    var stamp = new Date().toISOString().replace(/[:.]/g, "-").substring(0, 19);
    a.download = "Chebel_Backup_" + stamp + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    STATE.icloudLastSync = new Date().toISOString();
    lsSet(SK.icloudLastSync, STATE.icloudLastSync);
    if (manualTrigger) toast("Backup saved - choose iCloud Drive in Files");
  } catch (e) {
    console.warn("iCloud sync failed:", e);
    if (manualTrigger) toast("Backup failed - check storage", 3000, "err");
  }
}

function toggleICloud() {
  if (STATE.icloudEnabled) {
    STATE.icloudEnabled = false;
    lsSet(SK.icloudEnabled, false);
    toast("iCloud auto-sync disabled");
  } else {
    STATE.icloudEnabled = true;
    lsSet(SK.icloudEnabled, true);
    toast("iCloud auto-sync enabled - syncs every save");
    doICloudSync(true);
  }
  rerender();
}

function restoreFromBackup(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function (ev) {
    try {
      var json = JSON.parse(ev.target.result);
      if (!json.data) throw new Error("Invalid backup file");
      if (!confirm("This will REPLACE all current data with the backup. Continue?")) return;
      if (json.data.weeklyData) lsSet(SK.data, json.data.weeklyData);
      if (json.data.lists) lsSet(SK.lists, json.data.lists);
      if (json.data.weeks) lsSet(SK.weeks, json.data.weeks);
      if (json.data.monthlyExpenses) lsSet(SK.monthlyExp, json.data.monthlyExpenses);
      if (json.data.expenseCategories) lsSet(SK.expCats, json.data.expenseCategories);
      if (json.data.customers) lsSet(SK.customers, json.data.customers);
      if (json.data.payments) lsSet(SK.payments, json.data.payments);
      if (json.data.invoices) lsSet(SK.invoices, json.data.invoices);
      if (json.data.cashFlow) lsSet(SK.cashFlow, json.data.cashFlow);
      toast("Backup restored! Reloading...");
      setTimeout(function () { location.reload(); }, 1500);
    } catch (e) {
      toast("Invalid backup file", 3000, "err");
    }
  };
  reader.readAsText(file);
}

// Get ISO week number for a date (1-53)
function isoWeekNumber(date) {
  try {
    var d = new Date(date);
    d.setHours(0, 0, 0, 0);
    d.setDate(d.getDate() + 4 - (d.getDay() || 7));
    var yearStart = new Date(d.getFullYear(), 0, 1);
    return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  } catch (e) { return 1; }
}

function getCustomer(id) {
  for (var i = 0; i < STATE.customers.length; i++) {
    if (STATE.customers[i].id === id) return STATE.customers[i];
  }
  return null;
}

// Calculate running balance for a customer across all time:
// opening + all credit sales - all payments = current balance owed by customer
function customerRunningBalance(customerId) {
  var cust = getCustomer(customerId);
  if (!cust) return 0;
  var total = parseFloat(cust.openingBalance) || 0;

  var isAzad = customerId === "azad";

  // Sum all archived weeks
  for (var i = 0; i < STATE.weeks.length; i++) {
    var wd = STATE.weeks[i].data || {};
    var beef = 0;
    (wd.creditEntries || []).forEach(function (e) {
      if (e.customerId === customerId) beef += parseFloat(e.amount) || 0;
    });
    if (isAzad) {
      var chicken = 0;
      (wd.purchases || []).forEach(function (p) {
        if (p.supplier && p.supplier.toLowerCase().indexOf("azad") > -1) chicken += parseFloat(p.amount) || 0;
      });
      total += (beef - chicken);
    } else {
      total += beef;
    }
  }

  // Current draft
  var draftBeef = 0;
  (STATE.data.creditEntries || []).forEach(function (e) {
    if (e.customerId === customerId) draftBeef += parseFloat(e.amount) || 0;
  });
  if (isAzad) {
    var draftChicken = 0;
    (STATE.data.purchases || []).forEach(function (p) {
      if (p.supplier && p.supplier.toLowerCase().indexOf("azad") > -1) draftChicken += parseFloat(p.amount) || 0;
    });
    total += (draftBeef - draftChicken);
  } else {
    total += draftBeef;
  }

  // Subtract payments
  for (var p = 0; p < STATE.payments.length; p++) {
    if (STATE.payments[p].customerId === customerId) {
      total -= parseFloat(STATE.payments[p].amount) || 0;
    }
  }
  return total;
}

// Get all credit entries for a customer in a specific week (by weekRecordId)
function customerEntriesInWeek(customerId, weekRecordId, weekData) {
  var d = weekData || STATE.data;
  return (d.creditEntries || []).filter(function (e) { return e.customerId === customerId; });
}

// All payments for a customer, optionally filtered by date range
function customerPayments(customerId, startDate, endDate) {
  return STATE.payments.filter(function (p) {
    if (p.customerId !== customerId) return false;
    if (startDate && new Date(p.date) < new Date(startDate)) return false;
    if (endDate && new Date(p.date) > new Date(endDate)) return false;
    return true;
  });
}

// Build the full dry-aged stock ledger for a customer:
// Aggregates all "on_stock" credit entries (additions) and all "delivery"
// records (deductions) per cut to give current balance per item.
// Normalizes cut names (trim + title-case) so "Ribeye", "ribeye", " Ribeye "
// all match the same item.
function normalizeCut(s) {
  if (!s) return "";
  s = String(s).trim();
  if (!s) return "";
  // Title-case: first letter upper, rest as typed
  return s.charAt(0).toUpperCase() + s.slice(1);
}
function customerStockLedger(customerId) {
  var ledger = {}; // {normalizedCutName: {opening, additions:[], deliveries:[], balance, rate}}
  function ensure(cut) {
    var key = normalizeCut(cut);
    if (!ledger[key]) ledger[key] = { name: key, opening: 0, additions: [], deliveries: [], balance: 0, rate: 0 };
    return ledger[key];
  }
  // Walk all weeks chronologically (oldest first) then current draft
  var allWeeks = STATE.weeks.slice().reverse().concat([{ id: STATE.data.id, data: STATE.data, weekStart: STATE.data.weekStart }]);
  for (var w = 0; w < allWeeks.length; w++) {
    var wk = allWeeks[w];
    var d = wk.data;
    if (!d) continue;
    var invoiceLabel = wk.invoiceNo || "";
    (d.creditEntries || []).forEach(function (e) {
      if (e.customerId !== customerId) return;
      if (e.deliveryStatus === "on_stock") {
        var l = ensure(e.product);
        var qty = parseFloat(e.qty) || 0;
        l.additions.push({ qty: qty, invoiceNo: invoiceLabel || wk.id, date: e.date || d.weekStart });
        l.balance += qty;
        if (e.rate) l.rate = parseFloat(e.rate);
      }
    });
    // Stock deliveries are tracked separately (when customer takes from held stock)
    (d.stockDeliveries || []).forEach(function (sd) {
      if (sd.customerId !== customerId) return;
      var l = ensure(sd.product);
      var qty = parseFloat(sd.qty) || 0;
      // Include id and weekId so the UI can find this delivery for edit/delete.
      // weekId is null for the current draft, otherwise the archived week's id.
      l.deliveries.push({ id: sd.id, weekId: wk.id !== STATE.data.id ? wk.id : null, qty: qty, date: sd.date });
      l.balance -= qty;
    });
  }
  return ledger;
}

// Generate invoice number for a customer for the current week
function generateInvoiceNumber(customerId, weekStart) {
  var cust = getCustomer(customerId);
  if (!cust) return "";
  var year = weekStart ? new Date(weekStart).getFullYear() : new Date().getFullYear();
  var weekNo = weekStart ? isoWeekNumber(weekStart) : isoWeekNumber(new Date());
  return cust.code + "-" + String(weekNo).padStart(2, "0");
}

// ============================================================
// MONTHLY AGGREGATION
// ============================================================
function weeksInMonth(mk) {
  if (!mk) return [];
  return STATE.weeks.filter(function (w) {
    try {
      var start = new Date(w.weekStart);
      var end = new Date(w.weekEnd);
      var mid = new Date((start.getTime() + end.getTime()) / 2);
      var wkMonth = mid.getFullYear() + "-" + pad2(mid.getMonth() + 1);
      return wkMonth === mk;
    } catch (e) { return false; }
  });
}

function availableMonths() {
  var months = {};
  for (var i = 0; i < STATE.weeks.length; i++) {
    var w = STATE.weeks[i];
    try {
      var start = new Date(w.weekStart);
      var end = new Date(w.weekEnd);
      var mid = new Date((start.getTime() + end.getTime()) / 2);
      months[mid.getFullYear() + "-" + pad2(mid.getMonth() + 1)] = true;
    } catch (e) { /* skip */ }
  }
  for (var mk in STATE.monthlyExpenses) {
    if (STATE.monthlyExpenses[mk] && STATE.monthlyExpenses[mk].length > 0) {
      months[mk] = true;
    }
  }
  months[currentMonthKey()] = true;
  return Object.keys(months).sort().reverse();
}

function computeMonthly(mk) {
  var weeks = weeksInMonth(mk);
  var expenses = STATE.monthlyExpenses[mk] || [];

  var cashTotal = 0, juiceTotal = 0, chequeTotal = 0, creditTotal = 0;
  var purchaseTotal = 0, openingTotal = 0, closingTotal = 0;
  var totalKgSold = 0, totalKgPurchased = 0;
  var totalOwed = 0; // running tally of offals owed
  var clientMap = {}, supplierMap = {};
  var categoryMap = { beef: 0, lamb: 0, chicken: 0 };

  for (var i = 0; i < weeks.length; i++) {
    var d = weeks[i].data;
    if (!d) continue;
    cashTotal += sum(Object.keys(d.cash || {}).map(function (k) { return d.cash[k]; }));
    juiceTotal += sum(Object.keys(d.juice || {}).map(function (k) { return d.juice[k]; }));
    chequeTotal += parseFloat(d.cheque) || 0;

    for (var j = 0; j < (d.creditEntries || []).length; j++) {
      var e = d.creditEntries[j];
      var amt = parseFloat(e.amount) || 0;
      creditTotal += amt;
      clientMap[e.client] = (clientMap[e.client] || 0) + amt;
      if (categoryMap.hasOwnProperty(e.category)) categoryMap[e.category] += amt;
      totalKgSold += parseFloat(e.qty) || 0;
    }
    for (var k = 0; k < (d.purchases || []).length; k++) {
      var p = d.purchases[k];
      var pAmt = parseFloat(p.amount) || 0;
      var pKg = parseFloat(p.qty) || 0;
      var isOwed = pAmt < 0 || p.isOwed === true;
      purchaseTotal += pAmt; // negatives subtract naturally
      if (isOwed) totalOwed += Math.abs(pAmt);
      if (!isOwed) totalKgPurchased += pKg; // don't count missing offals in kg purchased
      if (!supplierMap[p.supplier]) supplierMap[p.supplier] = { total: 0, kg: 0, count: 0, owed: 0 };
      supplierMap[p.supplier].total += pAmt;
      if (!isOwed) {
        supplierMap[p.supplier].kg += pKg;
        supplierMap[p.supplier].count += 1;
      } else {
        supplierMap[p.supplier].owed += Math.abs(pAmt);
      }
    }
  }

  if (weeks.length > 0) {
    var sorted = weeks.slice().sort(function (a, b) {
      return new Date(a.weekStart) - new Date(b.weekStart);
    });
    openingTotal = sum((sorted[0].data.openingStock || []).map(function (s) { return s.amount; }));
    closingTotal = sum((sorted[sorted.length - 1].data.closingStock || []).map(function (s) { return s.amount; }));
  }

  var totalRevenue = cashTotal + juiceTotal + chequeTotal + creditTotal;
  var realCOS = purchaseTotal + openingTotal - closingTotal;
  var grossProfit = totalRevenue - realCOS;
  var margin = totalRevenue > 0 ? ((grossProfit / totalRevenue) * 100).toFixed(1) : "0.0";

  var expensesTotal = sum(expenses.map(function (e) { return e.amount; }));
  var expensesByCat = {};
  for (var x = 0; x < expenses.length; x++) {
    var ex = expenses[x];
    expensesByCat[ex.category] = (expensesByCat[ex.category] || 0) + (parseFloat(ex.amount) || 0);
  }
  var netProfit = grossProfit - expensesTotal;
  var netMargin = totalRevenue > 0 ? ((netProfit / totalRevenue) * 100).toFixed(1) : "0.0";

  var tradingDays = weeks.length * 7;
  var avgRevenuePerDay = tradingDays > 0 ? (totalRevenue / tradingDays) : 0;
  var profitPerKg = totalKgSold > 0 ? (grossProfit / totalKgSold) : 0;
  var costPerKg = totalKgPurchased > 0 ? (purchaseTotal / totalKgPurchased) : 0;

  var topClients = [];
  for (var c in clientMap) topClients.push([c, clientMap[c]]);
  topClients.sort(function (a, b) { return b[1] - a[1]; });

  var supplierList = [];
  for (var sName in supplierMap) {
    supplierList.push({
      name: sName, total: supplierMap[sName].total,
      kg: supplierMap[sName].kg, count: supplierMap[sName].count
    });
  }
  supplierList.sort(function (a, b) { return b.total - a.total; });

  return {
    weeks: weeks, expenses: expenses, weekCount: weeks.length,
    cashTotal: cashTotal, juiceTotal: juiceTotal, chequeTotal: chequeTotal, creditTotal: creditTotal,
    totalRevenue: totalRevenue, purchaseTotal: purchaseTotal, totalOwed: totalOwed,
    openingTotal: openingTotal, closingTotal: closingTotal, realCOS: realCOS,
    grossProfit: grossProfit, margin: margin,
    expensesTotal: expensesTotal, expensesByCat: expensesByCat,
    netProfit: netProfit, netMargin: netMargin,
    totalKgSold: totalKgSold, totalKgPurchased: totalKgPurchased,
    avgRevenuePerDay: avgRevenuePerDay, profitPerKg: profitPerKg, costPerKg: costPerKg,
    topClients: topClients, supplierList: supplierList, categoryMap: categoryMap
  };
}

// ============================================================
// TEXT BUILDERS
// ============================================================
function pad(s, n) { s = String(s); while (s.length < n) s = " " + s; return s; }
function repeat(s, n) { var out = ""; for (var i = 0; i < n; i++) out += s; return out; }

function buildReport(d) {
  var T = computeTotals(d);
  var t = "";
  t += "WEEK: " + wkLbl(d.weekStart) + " - " + wkLbl(d.weekEnd) + "\n";
  t += repeat("-", 48) + "\n\n";

  // Build the ordered list of day-keys and full names for THIS week
  // (so a Tuesday-start week reports Tue first, not Mon).
  var jsToShort = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  var jsToFull = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
  var weekDays = [];
  if (d.weekStart) {
    try {
      var startDate = new Date(d.weekStart);
      for (var wi = 0; wi < 7; wi++) {
        var dt = new Date(startDate);
        dt.setDate(startDate.getDate() + wi);
        weekDays.push({ key: jsToShort[dt.getDay()], full: jsToFull[dt.getDay()] });
      }
    } catch (e) {
      for (var wf = 0; wf < 7; wf++) weekDays.push({ key: DAYS[wf], full: DAY_FULL[wf] });
    }
  } else {
    for (var wd = 0; wd < 7; wd++) weekDays.push({ key: DAYS[wd], full: DAY_FULL[wd] });
  }

  t += "CASH SALES (DAILY)\n\n";
  for (var i = 0; i < weekDays.length; i++) {
    var ck = weekDays[i].key;
    if (d.cash[ck]) {
      t += weekDays[i].full + ": " + Number(d.cash[ck]).toLocaleString() + "\n";
    }
  }
  t += "\nTotal Cash: Rs " + fmt(T.cashTotal) + "\n\n";

  t += "JUICE SALES (DAILY)\n\n";
  for (var j = 0; j < weekDays.length; j++) {
    var jk = weekDays[j].key;
    if (d.juice[jk]) {
      t += weekDays[j].full + ": " + Number(d.juice[jk]).toLocaleString() + "\n";
    }
  }
  t += "\nTotal Juice: Rs " + fmt(T.juiceTotal) + "\n";
  if (d.cheque) t += "\nCHEQUE / BANK TRANSFER: Rs " + fmt(T.chequeTotal) + "\n";
  t += "\n";

  t += "CREDIT SALES (BY CUSTOMER)\n\n";
  // Group all credit entries by client name (case-insensitive trimmed)
  var byClient = {}; // {keyName: {displayName, entries:[]}}
  (d.creditEntries || []).forEach(function (e) {
    var nameRaw = (e.client || "Unknown").trim();
    var key = nameRaw.toLowerCase();
    if (!byClient[key]) byClient[key] = { name: nameRaw, entries: [] };
    byClient[key].entries.push(e);
  });
  // Sort customers alphabetically (case-insensitive)
  var clientKeys = Object.keys(byClient).sort();
  for (var ck = 0; ck < clientKeys.length; ck++) {
    var grp = byClient[clientKeys[ck]];
    t += grp.name + ":\n";
    // Sort this customer's entries chronologically
    grp.entries.sort(function (a, b) {
      return new Date(a.date || "") - new Date(b.date || "");
    });
    var subTotal = 0;
    for (var ee = 0; ee < grp.entries.length; ee++) {
      var en = grp.entries[ee];
      t += "  - ";
      if (en.date) t += shortDate(en.date) + "  ";
      t += en.product;
      if (en.deliveryStatus === "on_stock") t += " (STOCK)";
      if (en.qty) t += "  " + en.qty + " kg";
      if (en.rate) t += " @ Rs " + en.rate;
      t += " = Rs " + fmt(en.amount) + "\n";
      subTotal += parseFloat(en.amount) || 0;
    }
    t += "  Sub-total: Rs " + fmt(subTotal) + "\n\n";
  }
  t += "Total Credit Sales: Rs " + fmt(T.creditTotal) + "\n\n";

  t += repeat("-", 48) + "\n";
  t += "TOTAL SALES BREAKDOWN\n\n";
  var r = T.totalRevenue;
  t += "  Cash:    Rs " + pad(fmt(T.cashTotal), 12) + "  (" + (r > 0 ? ((T.cashTotal / r) * 100).toFixed(1) : "0.0") + "%)\n";
  t += "  Juice:   Rs " + pad(fmt(T.juiceTotal), 12) + "  (" + (r > 0 ? ((T.juiceTotal / r) * 100).toFixed(1) : "0.0") + "%)\n";
  t += "  Credit:  Rs " + pad(fmt(T.creditTotal), 12) + "  (" + (r > 0 ? ((T.creditTotal / r) * 100).toFixed(1) : "0.0") + "%)\n";
  if (T.chequeTotal > 0) {
    t += "  Cheque:  Rs " + pad(fmt(T.chequeTotal), 12) + "  (" + (r > 0 ? ((T.chequeTotal / r) * 100).toFixed(1) : "0.0") + "%)\n";
  }
  t += "  -------------------------\n";
  t += "  TOTAL:   Rs " + pad(fmt(r), 12) + "\n\n";

  t += repeat("-", 48) + "\n";
  t += "COST OF SALES - PURCHASES\n\n";
  var supplierNames = {};
  (d.purchases || []).forEach(function (p) { supplierNames[p.supplier] = true; });
  var grossPurchases = 0;
  var totalOwed = 0;
  for (var sn in supplierNames) {
    t += sn + ":\n";
    var rows = (d.purchases || []).filter(function (p) { return p.supplier === sn; });
    var supplierGross = 0, supplierOwed = 0;
    for (var rr = 0; rr < rows.length; rr++) {
      var pp = rows[rr];
      var pAmt = parseFloat(pp.amount) || 0;
      var isOwed = pAmt < 0 || pp.isOwed === true;
      t += "  - " + pp.description;
      if (pp.date) t += " [" + shortDate(pp.date) + "]";
      if (isOwed) t += " (OFFALS OWED)";
      if (pp.qty) t += "  " + pp.qty + " kg";
      if (pp.rate) t += "  @ Rs " + pp.rate;
      t += "  =  " + (isOwed ? "- Rs " : "Rs ") + fmt(Math.abs(pAmt)) + "\n";
      if (isOwed) supplierOwed += Math.abs(pAmt);
      else supplierGross += pAmt;
    }
    var supplierNet = supplierGross - supplierOwed;
    if (supplierOwed > 0) {
      t += "  Gross:    Rs " + fmt(supplierGross) + "\n";
      t += "  Owed:   - Rs " + fmt(supplierOwed) + "\n";
      t += "  Net:      Rs " + fmt(supplierNet) + "\n\n";
    } else {
      t += "  Sub-total: Rs " + fmt(supplierGross) + "\n\n";
    }
    grossPurchases += supplierGross;
    totalOwed += supplierOwed;
  }
  if (totalOwed > 0) {
    t += "Gross Purchases:          Rs " + fmt(grossPurchases) + "\n";
    t += "Total Offals Owed:      - Rs " + fmt(totalOwed) + "\n";
    t += "Net Purchases:            Rs " + fmt(T.purchaseTotal) + "\n\n";
  } else {
    t += "Total Purchases (Gross):  Rs " + fmt(T.purchaseTotal) + "\n\n";
  }

  t += repeat("-", 48) + "\n";
  t += "STOCK ADJUSTMENT\n\n";
  if ((d.openingStock || []).length > 0) {
    t += "Opening Stock:\n";
    for (var os = 0; os < d.openingStock.length; os++) {
      var sst = d.openingStock[os];
      t += "  - " + sst.name + ": " + sst.qty + " kg @ Rs " + sst.rate + " = Rs " + fmt(sst.amount) + "\n";
    }
    t += "  Total Opening: Rs " + fmt(T.openingTotal) + "\n\n";
  } else {
    t += "Opening Stock: Rs 0.00\n";
  }
  if ((d.closingStock || []).length > 0) {
    t += "Closing Stock:\n";
    for (var cs = 0; cs < d.closingStock.length; cs++) {
      var sct = d.closingStock[cs];
      t += "  - " + sct.name + ": " + sct.qty + " kg @ Rs " + sct.rate + " = Rs " + fmt(sct.amount) + "\n";
    }
    t += "  Total Closing: (Rs " + fmt(T.closingTotal) + ")\n\n";
  } else {
    t += "Closing Stock: Rs 0.00\n";
  }
  t += "Real Cost of Sales: Rs " + fmt(T.realCOS) + "\n\n";

  t += repeat("=", 48) + "\n";
  t += "PROFIT & LOSS\n\n";
  t += "  Total Revenue:       Rs " + fmt(T.totalRevenue) + "\n";
  t += "  Real COS:          - Rs " + fmt(T.realCOS) + "\n";
  t += "  -------------------------\n";
  t += "  GROSS PROFIT:        Rs " + fmt(T.grossProfit) + "\n";
  t += "  GP MARGIN:           " + T.margin + "%\n";
  t += repeat("=", 48) + "\n";
  return t;
}

// Beautiful infographic-style weekly report (HTML/tables)
// Uses big stat cards, color-coded sections, and clean tables
function buildReportHtml(d) {
  var T = computeTotals(d);
  var jsToShort = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  var jsToFull = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
  var weekDays = [];
  if (d.weekStart) {
    try {
      var startDate = new Date(d.weekStart);
      for (var wi = 0; wi < 7; wi++) {
        var dt = new Date(startDate);
        dt.setDate(startDate.getDate() + wi);
        weekDays.push({ key: jsToShort[dt.getDay()], full: jsToFull[dt.getDay()], date: dt });
      }
    } catch (e) {
      for (var wf = 0; wf < 7; wf++) weekDays.push({ key: DAYS[wf], full: DAY_FULL[wf] });
    }
  } else {
    for (var wd = 0; wd < 7; wd++) weekDays.push({ key: DAYS[wd], full: DAY_FULL[wd] });
  }

  var h = "";

  // Hero header with key totals
  h += '<div style="background:linear-gradient(135deg,#1b3a2d,#2a5c42);color:white;border-radius:14px;padding:18px 20px;margin-bottom:14px">';
  h += '<div style="font-family:Courier New,monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#a8c4ad">WEEKLY PERFORMANCE</div>';
  h += '<div style="font-family:Georgia,serif;font-size:22px;font-weight:900;margin:6px 0 3px">' + esc(wkLbl(d.weekStart)) + ' - ' + esc(wkLbl(d.weekEnd)) + '</div>';
  h += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px">';
  h += '<div style="background:rgba(255,255,255,0.10);padding:10px 12px;border-radius:8px"><div style="font-size:9px;letter-spacing:1.5px;color:#a8c4ad;text-transform:uppercase">Revenue</div><div style="font-size:16px;font-weight:800;font-family:Arial,sans-serif">Rs ' + esc(fmt(T.totalRevenue)) + '</div></div>';
  h += '<div style="background:rgba(255,255,255,0.10);padding:10px 12px;border-radius:8px"><div style="font-size:9px;letter-spacing:1.5px;color:#a8c4ad;text-transform:uppercase">Cost of Sales</div><div style="font-size:16px;font-weight:800;font-family:Arial,sans-serif">Rs ' + esc(fmt(T.realCOS)) + '</div></div>';
  h += '<div style="background:rgba(255,255,255,0.20);padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.15)"><div style="font-size:9px;letter-spacing:1.5px;color:#fff;text-transform:uppercase">Gross Profit</div><div style="font-size:18px;font-weight:900;font-family:Arial,sans-serif">Rs ' + esc(fmt(T.grossProfit)) + '</div></div>';
  h += '<div style="background:rgba(255,255,255,0.20);padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.15)"><div style="font-size:9px;letter-spacing:1.5px;color:#fff;text-transform:uppercase">Margin</div><div style="font-size:18px;font-weight:900;font-family:Arial,sans-serif">' + esc(T.margin) + '%</div></div>';
  h += '</div></div>';

  // Revenue channels
  h += '<div class="inv-section-title">Revenue Channels</div>';
  h += '<table class="inv-table">';
  h += '<thead><tr><th>Channel</th><th class="num">Amount (Rs)</th><th class="num" style="width:70px">%</th></tr></thead><tbody>';
  var r = T.totalRevenue;
  var channels = [["Cash", T.cashTotal], ["Juice (MCB)", T.juiceTotal], ["Credit", T.creditTotal]];
  if (T.chequeTotal > 0) channels.push(["Cheque/Bank Transfer", T.chequeTotal]);
  for (var ci = 0; ci < channels.length; ci++) {
    var ch = channels[ci];
    var pct = r > 0 ? ((ch[1] / r) * 100).toFixed(1) : "0.0";
    h += '<tr><td>' + esc(ch[0]) + '</td><td class="num">' + esc(fmt(ch[1])) + '</td><td class="num">' + pct + '%</td></tr>';
  }
  h += '<tr class="total-row"><td>TOTAL REVENUE</td><td class="num">' + esc(fmt(r)) + '</td><td class="num">100.0%</td></tr>';
  h += '</tbody></table>';

  // Daily breakdown - cash and juice combined
  var hasDailyData = false;
  for (var di = 0; di < weekDays.length; di++) {
    if (parseFloat(d.cash[weekDays[di].key]) > 0 || parseFloat(d.juice[weekDays[di].key]) > 0) {
      hasDailyData = true;
      break;
    }
  }
  if (hasDailyData) {
    h += '<div class="inv-section-title">Daily Cash &amp; Juice</div>';
    h += '<table class="inv-table">';
    h += '<thead><tr><th>Day</th><th class="num">Cash (Rs)</th><th class="num">Juice (Rs)</th><th class="num">Total (Rs)</th></tr></thead><tbody>';
    var totalRowCash = 0, totalRowJuice = 0;
    for (var dj = 0; dj < weekDays.length; dj++) {
      var dk = weekDays[dj].key;
      var cv = parseFloat(d.cash[dk]) || 0;
      var jv = parseFloat(d.juice[dk]) || 0;
      if (cv === 0 && jv === 0) continue;
      totalRowCash += cv; totalRowJuice += jv;
      h += '<tr><td>' + esc(weekDays[dj].full) + '</td>';
      h += '<td class="num">' + (cv > 0 ? esc(fmt(cv)) : '-') + '</td>';
      h += '<td class="num">' + (jv > 0 ? esc(fmt(jv)) : '-') + '</td>';
      h += '<td class="num">' + esc(fmt(cv + jv)) + '</td></tr>';
    }
    h += '<tr class="total-row"><td>TOTAL</td><td class="num">' + esc(fmt(totalRowCash)) + '</td><td class="num">' + esc(fmt(totalRowJuice)) + '</td><td class="num">' + esc(fmt(totalRowCash + totalRowJuice)) + '</td></tr>';
    h += '</tbody></table>';
  }

  // Credit sales - grouped by customer for easier reading
  if ((d.creditEntries || []).length > 0) {
    h += '<div class="inv-section-title">Credit Sales by Customer</div>';
    // Group entries by client name (case-insensitive)
    var byClient = {};
    (d.creditEntries || []).forEach(function (e) {
      var nameRaw = (e.client || "Unknown").trim();
      var key = nameRaw.toLowerCase();
      if (!byClient[key]) byClient[key] = { name: nameRaw, entries: [] };
      byClient[key].entries.push(e);
    });
    var clientKeys = Object.keys(byClient).sort();
    h += '<table class="inv-table">';
    h += '<thead><tr><th style="width:60px">Date</th><th>Item</th><th class="num" style="width:70px">Qty (kg)</th><th class="num" style="width:75px">Rate (Rs)</th><th class="num" style="width:90px">Amount (Rs)</th></tr></thead><tbody>';
    for (var cki = 0; cki < clientKeys.length; cki++) {
      var grp = byClient[clientKeys[cki]];
      grp.entries.sort(function (a, b) { return new Date(a.date || "") - new Date(b.date || ""); });
      var subTotal = 0;
      // Customer header row
      h += '<tr><td colspan="5" style="background:#1b3a2d;color:white;font-weight:800;padding:9px 10px;font-family:Georgia,serif;font-size:13px">' + esc(grp.name) + '</td></tr>';
      for (var ee = 0; ee < grp.entries.length; ee++) {
        var en = grp.entries[ee];
        var stockBadge = en.deliveryStatus === "on_stock" ? ' <span style="background:#fbe8b4;color:#8a5a00;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700">STOCK</span>' : '';
        var amt = parseFloat(en.amount) || 0;
        subTotal += amt;
        h += '<tr>';
        h += '<td>' + esc(en.date ? shortDate(en.date) : '-') + '</td>';
        h += '<td>' + esc(en.product) + stockBadge + '</td>';
        h += '<td class="num">' + (en.qty ? esc(en.qty) : '-') + '</td>';
        h += '<td class="num">' + (en.rate ? esc(en.rate) : '-') + '</td>';
        h += '<td class="num">' + esc(fmt(amt)) + '</td>';
        h += '</tr>';
      }
      h += '<tr class="subtotal-row"><td colspan="4" style="text-align:right">Sub-total ' + esc(grp.name) + '</td><td class="num">' + esc(fmt(subTotal)) + '</td></tr>';
    }
    h += '<tr class="total-row"><td colspan="4">TOTAL CREDIT SALES</td><td class="num">Rs ' + esc(fmt(T.creditTotal)) + '</td></tr>';
    h += '</tbody></table>';
  }

  // Purchases / Cost of Sales — grouped by supplier
  if ((d.purchases || []).length > 0) {
    h += '<div class="inv-section-title">Purchases (Cost of Sales)</div>';
    h += '<table class="inv-table">';
    h += '<thead><tr><th style="width:60px">Date</th><th>Supplier</th><th>Description</th><th class="num">Qty</th><th class="num">Amount (Rs)</th></tr></thead><tbody>';
    var purchases = d.purchases.slice();
    purchases.sort(function (a, b) {
      var sa = (a.supplier || "").toLowerCase(), sb = (b.supplier || "").toLowerCase();
      if (sa < sb) return -1; if (sa > sb) return 1;
      return new Date(a.date || "") - new Date(b.date || "");
    });
    // Group by supplier
    var supplierGroups = [];
    var supplierMap = {};
    for (var pi = 0; pi < purchases.length; pi++) {
      var p = purchases[pi];
      var sk = (p.supplier || "Other").trim();
      if (!supplierMap[sk]) { supplierMap[sk] = []; supplierGroups.push(sk); }
      supplierMap[sk].push(p);
    }
    for (var si = 0; si < supplierGroups.length; si++) {
      var supName = supplierGroups[si];
      var supRows = supplierMap[supName];
      var supTotal = 0;
      h += '<tr class="subtotal-row"><td colspan="5">' + esc(supName) + '</td></tr>';
      for (var pi2 = 0; pi2 < supRows.length; pi2++) {
        var p2 = supRows[pi2];
        var pAmt = parseFloat(p2.amount) || 0;
        var isOwed = pAmt < 0 || p2.isOwed === true;
        var owedBadge = isOwed ? ' <span style="background:#fcd9d9;color:#8a1a1a;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700">OFFALS OWED</span>' : '';
        supTotal += isOwed ? 0 : pAmt;
        h += '<tr>';
        h += '<td>' + esc(p2.date ? shortDate(p2.date) : '-') + '</td>';
        h += '<td style="color:var(--mid,#888);font-size:11px">' + esc(p2.supplier) + '</td>';
        h += '<td>' + esc(p2.description) + owedBadge + '</td>';
        h += '<td class="num">' + (p2.qty ? esc(p2.qty) + ' kg' : '-') + '</td>';
        h += '<td class="num">' + (isOwed ? '(' + esc(fmt(Math.abs(pAmt))) + ')' : esc(fmt(pAmt))) + '</td>';
        h += '</tr>';
      }
      h += '<tr><td colspan="4" style="text-align:right;font-weight:700;font-size:11px">' + esc(supName) + ' Subtotal</td><td class="num" style="font-weight:700">' + esc(fmt(supTotal)) + '</td></tr>';
    }
    h += '<tr class="total-row"><td colspan="4">TOTAL PURCHASES (NET)</td><td class="num">' + esc(fmt(T.purchaseTotal)) + '</td></tr>';
    h += '</tbody></table>';
  }

  // Stock adjustment
  if ((d.openingStock || []).length > 0 || (d.closingStock || []).length > 0) {
    h += '<div class="inv-section-title">Stock Adjustment</div>';
    h += '<table class="inv-table">';
    h += '<thead><tr><th>Item</th><th class="num">Qty (kg)</th><th class="num">Rate (Rs/kg)</th><th class="num">Value (Rs)</th></tr></thead><tbody>';
    if ((d.openingStock || []).length > 0) {
      h += '<tr class="subtotal-row"><td colspan="4">Opening Stock</td></tr>';
      for (var oi = 0; oi < d.openingStock.length; oi++) {
        var os = d.openingStock[oi];
        h += '<tr><td>' + esc(os.name) + '</td><td class="num">' + esc(os.qty || '-') + '</td><td class="num">' + esc(os.rate || '-') + '</td><td class="num">' + esc(fmt(os.amount)) + '</td></tr>';
      }
      h += '<tr><td colspan="3" style="text-align:right;font-weight:700">Total Opening</td><td class="num" style="font-weight:700">' + esc(fmt(T.openingTotal)) + '</td></tr>';
    }
    if ((d.closingStock || []).length > 0) {
      h += '<tr class="subtotal-row"><td colspan="4">Closing Stock</td></tr>';
      for (var li = 0; li < d.closingStock.length; li++) {
        var cs = d.closingStock[li];
        h += '<tr><td>' + esc(cs.name) + '</td><td class="num">' + esc(cs.qty || '-') + '</td><td class="num">' + esc(cs.rate || '-') + '</td><td class="num">' + esc(fmt(cs.amount)) + '</td></tr>';
      }
      h += '<tr><td colspan="3" style="text-align:right;font-weight:700">Total Closing</td><td class="num" style="font-weight:700">(' + esc(fmt(T.closingTotal)) + ')</td></tr>';
    }
    h += '<tr class="total-row"><td colspan="3">REAL COST OF SALES</td><td class="num">' + esc(fmt(T.realCOS)) + '</td></tr>';
    h += '</tbody></table>';
  }

  // Final P&L summary
  h += '<div class="inv-section-title">Profit &amp; Loss Summary</div>';
  h += '<table class="inv-table">';
  h += '<tbody>';
  h += '<tr><td>Total Revenue</td><td class="num">' + esc(fmt(T.totalRevenue)) + '</td></tr>';
  h += '<tr><td>Real Cost of Sales</td><td class="num">(' + esc(fmt(T.realCOS)) + ')</td></tr>';
  h += '<tr class="total-row"><td>GROSS PROFIT</td><td class="num">' + esc(fmt(T.grossProfit)) + '</td></tr>';
  h += '<tr class="total-row"><td>GP MARGIN</td><td class="num">' + esc(T.margin) + '%</td></tr>';
  h += '</tbody></table>';

  return h;
}

function buildJSON(d) {
  var T = computeTotals(d);
  var cashRows = [];
  var cashKeys = Object.keys(d.cash || {});
  for (var i = 0; i < cashKeys.length; i++) {
    var amt = fmtNum(d.cash[cashKeys[i]]);
    if (amt > 0) cashRows.push({ week_record_id: d.id, day: cashKeys[i], amount: amt });
  }
  var juiceRows = [];
  var juiceKeys = Object.keys(d.juice || {});
  for (var j = 0; j < juiceKeys.length; j++) {
    var jAmt = fmtNum(d.juice[juiceKeys[j]]);
    if (jAmt > 0) juiceRows.push({ week_record_id: d.id, day: juiceKeys[j], amount: jAmt });
  }
  var otherRows = [];
  if (parseFloat(d.cheque) > 0) {
    otherRows.push({ week_record_id: d.id, type: "cheque_bank_transfer", amount: parseFloat(d.cheque), reference: "" });
  }
  var stockRows = [];
  for (var os = 0; os < (d.openingStock || []).length; os++) {
    var so = d.openingStock[os];
    stockRows.push({ id: so.id, week_record_id: d.id, type: "opening", name: so.name, qty_kg: parseFloat(so.qty), rate_per_kg: parseFloat(so.rate), amount: parseFloat(so.amount) });
  }
  for (var cs = 0; cs < (d.closingStock || []).length; cs++) {
    var sc = d.closingStock[cs];
    stockRows.push({ id: sc.id, week_record_id: d.id, type: "closing", name: sc.name, qty_kg: parseFloat(sc.qty), rate_per_kg: parseFloat(sc.rate), amount: parseFloat(sc.amount) });
  }

  var payload = {
    meta: {
      export_version: SCHEMA_VERSION,
      exported_at: new Date().toISOString(),
      business_id: d.business_id,
      record_id: d.id,
      week_start: d.weekStart,
      week_end: d.weekEnd,
      status: d.status,
      synced_to_supabase: d.synced_to_supabase
    },
    week_record: {
      id: d.id,
      business_id: d.business_id,
      schema_version: SCHEMA_VERSION,
      week_start: d.weekStart,
      week_end: d.weekEnd,
      status: d.status,
      created_at: d.created_at,
      updated_at: d.updated_at,
      notes: d.notes || ""
    },
    cash_sales: cashRows,
    juice_sales: juiceRows,
    other_receipts: otherRows,
    credit_entries: (d.creditEntries || []).map(function (e) {
      return {
        id: e.id, week_record_id: d.id, day: e.day,
        client: e.client, product: e.product, category: e.category,
        qty_kg: parseFloat(e.qty) || null, rate_per_kg: parseFloat(e.rate) || null,
        amount: parseFloat(e.amount),
        entry_date: e.date || null
      };
    }),
    purchases: (d.purchases || []).map(function (p) {
      var amt = parseFloat(p.amount);
      return {
        id: p.id, week_record_id: d.id, supplier: p.supplier,
        description: p.description, category: p.category,
        qty_kg: parseFloat(p.qty) || null, rate_per_kg: parseFloat(p.rate) || null,
        amount: amt,
        purchase_date: p.date || null,
        is_credit_note: p.isOwed === true || amt < 0,
        credit_note_type: (p.isOwed === true || amt < 0) ? "offals_owed" : null
      };
    }),
    stock_entries: stockRows,
    computed_summary: {
      week_record_id: d.id,
      cash_total: T.cashTotal, juice_total: T.juiceTotal,
      cheque_total: T.chequeTotal, credit_total: T.creditTotal,
      total_revenue: T.totalRevenue, total_purchases: T.purchaseTotal,
      opening_stock: T.openingTotal, closing_stock: T.closingTotal,
      real_cos: T.realCOS, gross_profit: T.grossProfit,
      gp_margin_pct: parseFloat(T.margin)
    }
  };
  return JSON.stringify(payload, null, 2);
}

function buildMonthlyReport(mk) {
  var M = computeMonthly(mk);
  var label = monthLabel(mk);
  var t = "";
  t += "MONTH: " + label + "\n";
  t += repeat("=", 48) + "\n\n";

  t += "SUMMARY OVERVIEW\n\n";
  t += "  Weeks Recorded:      " + M.weekCount + "\n";
  t += "  Total Revenue:       Rs " + fmt(M.totalRevenue) + "\n";
  t += "  Real Cost of Sales:  Rs " + fmt(M.realCOS) + "\n";
  if (M.totalOwed > 0) {
    t += "  Offals Owed (memo):  Rs " + fmt(M.totalOwed) + "\n";
  }
  t += "  GROSS PROFIT:        Rs " + fmt(M.grossProfit) + "\n";
  t += "  GP Margin:           " + M.margin + "%\n";
  if (M.expensesTotal > 0) {
    t += "  Total Expenses:    - Rs " + fmt(M.expensesTotal) + "\n";
    t += "  NET PROFIT:          Rs " + fmt(M.netProfit) + "\n";
    t += "  Net Margin:          " + M.netMargin + "%\n";
  }
  t += "\n" + repeat("-", 48) + "\n\n";

  t += "REVENUE BREAKDOWN\n\n";
  var r = M.totalRevenue;
  t += "  Cash:    Rs " + pad(fmt(M.cashTotal), 12) + "  (" + (r > 0 ? ((M.cashTotal / r) * 100).toFixed(1) : "0.0") + "%)\n";
  t += "  Juice:   Rs " + pad(fmt(M.juiceTotal), 12) + "  (" + (r > 0 ? ((M.juiceTotal / r) * 100).toFixed(1) : "0.0") + "%)\n";
  t += "  Credit:  Rs " + pad(fmt(M.creditTotal), 12) + "  (" + (r > 0 ? ((M.creditTotal / r) * 100).toFixed(1) : "0.0") + "%)\n";
  if (M.chequeTotal > 0) {
    t += "  Cheque:  Rs " + pad(fmt(M.chequeTotal), 12) + "  (" + (r > 0 ? ((M.chequeTotal / r) * 100).toFixed(1) : "0.0") + "%)\n";
  }
  t += "  -------------------------\n";
  t += "  TOTAL:   Rs " + pad(fmt(r), 12) + "\n\n";

  if (M.creditTotal > 0) {
    t += "CREDIT BY CATEGORY\n\n";
    t += "  Beef:    Rs " + fmt(M.categoryMap.beef) + "\n";
    t += "  Lamb:    Rs " + fmt(M.categoryMap.lamb) + "\n";
    t += "  Chicken: Rs " + fmt(M.categoryMap.chicken) + "\n\n";
  }

  if (M.topClients.length > 0) {
    t += repeat("-", 48) + "\n";
    t += "TOP CLIENTS (CREDIT)\n\n";
    for (var ci = 0; ci < M.topClients.length; ci++) {
      t += "  " + (ci + 1) + ". " + M.topClients[ci][0] + ": Rs " + fmt(M.topClients[ci][1]) + "\n";
    }
    t += "\n";
  }

  if (M.supplierList.length > 0) {
    t += repeat("-", 48) + "\n";
    t += "PURCHASES BY SUPPLIER\n\n";
    for (var si = 0; si < M.supplierList.length; si++) {
      var sp = M.supplierList[si];
      t += "  " + sp.name + ":\n";
      if (sp.count > 0) {
        t += "    " + sp.count + " deliver" + (sp.count > 1 ? "ies" : "y");
        if (sp.kg > 0) t += ", " + sp.kg.toFixed(1) + " kg";
        t += "\n";
      }
      if (sp.owed && sp.owed > 0) {
        t += "    Gross delivered: Rs " + fmt(sp.total + sp.owed) + "\n";
        t += "    Offals Owed:   - Rs " + fmt(sp.owed) + "\n";
        t += "    Net:             Rs " + fmt(sp.total) + "\n";
      } else {
        t += "    Total: Rs " + fmt(sp.total) + "\n";
      }
    }
    t += "  -------------------------\n";
    if (M.totalOwed > 0) {
      t += "  GROSS PURCHASES:    Rs " + fmt(M.purchaseTotal + M.totalOwed) + "\n";
      t += "  TOTAL OFFALS OWED:- Rs " + fmt(M.totalOwed) + "\n";
      t += "  NET PURCHASES:      Rs " + fmt(M.purchaseTotal) + "\n\n";
    } else {
      t += "  TOTAL: Rs " + fmt(M.purchaseTotal) + "\n\n";
    }
  }

  t += repeat("-", 48) + "\n";
  t += "STOCK ADJUSTMENT\n\n";
  t += "  Opening Stock (1st of month):  Rs " + fmt(M.openingTotal) + "\n";
  t += "  Closing Stock (end of month): (Rs " + fmt(M.closingTotal) + ")\n";
  t += "  Real Cost of Sales:            Rs " + fmt(M.realCOS) + "\n\n";

  if (M.expenses.length > 0) {
    t += repeat("-", 48) + "\n";
    t += "EXPENSES\n\n";
    var sortedCats = [];
    for (var cat in M.expensesByCat) sortedCats.push([cat, M.expensesByCat[cat]]);
    sortedCats.sort(function (a, b) { return b[1] - a[1]; });
    for (var sc2 = 0; sc2 < sortedCats.length; sc2++) {
      var catName = sortedCats[sc2][0];
      var catTotal = sortedCats[sc2][1];
      t += "  " + catName + ": Rs " + fmt(catTotal) + "\n";
      var catRows = M.expenses.filter(function (e) { return e.category === catName; });
      for (var cri = 0; cri < catRows.length; cri++) {
        var ce = catRows[cri];
        t += "    - " + (ce.description || "(no description)");
        if (ce.date) {
          try { t += " [" + new Date(ce.date).toLocaleDateString("en-GB", { day: "numeric", month: "short" }) + "]"; }
          catch (er) { /* skip */ }
        }
        t += " = Rs " + fmt(ce.amount) + "\n";
      }
    }
    t += "  -------------------------\n";
    t += "  TOTAL EXPENSES: Rs " + fmt(M.expensesTotal) + "\n\n";
  }

  t += repeat("-", 48) + "\n";
  t += "PERFORMANCE METRICS\n\n";
  t += "  Trading Period:       " + M.weekCount + " week" + (M.weekCount !== 1 ? "s" : "") + " (~" + (M.weekCount * 7) + " days)\n";
  t += "  Avg Revenue/Day:      Rs " + fmt(M.avgRevenuePerDay) + "\n";
  t += "  Total Kg Sold:        " + M.totalKgSold.toFixed(1) + " kg\n";
  t += "  Total Kg Purchased:   " + M.totalKgPurchased.toFixed(1) + " kg\n";
  if (M.costPerKg > 0) t += "  Avg Cost / kg:        Rs " + fmt(M.costPerKg) + "\n";
  if (M.profitPerKg > 0) t += "  Profit per kg:        Rs " + fmt(M.profitPerKg) + "\n";
  t += "\n";

  t += repeat("=", 48) + "\n";
  t += "PROFIT & LOSS - " + label.toUpperCase() + "\n\n";
  t += "  Total Revenue:       Rs " + fmt(M.totalRevenue) + "\n";
  t += "  Real COS:          - Rs " + fmt(M.realCOS) + "\n";
  t += "  -------------------------\n";
  t += "  GROSS PROFIT:        Rs " + fmt(M.grossProfit) + "\n";
  t += "  GP MARGIN:           " + M.margin + "%\n";
  if (M.expensesTotal > 0) {
    t += "\n  Operating Expenses:- Rs " + fmt(M.expensesTotal) + "\n";
    t += "  -------------------------\n";
    t += "  NET PROFIT:          Rs " + fmt(M.netProfit) + "\n";
    t += "  NET MARGIN:          " + M.netMargin + "%\n";
  }
  t += repeat("=", 48) + "\n";
  return t;
}

function buildMonthlyJSON(mk) {
  var M = computeMonthly(mk);
  return JSON.stringify({
    meta: {
      export_version: SCHEMA_VERSION,
      exported_at: new Date().toISOString(),
      business_id: "chebel_meat_shop",
      report_type: "monthly_summary",
      month: mk,
      month_label: monthLabel(mk)
    },
    monthly_summary: {
      business_id: "chebel_meat_shop", month: mk, week_count: M.weekCount,
      total_revenue: M.totalRevenue, cash_total: M.cashTotal,
      juice_total: M.juiceTotal, cheque_total: M.chequeTotal,
      credit_total: M.creditTotal,
      total_purchases_net: M.purchaseTotal,
      total_purchases_gross: M.purchaseTotal + M.totalOwed,
      total_offals_owed: M.totalOwed,
      opening_stock: M.openingTotal, closing_stock: M.closingTotal,
      real_cos: M.realCOS, gross_profit: M.grossProfit,
      gp_margin_pct: parseFloat(M.margin),
      total_expenses: M.expensesTotal, net_profit: M.netProfit,
      net_margin_pct: parseFloat(M.netMargin),
      total_kg_sold: M.totalKgSold, total_kg_purchased: M.totalKgPurchased,

      cost_per_kg: M.costPerKg, profit_per_kg: M.profitPerKg
    },
    monthly_expenses: M.expenses.map(function (e) {
      return {
        business_id: "chebel_meat_shop", month: mk, id: e.id,
        category: e.category, description: e.description,
        amount: parseFloat(e.amount), expense_date: e.date || null
      };

  }, null, 2);
}

// Helper: derive specific date label for day index given weekStart
// dayIndex 0 = first day of the week (whatever day weekStart falls on)
function dateForDay(dayIndex) {
  if (!STATE.data.weekStart) return "";
  try {
    var ws = new Date(STATE.data.weekStart);
    ws.setDate(ws.getDate() + dayIndex);
    return ws.toLocaleDateString("en-GB", { day: "2-digit", month: "short" });
  } catch (e) { return ""; }
}

// Get the actual short day name (Mon, Tue, etc) for position i in this specific week.
// Falls back to DAYS[i] when weekStart isn't set yet.
function dayNameForIndex(i) {
  if (!STATE.data.weekStart) return DAYS[i];
  try {
    var ws = new Date(STATE.data.weekStart);
    ws.setDate(ws.getDate() + i);
    // getDay(): 0=Sun, 1=Mon, ..., 6=Sat. Map to our DAYS order which is Mon..Sun.
    var jsDay = ws.getDay();
    // Convert: Sun(0)->Sun, Mon(1)->Mon, Tue(2)->Tue ... so we map jsDay to a name directly
    var jsToShort = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    return jsToShort[jsDay];
  } catch (e) { return DAYS[i]; }
}

// Get the actual full day name for position i in this specific week.
function dayFullForIndex(i) {
  if (!STATE.data.weekStart) return DAY_FULL[i];
  try {
    var ws = new Date(STATE.data.weekStart);
    ws.setDate(ws.getDate() + i);
    var jsDay = ws.getDay();
    var jsToFull = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    return jsToFull[jsDay];
  } catch (e) { return DAY_FULL[i]; }
}
