    h += '<input type="number" inputmode="decimal" placeholder="0" value="' + esc(STATE.data.juice[dayKey]) + '" oninput="setDay(\'juice\',\'' + dayKey + '\',this.value)"></div>';
  }
  h += '</div>';
  h += '<div class="total-row"><span class="total-label">Total Juice</span><span class="total-value">Rs ' + fmt(total) + '</span></div>';
  h += '<div class="card"><div class="card-title">Cheque / Bank Transfer</div>';
  h += '<div class="field"><label>Amount</label>';
  h += '<input type="number" inputmode="decimal" placeholder="0" value="' + esc(STATE.data.cheque) + '" oninput="setCheque(this.value)"></div>';
  h += '</div>';
  h += nav(2, 4);
  return h;
}

// ============================================================
// SCREEN: CREDIT
// ============================================================
function renderCredit() {
  var ad = STATE.activeDay;
  var entries = STATE.data.creditEntries.filter(function (e) { return e.day === ad; });
  var dayT = sum(entries.map(function (e) { return e.amount; }));
  var total = sum(STATE.data.creditEntries.map(function (e) { return e.amount; }));
  var f = STATE.creditForm;
  var cuts = f.category === "beef" ? STATE.lists.beefCuts : f.category === "lamb" ? STATE.lists.lambCuts : STATE.lists.chickenCuts;

  var h = '<div class="card"><div class="card-title">Credit Sales</div>';
  h += '<div style="font-size:13px;color:var(--mid);margin-bottom:14px;margin-top:-8px">Select day, then add entries per client</div>';
  h += dayTabs(ad);
  // Find which index in the week the active day corresponds to, so we get the actual full name
  var activeIdx = -1;
  for (var aii = 0; aii < DAYS.length; aii++) { if (dayNameForIndex(aii) === ad) { activeIdx = aii; break; } }
  var activeFullName = activeIdx >= 0 ? dayFullForIndex(activeIdx) : ad;
  h += '<div style="font-family:var(--sans);font-size:16px;font-weight:700;margin-bottom:12px;margin-top:6px">' + activeFullName + (entries.length > 0 ? '<span class="badge" style="margin-left:8px">' + entries.length + '</span>' : '') + '</div>';
  if (entries.length === 0 && !STATE.showCreditForm) {
    h += '<div class="empty">No credit entries for this day</div>';
  }
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    h += '<div class="entry-row"><div class="entry-info">';
    h += '<div class="entry-name">' + esc(e.client) + '<span class="chip chip-' + e.category + '">' + e.category + '</span>';
    if (e.customerId && e.deliveryStatus === "on_stock") {
      h += '<span class="cust-chip stock-chip">ON STOCK</span>';
    }
    if (e.date) h += '<span class="date-chip">' + shortDate(e.date) + '</span>';
    h += '</div>';
    h += '<div class="entry-detail">' + esc(e.product);
    if (e.qty) h += ' &middot; ' + esc(e.qty) + ' kg';
    if (e.rate) h += ' @ Rs ' + esc(e.rate);
    h += '</div></div>';
    h += '<div class="entry-amount">Rs ' + fmt(e.amount) + '</div>';
    h += '<button class="edit-btn" onclick="editCredit(\'' + e.id + '\')">Edit</button>';
    h += '<button class="del-btn" onclick="removeCredit(\'' + e.id + '\')">x</button></div>';
  }
  if (entries.length > 0) {
    h += '<div style="text-align:right;font-family:var(--mono);font-size:10px;color:var(--mid);padding-top:3px">Day total: Rs ' + fmt(dayT) + '</div>';
  }

  if (STATE.showCreditForm) {
    h += '<div class="form-panel">';
    if (f.editingId) {
      h += '<div class="editing-banner">Editing Entry</div>';
    }
    h += '<div class="field"><label>Client</label><select onchange="setCFClient(this.value)">';
    h += '<option value="">-- select --</option>';
    for (var c = 0; c < STATE.lists.clients.length; c++) {
      h += '<option ' + (f.client === STATE.lists.clients[c] ? 'selected' : '') + '>' + esc(STATE.lists.clients[c]) + '</option>';
    }
    h += '</select>';
    h += '<button class="quick-add-link" onclick="quickAddListItem(\'clients\',\'client\',\'creditForm\')">+ Add new client</button>';
    // Auto-detect matching customer profile
    var matchedCust = matchCustomerByName(f.client);
    if (matchedCust) {
      h += '<div style="font-size:11px;color:var(--forest);margin-top:6px;font-weight:600">Linked to customer: ' + esc(matchedCust.name) + ' (' + matchedCust.code + ')</div>';
    }
    h += '</div>';
    // Delivery status toggle (only relevant when linked to a customer with stock holding)
    if (matchedCust && matchedCust.hasStockHolding) {
      h += '<div class="field"><label>Delivery Status</label>';
      h += '<div class="seg-toggle">';
      h += '<button class="seg-btn ' + (f.deliveryStatus === "delivered" ? "active" : "") + '" onclick="setCFDelivery(\'delivered\')">Delivered</button>';
      h += '<button class="seg-btn ' + (f.deliveryStatus === "on_stock" ? "active" : "") + '" onclick="setCFDelivery(\'on_stock\')">On Stock (Dry Aged)</button>';
      h += '</div>';
      h += '<div style="font-size:11px;color:var(--mid);margin-top:5px">' + (f.deliveryStatus === "on_stock" ? "Item will be held with you and tracked in stock statement" : "Item delivered to customer this week") + '</div>';
      h += '</div>';
    }
    h += '<div class="field"><label>Category</label><select onchange="setCFCat(this.value)">';
    h += '<option value="beef" ' + (f.category === "beef" ? "selected" : "") + '>Beef</option>';
    h += '<option value="lamb" ' + (f.category === "lamb" ? "selected" : "") + '>Lamb</option>';
    h += '<option value="chicken" ' + (f.category === "chicken" ? "selected" : "") + '>Chicken</option>';
    h += '</select></div>';
    h += '<div class="field"><label>Product / Cut</label><select onchange="setCF(\'product\',this.value)">';
    h += '<option value="">-- select --</option>';
    for (var cc = 0; cc < cuts.length; cc++) {
      h += '<option ' + (f.product === cuts[cc] ? "selected" : "") + '>' + esc(cuts[cc]) + '</option>';
    }
    h += '</select>';
    var cutListKey = f.category === "beef" ? "beefCuts" : f.category === "lamb" ? "lambCuts" : "chickenCuts";
    h += '<button class="quick-add-link" onclick="quickAddListItem(\'' + cutListKey + '\',\'product\',\'creditForm\')">+ Add new ' + f.category + ' cut</button>';
    h += '</div>';
    h += '<div class="field-row">';
    h += '<div class="field"><label>Qty (kg)</label><input type="number" inputmode="decimal" placeholder="0.00" value="' + esc(f.qty) + '" oninput="setCFQty(this.value)"></div>';
    h += '<div class="field"><label>Rate (Rs/kg)</label><input type="number" inputmode="decimal" placeholder="0" value="' + esc(f.rate) + '" oninput="setCFRate(this.value)"></div>';
    h += '</div>';
    h += '<div class="field"><label>Amount (Rs)</label><input type="number" inputmode="decimal" placeholder="0.00" value="' + esc(f.amount) + '" oninput="setCF(\'amount\',this.value)"></div>';
    h += '<div class="field"><label>Date (optional)</label><input type="date" value="' + esc(f.date) + '" onchange="setCF(\'date\',this.value)"></div>';
    if (f.amount || (f.qty && f.rate)) {
      h += '<div class="auto-calc">= Rs ' + fmt(f.amount || auto(f.qty, f.rate)) + '</div>';
    }
    h += '<div class="btn-row">';
    h += '<button class="btn btn-secondary btn-sm" style="width:100%" onclick="cancelCF()">Cancel</button>';
    h += '<button class="btn btn-primary btn-sm" style="width:100%" onclick="addCredit()">' + (f.editingId ? "Update" : "Add") + '</button>';
    h += '</div></div>';
  } else {
    h += '<button class="btn-add" style="margin-top:9px" onclick="showCreditForm()">+ Add Credit Entry</button>';
  }
  h += '</div>';
  h += '<div class="total-row"><span class="total-label">Total Credit (Week)</span><span class="total-value">Rs ' + fmt(total) + '</span></div>';
  h += nav(3, 5);
  return h;
}

// ============================================================
// SCREEN: PURCHASES
// ============================================================
function renderPurchases() {
  var f = STATE.purchaseForm;
  var cuts = f.category === "beef" ? STATE.lists.beefCuts : f.category === "lamb" ? STATE.lists.lambCuts : STATE.lists.chickenCuts;
  var total = sum(STATE.data.purchases.map(function (p) { return p.amount; }));

  var h = '<div class="card"><div class="card-title">Purchases / COS</div>';
  h += '<div style="font-size:13px;color:var(--mid);margin-bottom:14px;margin-top:-8px">All stock bought this week by supplier</div>';
  h += '<div style="font-family:var(--sans);font-size:16px;font-weight:700;margin-bottom:12px">Entries' + (STATE.data.purchases.length > 0 ? '<span class="badge" style="margin-left:8px">' + STATE.data.purchases.length + '</span>' : '') + '</div>';
  if (STATE.data.purchases.length === 0 && !STATE.showPurchaseForm) {
    h += '<div class="empty">No purchases added yet</div>';
  }
  for (var i = 0; i < STATE.data.purchases.length; i++) {
    var p = STATE.data.purchases[i];
    var amt = parseFloat(p.amount) || 0;
    var isNeg = amt < 0 || p.isOwed === true;
    h += '<div class="entry-row"><div class="entry-info">';
    h += '<div class="entry-name">' + esc(p.supplier);
    if (isNeg) {
      h += '<span class="chip chip-owed">OFFALS OWED</span>';
    } else {
      h += '<span class="chip chip-' + p.category + '">' + p.category + '</span>';
    }
    if (p.date) h += '<span class="date-chip">' + shortDate(p.date) + '</span>';
    h += '</div>';
    h += '<div class="entry-detail">' + esc(p.description);
    if (p.qty) h += ' &middot; ' + esc(p.qty) + ' kg';
    if (p.rate) h += ' @ Rs ' + esc(p.rate);
    if (p.invoiceRef) h += ' &middot; <span style="font-family:var(--mono);font-size:10px;color:var(--mid)">' + esc(p.invoiceRef) + '</span>';
    h += '</div></div>';
    h += '<div class="entry-amount' + (isNeg ? ' negative' : '') + '">' + (isNeg ? '- Rs ' : 'Rs ') + fmt(Math.abs(amt)) + '</div>';
    h += '<button class="edit-btn" onclick="editPurchase(\'' + p.id + '\')">Edit</button>';
    h += '<button class="del-btn" onclick="removePurchase(\'' + p.id + '\')">x</button></div>';
  }

  if (STATE.showPurchaseForm) {
    h += '<div class="form-panel">';
    if (f.editingId) {
      h += '<div class="editing-banner">Editing Entry</div>';
    }
    // Offals Owed toggle - flips amount sign for credit notes against supplier
    h += '<div class="toggle-row" onclick="togglePFOwed()">';
    h += '<div><div class="toggle-lbl">Offals Owed (Credit Note)</div>';
    h += '<div class="toggle-sub">Deduct from supplier - amount goes negative</div></div>';
    h += '<button class="toggle-switch ' + (f.isOwed ? "on" : "") + '" onclick="event.stopPropagation();togglePFOwed()"></button>';
    h += '</div>';
    h += '<div class="field"><label>Supplier</label><select onchange="setPF(\'supplier\',this.value)">';
    h += '<option value="">-- select --</option>';
    for (var s = 0; s < STATE.lists.suppliers.length; s++) {
      h += '<option ' + (f.supplier === STATE.lists.suppliers[s] ? "selected" : "") + '>' + esc(STATE.lists.suppliers[s]) + '</option>';
    }
    h += '</select>';
    h += '<button class="quick-add-link" onclick="quickAddListItem(\'suppliers\',\'supplier\',\'purchaseForm\')">+ Add new supplier</button>';
    h += '</div>';
    h += '<div class="field"><label>Category</label><select onchange="setPFCat(this.value)">';
    h += '<option value="beef" ' + (f.category === "beef" ? "selected" : "") + '>Beef</option>';
    h += '<option value="lamb" ' + (f.category === "lamb" ? "selected" : "") + '>Lamb</option>';
    h += '<option value="chicken" ' + (f.category === "chicken" ? "selected" : "") + '>Chicken</option>';
    h += '</select></div>';
    h += '<div class="field"><label>' + (f.isOwed ? "Item Not Delivered" : "Item / Cut") + '</label><select onchange="setPF(\'description\',this.value)">';
    h += '<option value="">-- select --</option>';
    for (var cu = 0; cu < cuts.length; cu++) {
      h += '<option ' + (f.description === cuts[cu] ? "selected" : "") + '>' + esc(cuts[cu]) + '</option>';
    }
    h += '</select>';
    var purchCutKey = f.category === "beef" ? "beefCuts" : f.category === "lamb" ? "lambCuts" : "chickenCuts";
    h += '<button class="quick-add-link" onclick="quickAddListItem(\'' + purchCutKey + '\',\'description\',\'purchaseForm\')">+ Add new ' + f.category + ' item</button>';
    h += '</div>';
    h += '<div class="field-row">';
    h += '<div class="field"><label>Weight (kg)</label><input type="number" inputmode="decimal" placeholder="0.00" value="' + esc(f.qty) + '" oninput="setPFQty(this.value)"></div>';
    h += '<div class="field"><label>Rate (Rs/kg)</label><input type="number" inputmode="decimal" placeholder="420" value="' + esc(f.rate) + '" oninput="setPFRate(this.value)"></div>';
    h += '</div>';
    h += '<div class="field"><label>' + (f.isOwed ? "Amount Owed (Rs)" : "Amount (Rs)") + '</label><input type="number" inputmode="decimal" placeholder="0.00" value="' + esc(f.amount) + '" oninput="setPF(\'amount\',this.value)"></div>';
    h += '<div class="field"><label>Date (optional)</label><input type="date" value="' + esc(f.date) + '" onchange="setPF(\'date\',this.value)"></div>';
    h += '<div class="field"><label>Invoice / Ref No. (optional)</label><input type="text" placeholder="e.g. LN-2025-441" value="' + esc(f.invoiceRef || "") + '" oninput="setPF(\'invoiceRef\',this.value)"></div>';
    if (f.amount || (f.qty && f.rate)) {
      var displayAmt = f.amount || auto(f.qty, f.rate);
      h += '<div class="auto-calc" style="' + (f.isOwed ? "color:var(--danger)" : "") + '">' + (f.isOwed ? "= - Rs " : "= Rs ") + fmt(Math.abs(parseFloat(displayAmt))) + '</div>';
    }
    h += '<div class="btn-row">';
    h += '<button class="btn btn-secondary btn-sm" style="width:100%" onclick="cancelPF()">Cancel</button>';
    h += '<button class="btn btn-primary btn-sm" style="width:100%" onclick="addPurchase()">' + (f.editingId ? "Update" : "Add") + '</button>';
    h += '</div></div>';
  } else {
    h += '<button class="btn-add" style="margin-top:9px" onclick="showPurchaseForm()">+ Add Purchase</button>';
  }
  h += '</div>';
  // Net purchases total with breakdown if there are credit notes
  var purchSum = 0, owedSum = 0;
  for (var pi = 0; pi < STATE.data.purchases.length; pi++) {
    var pAmt = parseFloat(STATE.data.purchases[pi].amount) || 0;
    if (pAmt < 0 || STATE.data.purchases[pi].isOwed) {
      owedSum += Math.abs(pAmt);
    } else {
      purchSum += pAmt;
    }
  }
  var netTotal = purchSum - owedSum;
  if (owedSum > 0) {
    h += '<div class="total-row" style="background:var(--ivory-dark);color:var(--ink);border:1px solid var(--rule)"><span class="total-label">Purchases (Gross)</span><span class="total-value">Rs ' + fmt(purchSum) + '</span></div>';
    h += '<div class="total-row" style="background:#fdf0f0;color:var(--danger);border:1px solid #f0c0c0"><span class="total-label">Offals Owed</span><span class="total-value">- Rs ' + fmt(owedSum) + '</span></div>';
    h += '<div class="total-row"><span class="total-label">Net Purchases</span><span class="total-value">Rs ' + fmt(netTotal) + '</span></div>';
  } else {
    h += '<div class="total-row"><span class="total-label">Total Purchases</span><span class="total-value">Rs ' + fmt(total) + '</span></div>';
  }
  h += nav(4, 6);
  return h;
}

// ============================================================
// SCREEN: STOCK
// ============================================================
function renderStock() {
  var f = STATE.stockForm;

  var oT = sum(STATE.data.openingStock.map(function (s) { return s.amount; }));

      html += '<div class="entry-amount">Rs ' + fmt(s.amount) + '</div>';

  h += '</div>';

  h += '<div class="card"><div class="card-title">Closing Stock</div>';
  h += '<div style="font-size:13px;color:var(--mid);margin-bottom:14px;margin-top:-8px">Stock left at the end of the week</div>';

  h += stockList(STATE.data.closingStock, "closing");
  if (cT > 0) h += '<div style="text-align:right;font-family:var(--mono);font-size:11px;color:var(--mid);margin-top:6px">Total: Rs ' + fmt(cT) + '</div>';
  h += '</div>';

  if (STATE.showStockForm) {
    h += '<div class="card" id="stock-form-anchor"><div class="card-title">' + (f.editingId ? "Edit Stock Item" : "Add Stock Item") + '</div>';
    if (f.editingId) {
      h += '<div class="editing-banner" style="margin-bottom:12px">Editing Entry</div>';
    }
    h += '<div class="field"><label>Type</label><select onchange="setSF(\'type\',this.value)">';
    h += '<option value="closing" ' + (f.type === "closing" ? "selected" : "") + '>Closing Stock</option>';
    h += '<option value="opening" ' + (f.type === "opening" ? "selected" : "") + '>Opening Stock</option>';

    h += '<option value="">-- select --</option>';
    for (var i = 0; i < STATE.lists.stockItems.length; i++) {
      h += '<option ' + (f.name === STATE.lists.stockItems[i] ? "selected" : "") + '>' + esc(STATE.lists.stockItems[i]) + '</option>';
    }
    h += '</select>';
    h += '<button class="quick-add-link" onclick="quickAddListItem(\'stockItems\',\'name\',\'stockForm\')">+ Add new stock item</button>';
    h += '</div>';
    h += '<div class="field-row">';
    h += '<div class="field"><label>Qty (kg)</label><input type="number" inputmode="decimal" placeholder="0.00" value="' + esc(f.qty) + '" oninput="setSF(\'qty\',this.value)"></div>';
    h += '<div class="field"><label>Rate (Rs/kg)</label><input type="number" inputmode="decimal" placeholder="750" value="' + esc(f.rate) + '" oninput="setSF(\'rate\',this.value)"></div>';
    h += '</div>';
    if (f.qty && f.rate) {

    h += '<div class="btn-row">';
    h += '<button class="btn btn-secondary btn-sm" style="width:100%" onclick="cancelSF()">Cancel</button>';
    h += '<button class="btn btn-primary btn-sm" style="width:100%" onclick="addStock()">' + (f.editingId ? "Update" : "Add") + '</button>';
    h += '</div></div>';
  } else {

// ============================================================
// SCREEN: REVIEW
// ============================================================
function renderReview() {
  var d = STATE.data;
  var T = computeTotals(d);
  var errs = validateWeek(d);
  STATE.validationErrors = errs;
  var hasErrs = errs.length > 0;

  var clientMap = {};
  for (var i = 0; i < d.creditEntries.length; i++) {
    var e = d.creditEntries[i];
    clientMap[e.client] = (clientMap[e.client] || 0) + (parseFloat(e.amount) || 0);
  }

  var h = '<div class="card"><div class="card-title">Week Summary</div>';
  h += '<div style="font-size:14px;color:var(--mid);margin-top:-8px">' + wkLbl(d.weekStart) + ' - ' + wkLbl(d.weekEnd) + '</div></div>';

  if (hasErrs) {
    h += '<div class="val-panel">';
    h += '<div class="val-title">' + errs.length + ' Issue' + (errs.length > 1 ? 's' : '') + ' Found</div>';
    for (var ei = 0; ei < errs.length; ei++) {
      h += '<div class="val-item"><div class="val-icon">!</div><div>' + esc(errs[ei].msg) + '</div></div>';
    }
    h += '<p style="font-size:11px;color:var(--mid);font-family:var(--mono);margin-top:8px">Fix issues above before archiving. You can still export data.</p>';
    h += '</div>';
  }

  h += '<div class="rev-block"><div class="rev-hd">Revenue</div>';
  h += '<div class="rev-line sub"><span>Cash</span><span>Rs ' + fmt(T.cashTotal) + '</span></div>';
  h += '<div class="rev-line sub"><span>Juice (MCB)</span><span>Rs ' + fmt(T.juiceTotal) + '</span></div>';
  h += '<div class="rev-line sub"><span>Credit</span><span>Rs ' + fmt(T.creditTotal) + '</span></div>';
  if (T.chequeTotal > 0) {
    h += '<div class="rev-line sub"><span>Cheque / Transfer</span><span>Rs ' + fmt(T.chequeTotal) + '</span></div>';
  }
  h += '<div class="rev-line total"><span>Total Revenue</span><span>Rs ' + fmt(T.totalRevenue) + '</span></div>';
  h += '</div>';

  var clientKeys = Object.keys(clientMap);
  if (clientKeys.length > 0) {
    h += '<div class="rev-block"><div class="rev-hd">Credit by Client</div>';
    for (var ck = 0; ck < clientKeys.length; ck++) {
      h += '<div class="rev-line sub"><span>' + esc(clientKeys[ck]) + '</span><span>Rs ' + fmt(clientMap[clientKeys[ck]]) + '</span></div>';
    }
    h += '</div>';
  }

  // Calculate owed amount for review display
  var totalOwedReview = 0;
  for (var pri = 0; pri < d.purchases.length; pri++) {
    var prAmt = parseFloat(d.purchases[pri].amount) || 0;
    if (prAmt < 0 || d.purchases[pri].isOwed) totalOwedReview += Math.abs(prAmt);
  }

  h += '<div class="rev-block"><div class="rev-hd">Cost of Sales</div>';
  if (totalOwedReview > 0) {
    h += '<div class="rev-line sub"><span>Purchases (Gross)</span><span>Rs ' + fmt(T.purchaseTotal + totalOwedReview) + '</span></div>';
    h += '<div class="rev-line sub" style="color:var(--danger)"><span>Offals Owed by Supplier</span><span>- Rs ' + fmt(totalOwedReview) + '</span></div>';
    h += '<div class="rev-line sub"><span>Net Purchases</span><span>Rs ' + fmt(T.purchaseTotal) + '</span></div>';
  } else {
    h += '<div class="rev-line sub"><span>Total Purchases</span><span>Rs ' + fmt(T.purchaseTotal) + '</span></div>';
  }
  if (T.openingTotal > 0) h += '<div class="rev-line sub"><span>+ Opening Stock</span><span>Rs ' + fmt(T.openingTotal) + '</span></div>';
  if (T.closingTotal > 0) h += '<div class="rev-line sub"><span>- Closing Stock</span><span>(Rs ' + fmt(T.closingTotal) + ')</span></div>';
  h += '<div class="rev-line total"><span>Real COS</span><span>Rs ' + fmt(T.realCOS) + '</span></div>';
  h += '</div>';

  h += '<div class="rev-block"><div class="rev-hd">Profit and Loss</div>';
  h += '<div class="rev-line bold"><span>Gross Profit</span><span>Rs ' + fmt(T.grossProfit) + '</span></div>';
  h += '<div class="rev-line grand"><span>GP Margin</span><span>' + T.margin + '%</span></div>';
  h += '</div>';

  h += '<div class="card">';
  h += '<div class="card-title">Export <span class="supa-badge">Supabase-ready</span></div>';
  h += '<div class="export-tabs">';
  h += '<div class="export-tab ' + (STATE.exportTab === "report" ? "active" : "") + '" onclick="setExportTab(\'report\')">Full Report</div>';
  h += '<div class="export-tab ' + (STATE.exportTab === "json" ? "active" : "") + '" onclick="setExportTab(\'json\')">JSON</div>';
  h += '</div>';
  var outText = STATE.exportTab === "report" ? buildReport(d) : buildJSON(d);
  h += '<div class="output-box">' + esc(outText) + '</div>';
  if (STATE.copyOk) h += '<div class="copy-ok">Copied!</div>';
  h += '<button class="btn btn-primary" style="margin-top:10px" onclick="copyExport()">';
  h += STATE.copyOk ? "Copied!" : (STATE.exportTab === "report" ? "Copy Full Report" : "Copy JSON");
  h += '</button>';
  h += '<button class="btn btn-info" style="margin-top:8px" onclick="printWeeklyReport()">Print / Save as PDF</button>';
  h += '</div>';

  // CASH FLOW SUMMARY - end-of-week reconciliation
  var weekKey = STATE.data.id || "current";
  var cashFlowEntry = STATE.cashFlow[weekKey] || { supplierPayment: "", supplierNotes: "" };
  var supplierPay = parseFloat(cashFlowEntry.supplierPayment) || 0;
  var cashRemaining = T.cashTotal - supplierPay;
  var bankDeposit = cashRemaining + T.juiceTotal + T.chequeTotal;
  // Customer payments received this week (for cross-check)
  var paymentsThisWeek = 0;
  if (STATE.data.weekStart && STATE.data.weekEnd) {
    for (var pi = 0; pi < STATE.payments.length; pi++) {
      var pay = STATE.payments[pi];
      var payDt = new Date(pay.date);
      if (payDt >= new Date(STATE.data.weekStart) && payDt <= new Date(STATE.data.weekEnd)) {
        paymentsThisWeek += parseFloat(pay.amount) || 0;
      }
    }
  }

  h += '<div class="card"><div class="card-title">Cash Flow Summary</div>';
  h += '<div style="font-size:13px;color:var(--mid);margin-top:-8px;margin-bottom:14px">End-of-week reconciliation</div>';
  h += '<div class="field"><label>Paid to Suppliers (Rs)</label>';
  h += '<input type="number" inputmode="decimal" placeholder="0" value="' + esc(cashFlowEntry.supplierPayment || "") + '" oninput="setCashFlow(\'supplierPayment\',this.value)"></div>';
  h += '<div class="field"><label>Notes (which suppliers)</label>';
  h += '<input type="text" placeholder="e.g. SOCOVIA Rs 60k + DADAI Rs 5k" value="' + esc(cashFlowEntry.supplierNotes || "") + '" oninput="setCashFlow(\'supplierNotes\',this.value)"></div>';
  h += '<div class="rev-block" style="margin-top:8px">';
  h += '<div class="rev-line sub"><span>Cash Collected</span><span>Rs ' + fmt(T.cashTotal) + '</span></div>';
  h += '<div class="rev-line sub" style="color:var(--danger)"><span>- Paid to Suppliers</span><span>(Rs ' + fmt(supplierPay) + ')</span></div>';
  h += '<div class="rev-line total"><span>Cash Remaining</span><span>Rs ' + fmt(cashRemaining) + '</span></div>';
  h += '<div class="rev-line sub"><span>+ Juice (MCB)</span><span>Rs ' + fmt(T.juiceTotal) + '</span></div>';
  if (T.chequeTotal > 0) {
    h += '<div class="rev-line sub"><span>+ Cheque / Transfer</span><span>Rs ' + fmt(T.chequeTotal) + '</span></div>';
  }
  h += '<div class="rev-line grand"><span>TO DEPOSIT IN BANK</span><span>Rs ' + fmt(bankDeposit) + '</span></div>';
  h += '</div>';

  if (paymentsThisWeek > 0) {
    h += '<div style="margin-top:10px;padding:10px 12px;background:var(--ivory-warm);border-radius:9px;font-size:12px;color:var(--mid)">';
    h += 'Note: Rs ' + fmt(paymentsThisWeek) + ' in customer payments received this week (recorded separately in Customer profiles).';
    h += '</div>';
  }
  // Profit reconciliation hint
  h += '<div style="margin-top:10px;padding:10px 12px;background:var(--ivory-warm);border-radius:9px;font-size:12px;color:var(--mid);line-height:1.6">';
  h += '<b style="color:var(--ink)">Profit check:</b> Gross profit was Rs ' + fmt(T.grossProfit) + ' (' + T.margin + '%). ';
  h += 'Cash retained Rs ' + fmt(cashRemaining) + ' + receivables Rs ' + fmt(T.creditTotal) + ' should reconcile with profit + closing stock.';
  h += '</div>';
  h += '</div>';

  if (hasErrs) {
    h += '<div style="padding:10px 12px;background:#fdf0f0;border-radius:9px;font-size:12px;color:#8a1a1a;margin-top:4px">Fix ' + errs.length + ' issue' + (errs.length > 1 ? 's' : '') + ' before archiving</div>';
  }

  h += navReview(hasErrs);
  return h;
}

// ============================================================
// LISTS SHEET
// ============================================================
function renderListsSheet() {
  var tab = STATE.listTab;
  var cur = null;
  for (var i = 0; i < LIST_TABS.length; i++) if (LIST_TABS[i].key === tab) cur = LIST_TABS[i];
  if (!cur) cur = LIST_TABS[0];
  var items = STATE.lists[tab] || [];

  var h = '<div class="overlay" onclick="if(event.target===this)closeOverlay()">';
  h += '<div class="sheet">';
  h += '<div class="sheet-hd">';
  h += '<div><div class="sheet-title">Manage Lists</div><div class="sheet-sub">Add &middot; Remove &middot; Customise</div></div>';
  h += '<button class="sheet-close" onclick="closeOverlay()">x</button>';
  h += '</div>';
  h += '<div class="sheet-tabs">';
  for (var t = 0; t < LIST_TABS.length; t++) {
    var lt = LIST_TABS[t];
    h += '<div class="sheet-tab ' + (tab === lt.key ? "active" : "") + '" onclick="setListTab(\'' + lt.key + '\')">';
    h += lt.label + ' <span style="opacity:.5">(' + (STATE.lists[lt.key] || []).length + ')</span></div>';
  }
  h += '</div>';
  h += '<div class="sheet-body">';
  h += '<div style="margin-bottom:10px;font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mid)">' + cur.label + '</div>';
  h += '<div class="list-section">';
  if (items.length === 0) h += '<div class="empty">No items yet</div>';
  for (var ii = 0; ii < items.length; ii++) {
    h += '<div class="list-item"><span>' + esc(items[ii]) + '</span>';
    h += '<button class="list-item-del" onclick="removeListItem(\'' + tab + '\',' + JSON.stringify(items[ii]) + ')">x</button></div>';
  }
  h += '<div class="list-add-row">';
  h += '<input type="text" id="listInput" placeholder="' + esc(cur.ph) + '" value="' + esc(STATE.listInput) + '" oninput="STATE.listInput=this.value" onkeydown="if(event.key===\'Enter\')addListItem()">';
  h += '<button onclick="addListItem()">+ Add</button>';
  h += '</div></div>';
  h += '<div style="height:30px"></div>';
  h += '</div></div></div>';
  return h;
}

// ============================================================
// HISTORY SHEET
// ============================================================
function renderHistorySheet() {
  var h = '<div class="overlay" onclick="if(event.target===this)closeOverlay()">';
  h += '<div class="sheet">';
  h += '<div class="sheet-hd">';
  h += '<div><div class="sheet-title">Saved Weeks</div><div class="sheet-sub">' + STATE.weeks.length + ' week' + (STATE.weeks.length !== 1 ? 's' : '') + ' archived</div></div>';
  h += '<button class="sheet-close" onclick="closeOverlay()">x</button>';
  h += '</div>';
  h += '<div class="sheet-body">';
  if (STATE.weeks.length === 0) {
    h += '<div class="empty" style="padding:40px 0">No weeks archived yet.<br>Complete a week and tap Archive.</div>';
  }
  for (var i = 0; i < STATE.weeks.length; i++) {
    var w = STATE.weeks[i];
    var m = w.revenue > 0 ? ((w.profit / w.revenue) * 100).toFixed(1) : "0.0";
    h += '<div class="wk-card">';
    h += '<div class="wk-card-hd">';
    h += '<div class="wk-card-title">' + wkLbl(w.weekStart) + ' - ' + wkLbl(w.weekEnd) + '</div>';
    var savedDate = "";
    try { savedDate = new Date(w.savedAt).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" }); } catch (e) { }
    h += '<div class="wk-card-date">Saved ' + savedDate + '</div>';
    h += '</div>';
    h += '<div class="wk-stats">';
    h += '<div class="wk-stat"><div class="wk-stat-lbl">Revenue</div><div class="wk-stat-val">Rs ' + fmt(w.revenue) + '</div></div>';
    h += '<div class="wk-stat"><div class="wk-stat-lbl">COS</div><div class="wk-stat-val">Rs ' + fmt(w.cos) + '</div></div>';
    h += '<div class="wk-stat"><div class="wk-stat-lbl">Profit</div><div class="wk-stat-val green">Rs ' + fmt(w.profit) + '</div></div>';
    h += '<div class="wk-stat"><div class="wk-stat-lbl">Margin</div><div class="wk-stat-val green">' + m + '%</div></div>';
    h += '</div>';
    h += '<div class="wk-actions">';
    h += '<button class="btn btn-secondary btn-sm" style="flex:1" onclick="viewWeekReport(\'' + w.id + '\')">View</button>';
    h += '<button class="btn btn-primary btn-sm" style="flex:1" onclick="loadWeek(\'' + w.id + '\')">Load and Edit</button>';
    h += '<button class="btn btn-info btn-sm" onclick="exportWeekJSON(\'' + w.id + '\')">JSON</button>';
    h += '<button class="btn btn-danger btn-sm" onclick="deleteWeek(\'' + w.id + '\')">Del</button>';
    h += '</div></div>';
  }
  h += '<div style="height:20px"></div></div></div></div>';
  return h;
}

// ============================================================
// MONTHLY SHEET
// ============================================================
function renderMonthlySheet() {
  var months = availableMonths();
  var mk = STATE.selectedMonth || months[0] || currentMonthKey();
  var M = computeMonthly(mk);
  var expenses = STATE.monthlyExpenses[mk] || [];
  var f = STATE.expenseForm;

  var body = "";
  body += '<div class="card" style="margin-bottom:12px"><div class="card-title">Select Month</div>';
  body += '<select class="month-selector" onchange="setMonth(this.value)">';
  for (var i = 0; i < months.length; i++) {
    body += '<option value="' + months[i] + '" ' + (months[i] === mk ? "selected" : "") + '>' + monthLabel(months[i]) + '</option>';
  }
  body += '</select></div>';

  if (M.weekCount === 0 && expenses.length === 0) {
    body += '<div class="month-noweeks">';
    body += '<div style="font-size:30px;margin-bottom:8px">!</div>';
    body += '<div style="font-weight:600;margin-bottom:4px">No data for ' + monthLabel(mk) + '</div>';
    body += '<div>Archive weeks to see them aggregated here.<br>You can still add expenses below.</div>';
    body += '</div>';
  } else {
    body += '<div class="month-hero">';
    body += '<div class="month-hero-lbl">' + monthLabel(mk).toUpperCase() + '</div>';
    body += '<div class="month-hero-val">Rs ' + fmt(M.totalRevenue) + '</div>';
    body += '<div class="month-hero-sub">Total Revenue &middot; ' + M.weekCount + ' week' + (M.weekCount !== 1 ? 's' : '') + ' recorded</div>';
    body += '<div class="month-grid">';
    body += '<div class="month-grid-cell"><div class="lbl">Gross Profit</div><div class="val">Rs ' + fmt(M.grossProfit) + '</div></div>';
    body += '<div class="month-grid-cell"><div class="lbl">GP Margin</div><div class="val">' + M.margin + '%</div></div>';
    body += '<div class="month-grid-cell"><div class="lbl">Net Profit</div><div class="val">Rs ' + fmt(M.netProfit) + '</div></div>';
    body += '<div class="month-grid-cell"><div class="lbl">Net Margin</div><div class="val">' + M.netMargin + '%</div></div>';
    body += '</div></div>';

    body += '<div class="card" style="margin-top:12px"><div class="card-title">Revenue Channels</div>';
    var channels = [["Cash", M.cashTotal], ["Juice (MCB)", M.juiceTotal], ["Credit", M.creditTotal], ["Cheque/Transfer", M.chequeTotal]];
    for (var c = 0; c < channels.length; c++) {
      if (channels[c][1] > 0) {
        var pct = M.totalRevenue > 0 ? (channels[c][1] / M.totalRevenue) * 100 : 0;
        body += '<div class="bar-row"><span class="bar-name">' + channels[c][0] + '</span>';
        body += '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>';
        body += '<span class="bar-val">Rs ' + fmt(channels[c][1]) + '</span></div>';
      }
    }
    body += '</div>';

    body += '<div class="card" style="margin-top:12px"><div class="card-title">Performance Metrics</div>';
    body += '<div class="metric-grid">';
    body += '<div class="metric"><div class="metric-lbl">Avg Rev / Day</div><div class="metric-val green">Rs ' + fmt(M.avgRevenuePerDay) + '</div></div>';
    body += '<div class="metric"><div class="metric-lbl">Total Kg Sold</div><div class="metric-val">' + M.totalKgSold.toFixed(1) + ' kg</div></div>';
    body += '<div class="metric"><div class="metric-lbl">Total Kg Bought</div><div class="metric-val">' + M.totalKgPurchased.toFixed(1) + ' kg</div></div>';
    if (M.costPerKg > 0) body += '<div class="metric"><div class="metric-lbl">Cost / kg</div><div class="metric-val">Rs ' + fmt(M.costPerKg) + '</div></div>';
    if (M.profitPerKg > 0) body += '<div class="metric feature"><div class="metric-lbl">Profit / kg</div><div class="metric-val">Rs ' + fmt(M.profitPerKg) + '</div></div>';
    body += '</div></div>';

    if (M.topClients.length > 0) {
      var maxV = M.topClients[0][1];
      body += '<div class="card" style="margin-top:12px"><div class="card-title">Top Clients (Credit)</div>';
      for (var tc = 0; tc < M.topClients.length; tc++) {
        var cpct = maxV > 0 ? (M.topClients[tc][1] / maxV) * 100 : 0;
        body += '<div class="bar-row"><span class="bar-name">' + esc(M.topClients[tc][0]) + '</span>';
        body += '<div class="bar-track"><div class="bar-fill" style="width:' + cpct + '%"></div></div>';
        body += '<span class="bar-val">Rs ' + fmt(M.topClients[tc][1]) + '</span></div>';
      }
      body += '</div>';
    }

    if (M.supplierList.length > 0) {
      var maxS = M.supplierList[0].total;
      body += '<div class="card" style="margin-top:12px"><div class="card-title">Supplier Totals</div>';
      for (var ssi = 0; ssi < M.supplierList.length; ssi++) {
        var sp = M.supplierList[ssi];
        var spct = maxS > 0 ? (sp.total / maxS) * 100 : 0;
        body += '<div class="bar-row"><span class="bar-name">' + esc(sp.name) + '</span>';
        body += '<div class="bar-track"><div class="bar-fill" style="width:' + spct + '%"></div></div>';
        body += '<span class="bar-val">Rs ' + fmt(sp.total) + '</span></div>';
      }
      body += '<div style="margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--mid);text-align:right">Total: Rs ' + fmt(M.purchaseTotal) + '</div>';
      body += '</div>';
    }

    body += '<div class="card" style="margin-top:12px"><div class="card-title">Stock and COS</div>';
    body += '<div class="metric-grid">';
    body += '<div class="metric"><div class="metric-lbl">Opening Stock</div><div class="metric-val">Rs ' + fmt(M.openingTotal) + '</div></div>';
    body += '<div class="metric"><div class="metric-lbl">Closing Stock</div><div class="metric-val">Rs ' + fmt(M.closingTotal) + '</div></div>';
    body += '<div class="metric"><div class="metric-lbl">' + (M.totalOwed > 0 ? "Net Purchases" : "Purchases") + '</div><div class="metric-val">Rs ' + fmt(M.purchaseTotal) + '</div></div>';
    body += '<div class="metric feature"><div class="metric-lbl">Real COS</div><div class="metric-val">Rs ' + fmt(M.realCOS) + '</div></div>';
    body += '</div>';
    if (M.totalOwed > 0) {
      body += '<div style="margin-top:10px;padding:10px 12px;background:#fdf0f0;border:1px solid #f0c0c0;border-radius:9px;display:flex;justify-content:space-between;align-items:center">';
      body += '<div><div style="font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--danger)">Offals Owed by Suppliers</div>';
      body += '<div style="font-size:11px;color:var(--mid);margin-top:2px">Money you can claim back / deduct</div></div>';
      body += '<div style="font-family:var(--mono);font-size:15px;font-weight:700;color:var(--danger)">Rs ' + fmt(M.totalOwed) + '</div>';
      body += '</div>';
    }
    body += '</div>';
  }

  // Expenses
  body += '<div class="card" style="margin-top:12px">';
  body += '<div class="card-title">Expenses' + (expenses.length > 0 ? '<span class="badge">' + expenses.length + '</span>' : '') + '</div>';
  if (expenses.length === 0 && !STATE.showExpenseForm) {
    body += '<div class="empty">No expenses recorded for ' + monthLabel(mk) + '</div>';
  }
  if (expenses.length > 0) {
    var byCat = {};
    for (var ex = 0; ex < expenses.length; ex++) byCat[expenses[ex].category] = (byCat[expenses[ex].category] || 0) + (parseFloat(expenses[ex].amount) || 0);
    var sortedC = [];
    for (var cn in byCat) sortedC.push([cn, byCat[cn]]);
    sortedC.sort(function (a, b) { return b[1] - a[1]; });
    for (var sci = 0; sci < sortedC.length; sci++) {
      var catN = sortedC[sci][0];
      var catT = sortedC[sci][1];
      body += '<div style="margin-bottom:10px">';
      body += '<div style="font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mid);margin-bottom:5px;display:flex;justify-content:space-between">';
      body += '<span>' + esc(catN) + '</span><span>Rs ' + fmt(catT) + '</span></div>';
      var rows = expenses.filter(function (e) { return e.category === catN; });
      for (var rri = 0; rri < rows.length; rri++) {
        var r = rows[rri];
        body += '<div class="exp-row"><div class="exp-info">';
        body += '<div class="exp-cat">' + esc(r.description || "(no description)");
        if (r.date) {
          var dateStr = "";
          try { dateStr = new Date(r.date).toLocaleDateString("en-GB", { day: "numeric", month: "short" }); } catch (e2) { }
          if (dateStr) body += '<span class="cat-tag">' + dateStr + '</span>';
        }
        body += '</div></div>';
        body += '<div class="exp-amt">Rs ' + fmt(r.amount) + '</div>';
        body += '<button class="del-btn" onclick="removeExpense(\'' + r.id + '\')">x</button>';
        body += '</div>';
      }
      body += '</div>';
    }
    body += '<div style="text-align:right;font-family:var(--mono);font-size:11px;color:var(--danger);padding-top:6px;border-top:1px solid var(--rule)">Total Expenses: Rs ' + fmt(sum(expenses.map(function (e) { return e.amount; }))) + '</div>';
  }

  if (STATE.showExpenseForm) {
    body += '<div class="form-panel" style="margin-top:9px">';
    body += '<div class="field"><label>Category</label><select onchange="setEF(\'category\',this.value)">';
    body += '<option value="">-- select --</option>';
    for (var ec = 0; ec < STATE.expenseCategories.length; ec++) {
      body += '<option ' + (f.category === STATE.expenseCategories[ec] ? "selected" : "") + '>' + esc(STATE.expenseCategories[ec]) + '</option>';
    }
    body += '</select></div>';
    body += '<div class="field"><label>Description</label><input type="text" placeholder="e.g. CEB electricity bill" value="' + esc(f.description) + '" oninput="setEF(\'description\',this.value)"></div>';
    body += '<div class="field-row">';
    body += '<div class="field"><label>Amount (Rs)</label><input type="number" inputmode="decimal" placeholder="0.00" value="' + esc(f.amount) + '" oninput="setEF(\'amount\',this.value)"></div>';
    body += '<div class="field"><label>Date</label><input type="date" value="' + esc(f.date) + '" onchange="setEF(\'date\',this.value)"></div>';
    body += '</div>';
    body += '<div class="btn-row">';
    body += '<button class="btn btn-secondary btn-sm" style="width:100%" onclick="cancelEF()">Cancel</button>';
    body += '<button class="btn btn-primary btn-sm" style="width:100%" onclick="addExpense()">Add</button>';
    body += '</div></div>';
  } else {
    body += '<button class="btn-add" style="margin-top:9px" onclick="showExpenseForm()">+ Add Expense</button>';
  }
  body += '</div>';

  if (M.expensesTotal > 0) {
    body += '<div class="card" style="margin-top:12px;background:var(--forest);border-color:var(--forest);color:var(--white)">';
    body += '<div style="font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--sage-light);margin-bottom:8px">Final P and L</div>';
    body += '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;color:rgba(255,255,255,0.85)"><span>Gross Profit</span><span style="font-family:var(--mono)">Rs ' + fmt(M.grossProfit) + '</span></div>';
    body += '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;color:rgba(255,255,255,0.85)"><span>Total Expenses</span><span style="font-family:var(--mono)">- Rs ' + fmt(M.expensesTotal) + '</span></div>';
    body += '<div style="height:1px;background:rgba(255,255,255,0.2);margin:8px 0"></div>';
    body += '<div style="display:flex;justify-content:space-between;font-weight:700;font-size:15px;font-family:var(--mono)"><span>NET PROFIT</span><span>Rs ' + fmt(M.netProfit) + '</span></div>';
    body += '<div style="display:flex;justify-content:space-between;font-weight:700;font-size:13px;font-family:var(--mono);color:var(--sage-light);margin-top:3px"><span>NET MARGIN</span><span>' + M.netMargin + '%</span></div>';
    body += '</div>';
  }

  if (M.weekCount > 0 || expenses.length > 0) {
    body += '<div class="card" style="margin-top:12px">';
    body += '<div class="card-title">Export <span class="supa-badge">Supabase-ready</span></div>';
    body += '<div class="export-tabs">';
    body += '<div class="export-tab ' + (STATE.monthExportTab === "report" ? "active" : "") + '" onclick="setMonthExportTab(\'report\')">Full Report</div>';
    body += '<div class="export-tab ' + (STATE.monthExportTab === "json" ? "active" : "") + '" onclick="setMonthExportTab(\'json\')">JSON</div>';
    body += '</div>';
    var mText = STATE.monthExportTab === "report" ? buildMonthlyReport(mk) : buildMonthlyJSON(mk);
    body += '<div class="output-box">' + esc(mText) + '</div>';
    if (STATE.monthCopyOk) body += '<div class="copy-ok">Copied!</div>';
    body += '<button class="btn btn-primary" style="margin-top:10px" onclick="copyMonthlyExport()">';
    body += STATE.monthCopyOk ? "Copied!" : (STATE.monthExportTab === "report" ? "Copy Monthly Report" : "Copy JSON");
    body += '</button>';
    body += '<button class="btn btn-info" style="margin-top:8px" onclick="printMonthlyReport()">Print / Save as PDF</button>';
    body += '</div>';
  }

  body += '<div style="height:30px"></div>';

  var h = '<div class="overlay" onclick="if(event.target===this)closeOverlay()">';
  h += '<div class="sheet">';
  h += '<div class="sheet-hd">';
  h += '<div><div class="sheet-title">Monthly Summary</div><div class="sheet-sub">' + monthLabel(mk) + '</div></div>';
  h += '<button class="sheet-close" onclick="closeOverlay()">x</button>';
  h += '</div>';
  h += '<div class="sheet-body">' + body + '</div>';
  h += '</div></div>';
  return h;
}

// ============================================================
// MEAT INVENTORY DASHBOARD
// ============================================================
// Aggregates beef + lamb + chicken (and any other category) across the
// selected period and computes:
//   - Total kg bought (broken down by supplier)
//   - Total kg sold (across all sales channels)
//   - Average cost per kg
//   - Average selling price per kg
//   - Profit per kg
// Periods supported: current week, current month, all-time.
// ============================================================
// BEEF KG ANALYSIS — Mode A (beef-only) and Mode B (full picture)
// Weight denominator = kg from BEEF_WEIGHT_SUPPLIERS only.
// Mode A: cost and revenue from beef purchases + beef credit sales only.
// Mode B: same kg denominator but cost includes ALL purchases (beef + lamb + azad chicken net),
//         revenue includes ALL credit sales (beef + lamb + azad barter).
// ============================================================
function computeBeefKgStats(period, mode) {
  // Collect records same as computeMeatStats
  var records = [];
  if (period === "week") {
    records.push(STATE.data);
  } else if (period === "month") {
    var now = new Date();
    var thisMonth = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0");
    for (var i = 0; i < STATE.weeks.length; i++) {
      var w = STATE.weeks[i];
      if (w.weekStart && w.weekStart.substring(0, 7) === thisMonth) records.push(w.data);
    }
    if (STATE.data.weekStart && STATE.data.weekStart.substring(0, 7) === thisMonth) records.push(STATE.data);
  } else {
    for (var j = 0; j < STATE.weeks.length; j++) records.push(STATE.weeks[j].data);
    records.push(STATE.data);
  }

  function isBeefWeightSupplier(name) {
    if (!name) return false;
    var n = name.toLowerCase().trim();
    for (var k = 0; k < BEEF_WEIGHT_SUPPLIERS.length; k++) {
      if (n.indexOf(BEEF_WEIGHT_SUPPLIERS[k]) > -1) return true;
    }
    return false;
  }
  function isAzadSupplier(name) {
    return name && name.toLowerCase().indexOf("azad") > -1;
  }

  // Accumulators
  var beefKg = 0;          // kg from beef weight suppliers only (the denominator)
  var beefCost = 0;        // cost from beef weight suppliers only
  var beefRevenue = 0;     // credit revenue from beef category
  var beefKgSold = 0;

  // Mode B extras
  var otherCost = 0;       // lamb + azad chicken net + any other non-beef-weight purchases
  var otherRevenue = 0;    // lamb + azad credit sales revenue
  var otherKgSold = 0;

  // Per-supplier breakdown for beef weight suppliers
  var supplierMap = {};

  for (var r = 0; r < records.length; r++) {
    var d = records[r] || {};

    (d.purchases || []).forEach(function (p) {
      if (p.isOwed) return;
      var amt = parseFloat(p.amount) || 0;
      var qty = parseFloat(p.qty) || 0;
      if (isBeefWeightSupplier(p.supplier)) {
        beefKg += qty;
        beefCost += amt;
        var skey = (p.supplier || "Unknown").trim();
        if (!supplierMap[skey]) supplierMap[skey] = { kg: 0, cost: 0 };
        supplierMap[skey].kg += qty;
        supplierMap[skey].cost += amt;
      } else if (mode === "full") {
        // Azad chicken is already netted via credit entries on their account — 
        // but purchases from Azad here are chicken (a cost to us), so include.
        otherCost += amt;
      }
    });

    (d.creditEntries || []).forEach(function (e) {
      var amt = parseFloat(e.amount) || 0;
      var qty = parseFloat(e.qty) || 0;
      var cat = (e.category || "beef").toLowerCase();
      if (cat === "beef") {
        beefRevenue += amt;
        beefKgSold += qty;
      } else if (mode === "full") {
        otherRevenue += amt;
        otherKgSold += qty;
      }
    });
  }

  // Derived metrics
  var totalCost = mode === "full" ? beefCost + otherCost : beefCost;
  var totalRevenue = mode === "full" ? beefRevenue + otherRevenue : beefRevenue;
  var totalKgSold = mode === "full" ? beefKgSold + otherKgSold : beefKgSold;

  var avgCostPerKg  = beefKg > 0 ? totalCost / beefKg : 0;
  var avgSellPerKg  = beefKg > 0 ? totalRevenue / beefKg : 0;
  var profitPerKg   = avgSellPerKg - avgCostPerKg;
  var margin        = avgSellPerKg > 0 ? (profitPerKg / avgSellPerKg) * 100 : 0;

  return {
    beefKg: beefKg,
    beefCost: beefCost,
    otherCost: otherCost,
    totalCost: totalCost,
    beefRevenue: beefRevenue,
    otherRevenue: otherRevenue,
    totalRevenue: totalRevenue,
    beefKgSold: beefKgSold,
    totalKgSold: totalKgSold,
    avgCostPerKg: avgCostPerKg,
    avgSellPerKg: avgSellPerKg,
    profitPerKg: profitPerKg,
    margin: margin,
    suppliers: supplierMap
  };
}

function computeMeatStats(period) {
  // Build list of week-data records to include based on period filter.
  var records = [];
  if (period === "week") {
    records.push({ data: STATE.data, label: "Current Week" });
  } else if (period === "month") {
    // All archived weeks whose weekStart falls in current month + current draft
    var now = new Date();
    var thisMonth = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0");
    for (var i = 0; i < STATE.weeks.length; i++) {
      var w = STATE.weeks[i];
      if (w.weekStart && w.weekStart.substring(0, 7) === thisMonth) {
        records.push({ data: w.data, label: w.weekStart });
      }
    }
    // Include current draft if its weekStart is in this month
    if (STATE.data.weekStart && STATE.data.weekStart.substring(0, 7) === thisMonth) {
      records.push({ data: STATE.data, label: "Current Draft" });
    }
  } else {
    // All time: every archived week + current draft
    for (var j = 0; j < STATE.weeks.length; j++) {
      records.push({ data: STATE.weeks[j].data, label: STATE.weeks[j].weekStart });
    }
    records.push({ data: STATE.data, label: "Current Draft" });
  }

  // For each category, aggregate across all records:
  //   - purchasesBySupplier: {supplierName: {kg, cost, count}}
  //   - totalKgBought, totalCost
  //   - totalKgSold, totalRevenue
  var categories = {}; // {categoryName: {...}}
  function ensureCat(cat) {
    if (!categories[cat]) {
      categories[cat] = {
        name: cat,
        suppliers: {},      // {supplier: {kg, cost, transactions}}
        clients: {},        // {client: {kg, revenue, transactions}}
        totalKgBought: 0,
        totalCost: 0,
        totalKgSold: 0,     // from credit + cash entries (cash kg not tracked per entry usually)
        totalRevenue: 0,    // credit only (cash sales aren't per-product)
        creditKgSold: 0,
        creditRevenue: 0
      };
    }
    return categories[cat];
  }

  for (var r = 0; r < records.length; r++) {
    var d = records[r].data || {};
    // Purchases (cost side)
    (d.purchases || []).forEach(function (p) {
      var cat = p.category || "beef";
      var qty = parseFloat(p.qty) || 0;
      var amount = parseFloat(p.amount) || 0;
      // Skip "owed" entries (offals owed - these are credit notes, not real purchases)
      if (p.isOwed) return;
      var C = ensureCat(cat);
      C.totalKgBought += qty;
      C.totalCost += amount;
      var sup = (p.supplier || "Unknown").trim();
      if (!sup) sup = "Unknown";
      if (!C.suppliers[sup]) C.suppliers[sup] = { kg: 0, cost: 0, transactions: 0 };
      C.suppliers[sup].kg += qty;
      C.suppliers[sup].cost += amount;
      C.suppliers[sup].transactions += 1;
    });
    // Credit sales (revenue side - has qty info per cut)
    (d.creditEntries || []).forEach(function (e) {
      var cat = e.category || "beef";
      var qty = parseFloat(e.qty) || 0;
      var amount = parseFloat(e.amount) || 0;
      var C = ensureCat(cat);
      C.creditKgSold += qty;
      C.creditRevenue += amount;
      C.totalKgSold += qty;
      C.totalRevenue += amount;
      var cl = (e.client || "Unknown").trim();
      if (!cl) cl = "Unknown";
      if (!C.clients[cl]) C.clients[cl] = { kg: 0, revenue: 0, transactions: 0 };
      C.clients[cl].kg += qty;
      C.clients[cl].revenue += amount;
      C.clients[cl].transactions += 1;
    });
  }

  // Compute per-kg metrics
  Object.keys(categories).forEach(function (cat) {
    var C = categories[cat];
    C.avgCostPerKg = C.totalKgBought > 0 ? C.totalCost / C.totalKgBought : 0;
    C.avgSellPerKg = C.creditKgSold > 0 ? C.creditRevenue / C.creditKgSold : 0;
    C.profitPerKg = C.avgSellPerKg - C.avgCostPerKg;
    C.profitMargin = C.avgSellPerKg > 0 ? (C.profitPerKg / C.avgSellPerKg) * 100 : 0;
  });

  return { categories: categories, periodLabel: period, recordCount: records.length };
}

    h += '</div>';
  }

    var modeTitle = mode === "beefonly" ? "Beef Only" : "Full Picture";

      h += '<div class="month-noweeks"><div style="font-size:30px;margin-bottom:8px">!</div>';
      h += '<div style="font-weight:600;margin-bottom:4px">No beef weight data for this period</div>';
      h += '<div>Add purchases from ' + BEEF_WEIGHT_SUPPLIERS.join(", ") + ' with kg quantities.</div></div>';
    } else {

      h += '<div style="background:var(--forest);border-radius:14px;padding:16px;margin-bottom:12px">';
      h += '<div style="font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--sage-light);margin-bottom:10px">' + modeTitle.toUpperCase() + ' &middot; BEEF KG BASIS</div>';
      h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
      var kpis = [
        ["Beef Kg Bought", bk.beefKg.toFixed(1) + " kg"],
        ["Avg Cost / kg", "Rs " + fmt(bk.avgCostPerKg)],
        ["Avg Revenue / kg", "Rs " + fmt(bk.avgSellPerKg)],
        ["Profit / kg", "Rs " + fmt(bk.profitPerKg)]
      ];
      for (var ki = 0; ki < kpis.length; ki++) {

        h += '<div style="background:rgba(255,255,255,0.08);border-radius:9px;padding:10px 12px">';

        h += '<tr><td>Other purchases (lamb, chicken, Azad)</td><td class="num">' + fmt(bk.otherCost) + '</td><td class="num">' + (bk.beefKg > 0 ? fmt(bk.otherCost / bk.beefKg) : "-") + '</td></tr>';

      h += '</tbody></table></div>';

      // Revenue breakdown card

        h += '<tr><td>Other sales (lamb, Azad barter)</td><td class="num">' + fmt(bk.otherRevenue) + '</td><td class="num">' + (bk.beefKg > 0 ? fmt(bk.otherRevenue / bk.beefKg) : "-") + '</td></tr>';

      // Supplier breakdown

      if (supKeys.length > 0) {
        h += '<div class="card" style="margin-bottom:16px"><div class="card-title">Beef Suppliers (Weight Basis)</div>';
        h += '<table class="meat-table"><thead><tr><th>Supplier</th><th class="num">Kg</th><th class="num">Cost (Rs)</th><th class="num">Avg/kg</th></tr></thead><tbody>';
        for (var si = 0; si < supKeys.length; si++) {
          var s = bk.suppliers[supKeys[si]];
          h += '<tr><td>' + esc(supKeys[si]) + '</td><td class="num">' + s.kg.toFixed(1) + '</td><td class="num">' + fmt(s.cost) + '</td><td class="num">' + (s.kg > 0 ? fmt(s.cost / s.kg) : "-") + '</td></tr>';
        }
        h += '<tr class="meat-total"><td>TOTAL</td><td class="num">' + bk.beefKg.toFixed(1) + '</td><td class="num">' + fmt(bk.beefCost) + '</td><td class="num">' + (bk.beefKg > 0 ? fmt(bk.beefCost / bk.beefKg) : "-") + '</td></tr>';
        h += '</tbody></table></div>';
      }
    }

    h += '<div style="height:20px"></div></div></div></div>';
    return h;
  }

  // ── Standard mode: existing per-category view ──
  var stats = computeMeatStats(period);
  var cats = stats.categories;
  var catNames = Object.keys(cats);
  var prioOrder = { beef: 1, lamb: 2, chicken: 3 };
  catNames.sort(function (a, b) {
    var pa = prioOrder[a] || 99, pb = prioOrder[b] || 99;
    if (pa !== pb) return pa - pb;
    return a.localeCompare(b);
  });

    h += '</div>';

      h += '<div class="meat-stat featured"><div class="meat-stat-lbl">Margin</div><div class="meat-stat-val">' + (C.profitMargin !== 0 ? C.profitMargin.toFixed(1) + "%" : "-") + '</div></div>';
      h += '</div></div>';

      var supKeys2 = Object.keys(C.suppliers).sort(function (a, b) { return C.suppliers[b].kg - C.suppliers[a].kg; });
      if (supKeys2.length > 0) {
        h += '<div class="card" style="margin-bottom:10px"><div class="card-title">' + esc(catTitle) + ' Purchases by Supplier</div>';
        h += '<table class="meat-table"><thead><tr><th>Supplier</th><th class="num">Kg</th><th class="num">Cost (Rs)</th><th class="num">Avg/kg</th></tr></thead><tbody>';
        for (var si2 = 0; si2 < supKeys2.length; si2++) {
          var s2 = C.suppliers[supKeys2[si2]];
          var avgK2 = s2.kg > 0 ? s2.cost / s2.kg : 0;
          h += '<tr><td>' + esc(supKeys2[si2]) + '</td><td class="num">' + s2.kg.toFixed(1) + '</td><td class="num">' + fmt(s2.cost) + '</td><td class="num">' + (avgK2 > 0 ? fmt(avgK2) : "-") + '</td></tr>';
        }
        h += '<tr class="meat-total"><td>TOTAL</td><td class="num">' + C.totalKgBought.toFixed(1) + '</td><td class="num">' + fmt(C.totalCost) + '</td><td class="num">' + (C.avgCostPerKg > 0 ? fmt(C.avgCostPerKg) : "-") + '</td></tr>';
        h += '</tbody></table></div>';
      }

      var clKeys2 = Object.keys(C.clients).sort(function (a, b) { return C.clients[b].kg - C.clients[a].kg; }).slice(0, 5);
      if (clKeys2.length > 0) {
        h += '<div class="card" style="margin-bottom:16px"><div class="card-title">' + esc(catTitle) + ' Sales by Client (Top 5)</div>';

function buildAccountStatement(cust, weekData, currentSubtotal) {
  // Balance brought forward = opening balance + all credit sales from archived weeks
  // (we don't include current draft's items here because they're the "current invoice")
  var balanceBf = parseFloat(cust.openingBalance) || 0;
  for (var i = 0; i < STATE.weeks.length; i++) {
    var d = STATE.weeks[i].data || {};
    (d.creditEntries || []).forEach(function (e) {
      if (e.customerId === cust.id) balanceBf += parseFloat(e.amount) || 0;
    });
  }
  // Split payments by date: those BEFORE this week (folded into balanceBf)
  // vs those that should appear as "Less: Payment" lines on the invoice.
  // CRITICAL FIX: Any payment that isn't strictly before weekStart is shown
  // as a "Less: Payment" line - including payments after weekEnd. This
  // ensures the invoice TOTAL DUE matches the customer's actual running balance.
  var weekStart = weekData.weekStart;
  var paymentsBeforeWeek = 0;
  var paymentsThisInvoice = [];
  for (var p = 0; p < STATE.payments.length; p++) {
    var pay = STATE.payments[p];
    if (pay.customerId !== cust.id) continue;
    // Payment with no date - treat as current invoice payment (safe default)
    if (!pay.date) {
      paymentsThisInvoice.push(pay);
      continue;
    }
    // Payment date strictly before week start - fold into b/f
    if (weekStart && new Date(pay.date) < new Date(weekStart)) {
      paymentsBeforeWeek += parseFloat(pay.amount) || 0;
    } else {
      // Everything else (within week or after) - show as deduction on this invoice
      paymentsThisInvoice.push(pay);
    }
  }
  balanceBf -= paymentsBeforeWeek;
  var paymentsAppliedSum = sum(paymentsThisInvoice.map(function (p) { return p.amount; }));
  var netBalanceBf = balanceBf - paymentsAppliedSum;
  var totalDue = netBalanceBf + currentSubtotal;
  return { balanceBf: balanceBf, payments: paymentsThisInvoice, paymentsAppliedSum: paymentsAppliedSum, netBalanceBf: netBalanceBf, totalDue: totalDue };
}

function renderCustomerStatement(cust) {
  var h = '<div class="card"><div class="card-title">Account Statement</div>';
  h += '<div style="font-size:13px;color:var(--mid);margin-top:-8px;margin-bottom:14px">All-time activity</div>';
  var lines = [];
  if (parseFloat(cust.openingBalance) !== 0) {
    lines.push({ date: "", desc: "Opening balance", amount: parseFloat(cust.openingBalance) || 0 });
  }
  for (var i = STATE.weeks.length - 1; i >= 0; i--) {
    var w = STATE.weeks[i];
    var d = w.data || {};
    var weekTotal = 0;
    (d.creditEntries || []).forEach(function (e) {
      if (e.customerId === cust.id) weekTotal += parseFloat(e.amount) || 0;
    });
    if (weekTotal > 0) {
      lines.push({ date: d.weekEnd || d.weekStart, desc: "Invoice " + generateInvoiceNumber(cust.id, d.weekStart), amount: weekTotal });
    }
  }
  var draftTotal = 0;
  (STATE.data.creditEntries || []).forEach(function (e) {
    if (e.customerId === cust.id) draftTotal += parseFloat(e.amount) || 0;
  });
  if (draftTotal > 0) {
    lines.push({ date: STATE.data.weekEnd || STATE.data.weekStart, desc: "Invoice " + generateInvoiceNumber(cust.id, STATE.data.weekStart) + " (draft)", amount: draftTotal });
  }
  for (var p = 0; p < STATE.payments.length; p++) {
    var pay = STATE.payments[p];
    if (pay.customerId !== cust.id) continue;
    lines.push({ date: pay.date, desc: "Payment " + (pay.method || "") + (pay.reference ? " &middot; " + esc(pay.reference) : ""), amount: -parseFloat(pay.amount) || 0, type: "payment" });
  }
  lines.sort(function (a, b) {
    if (!a.date) return -1;
    if (!b.date) return 1;
    return new Date(a.date) - new Date(b.date);
  });
  if (lines.length === 0) {
    h += '<div class="empty">No activity yet</div>';
  } else {
    var running = 0;
    h += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">';
    h += '<tr style="background:var(--ivory-warm);font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase"><th style="text-align:left;padding:7px">Date</th><th style="text-align:left;padding:7px">Description</th><th style="text-align:right;padding:7px">Amount</th><th style="text-align:right;padding:7px">Balance</th></tr>';
    for (var l = 0; l < lines.length; l++) {
      var line = lines[l];
      running += line.amount;
      var color = line.type === "payment" ? "var(--forest)" : "var(--ink)";
      h += '<tr style="border-bottom:1px solid var(--ivory-dark);color:' + color + '">';
      h += '<td style="padding:7px;font-family:var(--mono);font-size:11px">' + (line.date ? shortDate(line.date) : "-") + '</td>';
      h += '<td style="padding:7px">' + line.desc + '</td>';
      h += '<td style="padding:7px;text-align:right;font-family:var(--mono)">' + (line.amount < 0 ? "(Rs " + fmt(Math.abs(line.amount)) + ")" : "Rs " + fmt(line.amount)) + '</td>';
      h += '<td style="padding:7px;text-align:right;font-family:var(--mono);font-weight:600">Rs ' + fmt(running) + '</td>';
      h += '</tr>';
    }
    h += '</table></div>';
  }
  h += '</div>';
  return h;
}

  h += '<tr style="background:var(--ivory-warm);font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase">';

  h += '<th style="text-align:right;padding:8px;color:#7a6010">Chicken From Azad</th></tr>';
  var dateMap = {};
  beefEntries.forEach(function (e) {
    var dt = e.date || d.weekStart || "";
    if (!dateMap[dt]) dateMap[dt] = { beef: 0, chicken: 0 };
    dateMap[dt].beef += parseFloat(e.amount) || 0;
  });
  chickenPurchases.forEach(function (p) {
    var dt = p.date || d.weekStart || "";
    if (!dateMap[dt]) dateMap[dt] = { beef: 0, chicken: 0 };
    dateMap[dt].chicken += parseFloat(p.amount) || 0;
  });
  var sortedDates = Object.keys(dateMap).sort();
  if (sortedDates.length === 0) {
    h += '<tr><td colspan="3" style="padding:14px;text-align:center;color:var(--mid)">No activity this week</td></tr>';
  } else {
    for (var di = 0; di < sortedDates.length; di++) {
      var dt = sortedDates[di];
      var dm = dateMap[dt];
      h += '<tr style="border-bottom:1px solid var(--ivory-dark)">';
      h += '<td style="padding:8px;font-family:var(--mono);font-size:11px">' + (dt ? shortDate(dt) : "-") + '</td>';
      h += '<td style="padding:8px;text-align:right;font-family:var(--mono);color:' + (dm.beef > 0 ? "var(--ink)" : "var(--mid)") + '">' + (dm.beef > 0 ? "Rs " + fmt(dm.beef) : "-") + '</td>';
      h += '<td style="padding:8px;text-align:right;font-family:var(--mono);color:' + (dm.chicken > 0 ? "var(--ink)" : "var(--mid)") + '">' + (dm.chicken > 0 ? "Rs " + fmt(dm.chicken) : "-") + '</td>';
      h += '</tr>';
    }
  }
  h += '<tr style="background:var(--forest);color:var(--white);font-weight:700">';
  h += '<td style="padding:10px">TOTAL</td>';
  h += '<td style="padding:10px;text-align:right;font-family:var(--mono)">Rs ' + fmt(beefTotal) + '</td>';
  h += '<td style="padding:10px;text-align:right;font-family:var(--mono)">Rs ' + fmt(chickenTotal) + '</td>';
  h += '</tr></table></div>';

  var weekNet = beefTotal - chickenTotal;
  h += '<div style="margin-top:14px;padding:12px 14px;background:' + (weekNet >= 0 ? "var(--ivory-warm)" : "#fdf0f0") + ';border-radius:9px;display:flex;justify-content:space-between;align-items:center">';
  h += '<div><div style="font-size:13px;font-weight:600">Week Net</div>';
  h += '<div style="font-size:11px;color:var(--mid)">' + (weekNet > 0 ? "Azad owes you" : weekNet < 0 ? "You owe Azad" : "Settled") + '</div></div>';
  h += '<div style="font-family:var(--mono);font-size:16px;font-weight:700;color:' + (weekNet < 0 ? "var(--danger)" : "var(--forest)") + '">Rs ' + fmt(Math.abs(weekNet)) + '</div>';
  h += '</div>';

  // Rolling balance: opening + sum of each archived week's net (beef-chicken) + current draft net - payments
  // Using per-week net rather than re-aggregating raw entries prevents drift from post-archive edits.
  var archivedNets = 0;
  for (var w = 0; w < STATE.weeks.length; w++) {
    var wd = STATE.weeks[w].data || {};
    var wBeef = 0, wChicken = 0;
    (wd.creditEntries || []).forEach(function (e) {
      if (e.customerId === cust.id) wBeef += parseFloat(e.amount) || 0;
    });
    (wd.purchases || []).forEach(function (p) {
      if (p.supplier && p.supplier.toLowerCase().indexOf("azad") > -1) wChicken += parseFloat(p.amount) || 0;
    });
    archivedNets += (wBeef - wChicken);
  }
  // Add current draft net
  var draftNet = beefTotal - chickenTotal;
  var paymentsToFromAzad = 0;
  for (var pp = 0; pp < STATE.payments.length; pp++) {
    if (STATE.payments[pp].customerId === cust.id) paymentsToFromAzad += parseFloat(STATE.payments[pp].amount) || 0;
  }
  var rolling = (parseFloat(cust.openingBalance) || 0) + archivedNets + draftNet - paymentsToFromAzad;
  h += '<div style="margin-top:8px;padding:12px 14px;background:var(--forest);color:var(--white);border-radius:9px;display:flex;justify-content:space-between;align-items:center">';
  h += '<div><div style="font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--sage-light)">ROLLING BALANCE (ALL TIME)</div>';
  h += '<div style="font-size:11px;color:var(--sage-light);margin-top:2px">' + (rolling > 0 ? "Azad owes you" : rolling < 0 ? "You owe Azad" : "Settled") + '</div></div>';
  h += '<div style="font-family:var(--mono);font-size:18px;font-weight:700">Rs ' + fmt(Math.abs(rolling)) + (rolling < 0 ? " CR" : "") + '</div>';
  h += '</div>';

  h += '<div class="btn-row" style="margin-top:14px">';
  h += '<button class="btn btn-primary btn-sm" onclick="copyAzadAccount(\'' + cust.id + '\')">Copy Account</button>';
  h += '<button class="btn btn-info btn-sm" onclick="printAzadAccount(\'' + cust.id + '\')">Print / PDF</button>';
  h += '</div></div>';
  return h;
}

// Build consolidated credit sales list from all weeks + current draft,
// excluding cowfish and azad (they have their own detailed accounts).
function buildCreditLedger() {
  var EXCLUDED = ["cowfish", "azad"];
  var sales = []; // { id, client, product, amount, date, weekLabel, source }

  // Helper: add entries from a data block
  function addEntries(dataBlock, weekLabel) {
    (dataBlock.creditEntries || []).forEach(function (e) {
      if (EXCLUDED.indexOf(e.customerId) > -1) return;
      if (!e.client && !e.amount) return;
      sales.push({
        id: e.id,
        client: (e.client || "Unknown").trim(),
        product: e.product || "",
        amount: parseFloat(e.amount) || 0,
        date: e.date || "",
        weekLabel: weekLabel
      });
    });
  }

  // Saved weeks
  for (var i = 0; i < STATE.weeks.length; i++) {
    var w = STATE.weeks[i];
    var label = wkLbl(w.weekStart) + " – " + wkLbl(w.weekEnd);
    addEntries(w.data || {}, label);
  }
  // Current draft (if not already saved as this week)
  addEntries(STATE.data, "Current draft");

  // Group by client name (case-insensitive)
  var clientMap = {};
  for (var si = 0; si < sales.length; si++) {
    var s = sales[si];
    var key = s.client.toLowerCase();
    if (!clientMap[key]) clientMap[key] = { name: s.client, sales: [], payments: [] };
    clientMap[key].sales.push(s);
  }

  // Attach ledger payments
  var ledgerPayments = (STATE.creditLedger && STATE.creditLedger.entries) || [];
  for (var pi = 0; pi < ledgerPayments.length; pi++) {
    var pay = ledgerPayments[pi];
    var pkey = (pay.client || "").toLowerCase();
    if (!clientMap[pkey]) clientMap[pkey] = { name: pay.client, sales: [], payments: [] };
    clientMap[pkey].payments.push(pay);
  }

  // Build sorted array
  var clients = [];
  for (var k in clientMap) clients.push(clientMap[k]);
  clients.sort(function (a, b) {
    var ba = clBalance(a), bb = clBalance(b);
    return bb - ba; // highest balance first
  });
  return clients;
}

function clBalance(client) {
  var sales = (client.sales || []).reduce(function (s, e) { return s + e.amount; }, 0);
  var paid = (client.payments || []).reduce(function (s, e) { return s + (parseFloat(e.amount) || 0); }, 0);
  return sales - paid;
}

function clAddPayment() {
  var f = STATE.clForm;
  if (!f || !f.client || !f.amount) return;
  var amt = parseFloat(f.amount);
  if (!amt || amt <= 0) return;
  if (!STATE.creditLedger) STATE.creditLedger = { entries: [] };
  STATE.creditLedger.entries.push({
    id: "clp_" + Date.now(),
    client: f.client.trim(),
    amount: amt,
    date: f.date || new Date().toISOString().split("T")[0],
    note: f.note || ""
  });
  saveCreditLedger();
  STATE.clForm = null;
  rerender();
}

function clDeletePayment(id) {
  if (!STATE.creditLedger) return;
  STATE.creditLedger.entries = STATE.creditLedger.entries.filter(function (e) { return e.id !== id; });
  saveCreditLedger();
  rerender();
}

function renderCreditLedgerSheet() {
  var clients = buildCreditLedger();
  var filter = STATE.clFilter || "outstanding";
  var f = STATE.clForm;

  // Totals
  var totalOwed = clients.reduce(function (s, c) {
    var b = clBalance(c); return s + (b > 0 ? b : 0);
  }, 0);
  var totalClients = clients.filter(function (c) { return clBalance(c) > 0; }).length;

  var h = '<div class="overlay" onclick="if(event.target===this)closeOverlay()">';
  h += '<div class="sheet">';

  // Header
  h += '<div class="sheet-hd">';
  h += '<div><div class="sheet-title">Credit Ledger</div>';
  h += '<div class="sheet-sub">' + totalClients + ' client' + (totalClients !== 1 ? 's' : '') + ' owe Rs ' + fmt(totalOwed) + '</div></div>';
  h += '<button class="sheet-close" onclick="closeOverlay()">x</button>';
  h += '</div>';
  h += '<div class="sheet-body">';

  // Filter tabs
  h += '<div style="display:flex;gap:6px;margin-bottom:14px">';
  h += '<button class="btn btn-sm ' + (filter === "outstanding" ? "btn-primary" : "btn-secondary") + '" onclick="clSetFilter(\'outstanding\')">Outstanding</button>';
  h += '<button class="btn btn-sm ' + (filter === "all" ? "btn-primary" : "btn-secondary") + '" onclick="clSetFilter(\'all\')">All Clients</button>';
  h += '</div>';

  // Payment form (if open)
  if (f) {
    h += '<div class="card" id="cl-pay-form" style="border:2px solid var(--gold,#c9a84c);margin-bottom:14px">';
    h += '<div class="card-title">Log Payment \u2014 ' + esc(f.client) + '</div>';
    h += '<div class="field"><label>Date</label><input type="date" value="' + esc(f.date) + '" onchange="clSetForm(\'date\',this.value)"></div>';
    h += '<div class="field"><label>Amount (Rs)</label><input type="number" inputmode="decimal" placeholder="0" value="' + esc(f.amount) + '" onchange="clSetForm(\'amount\',this.value)"></div>';
    h += '<div class="field"><label>Note (optional)</label><input type="text" placeholder="e.g. Cash, bank ref\u2026" value="' + esc(f.note) + '" onchange="clSetForm(\'note\',this.value)"></div>';
    h += '<div class="btn-row">';
    h += '<button class="btn btn-secondary btn-sm" onclick="clCancelPayForm()">Cancel</button>';
    h += '<button class="btn btn-primary btn-sm" onclick="clAddPayment()">Save Payment</button>';
    h += '</div></div>';
  }

  // Client cards
  var shown = clients.filter(function (c) {
    if (filter === "outstanding") return clBalance(c) > 0.005;
    return true;
  });

  if (shown.length === 0) {
    h += '<div class="empty">No credit sales found' + (filter === "outstanding" ? " with outstanding balance" : "") + '.</div>';
  }

  for (var ci = 0; ci < shown.length; ci++) {
    var c = shown[ci];
    var bal = clBalance(c);
    var totalSales = c.sales.reduce(function (s, e) { return s + e.amount; }, 0);
    var totalPaid = c.payments.reduce(function (s, e) { return s + (parseFloat(e.amount) || 0); }, 0);
    var balColor = bal > 0 ? "color:#b91c1c;font-weight:700" : "color:#16a34a;font-weight:700";

    h += '<div class="card" style="margin-bottom:10px">';
    // Client header row
    h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">';
    h += '<div style="font-size:15px;font-weight:700">' + esc(c.name) + '</div>';
    h += '<div style="text-align:right"><div style="font-size:11px;color:var(--mid)">Balance</div><div style="' + balColor + ';font-size:16px">Rs ' + fmt(bal) + '</div></div>';
    h += '</div>';

    // Sales summary line
    h += '<div style="font-size:12px;color:var(--mid);margin-bottom:6px">';
    h += 'Sales: Rs ' + fmt(totalSales) + ' &nbsp;|&nbsp; Paid: Rs ' + fmt(totalPaid);
    h += ' &nbsp;|&nbsp; ' + c.sales.length + ' sale' + (c.sales.length !== 1 ? 's' : '');
    h += '</div>';

    // Sales entries (collapsed by default if many)
    if (c.sales.length > 0) {
      h += '<details style="margin-bottom:8px"><summary style="font-size:12px;color:var(--mid);cursor:pointer">Sales entries (' + c.sales.length + ')</summary>';
      h += '<table style="width:100%;font-size:11px;border-collapse:collapse;margin-top:6px">';
      var sortedSales = c.sales.slice().sort(function (a, b) { return (a.date || "").localeCompare(b.date || ""); });
      for (var si2 = 0; si2 < sortedSales.length; si2++) {
        var sale = sortedSales[si2];
        h += '<tr style="border-bottom:1px solid var(--border,#e5e7eb)">';
        h += '<td style="padding:3px 0;color:var(--mid)">' + (sale.date ? shortDate(sale.date) : "–") + '</td>';
        h += '<td style="padding:3px 4px">' + esc(sale.product || "–") + '</td>';
        h += '<td style="padding:3px 0;color:var(--mid);font-size:10px">' + esc(sale.weekLabel) + '</td>';
        h += '<td style="padding:3px 0;text-align:right;font-weight:600">Rs ' + fmt(sale.amount) + '</td>';
        h += '</tr>';
      }
      h += '</table></details>';
    }

    // Payment history
    if (c.payments.length > 0) {
      h += '<div style="margin-bottom:8px">';
      for (var pi2 = 0; pi2 < c.payments.length; pi2++) {
        var pay = c.payments[pi2];
        h += '<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border,#e5e7eb)">';
        h += '<div style="color:var(--mid)">' + (pay.date ? shortDate(pay.date) : "–") + (pay.note ? " · " + esc(pay.note) : "") + '</div>';
        h += '<div style="display:flex;align-items:center;gap:8px">';
        h += '<span style="color:#16a34a;font-weight:700">– Rs ' + fmt(pay.amount) + '</span>';
        h += '<button style="background:none;border:none;color:#b91c1c;font-size:11px;cursor:pointer;padding:0" onclick="clDeletePayment(\'' + pay.id + '\')">del</button>';
        h += '</div></div>';
      }
      h += '</div>';
    }

    // Add payment button
    h += '<button class="btn btn-primary btn-sm" style="width:100%" onclick="clOpenPayForm(\'' + c.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'") + '\')">+ Log Payment</button>';
    h += '</div>';
  }

  h += '</div>'; // end sheet-body
  h += '<div class="sheet-footer">';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;font-size:13px">';
  h += '<span style="color:var(--mid)">' + totalClients + ' client' + (totalClients !== 1 ? 's' : '') + ' outstanding</span>';
  h += '<span style="font-weight:700;color:#b91c1c">Rs ' + fmt(totalOwed) + ' owed</span>';
  h += '</div>';
  h += '</div>';
  h += '</div></div>'; // end sheet + overlay
  return h;
}

function crDeleteEntry(id) {
  if (!confirm("Delete this entry?")) return;
  STATE.cashRegister.entries = STATE.cashRegister.entries.filter(function (e) { return e.id !== id; });
  saveCashRegister();
  rerender();
}

function crSetBankOpening(v) {
  var n = parseFloat(v);
  if (!isNaN(n)) { STATE.cashRegister.bankOpening = n; saveCashRegister(); }
}

// Compute running balances from all entries
function computeCRBalances() {
  var bankBalance = parseFloat((STATE.cashRegister && STATE.cashRegister.bankOpening) || 1301006.14);
  var cashBalance = 0;
  var entries = (STATE.cashRegister && STATE.cashRegister.entries) || [];
  var sorted = entries.slice().sort(function (a, b) { return (a.date || "").localeCompare(b.date || ""); });
  for (var i = 0; i < sorted.length; i++) {
    var e = sorted[i];
    var t = CR_TYPES[e.type] || { dir: "in", account: "cash" };
    var amt = parseFloat(e.amount) || 0;
    if (e.type === "cash_to_bank") { cashBalance -= amt; bankBalance += amt; }
    else if (e.type === "bank_to_cash") { cashBalance += amt; bankBalance -= amt; }
    else if (t.dir === "in") {
      if (t.account === "bank") bankBalance += amt; else cashBalance += amt;
    } else {
      if (t.account === "bank") bankBalance -= amt; else cashBalance -= amt;
    }
  }
  return { bank: bankBalance, cash: cashBalance };
}

// Build weekly expected vs actual reconciliation from current draft
function buildCRReconciliation() {
  var d = STATE.data;
  var T = computeTotals(d);
  var entries = (STATE.cashRegister && STATE.cashRegister.entries) || [];

  // Expected in from this week's P&L
  var expectedCash = T.cashTotal || 0;
  var expectedJuice = T.juiceTotal || 0;
  var expectedCheque = T.chequeTotal || 0;

  // Actual recorded this week (filter by current week dates)
  var ws = d.weekStart, we = d.weekEnd;
  function inWeek(dateStr) {
    if (!ws || !we || !dateStr) return false;
    return dateStr >= ws && dateStr <= we;
  }

  var recordedCash = 0, recordedJuice = 0, recordedCheque = 0, recordedOut = 0;
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    if (!inWeek(e.date)) continue;
    var amt = parseFloat(e.amount) || 0;
    if (e.type === "cash_sales") recordedCash += amt;
    else if (e.type === "juice_in") recordedJuice += amt;
    else if (e.type === "cheque_in") recordedCheque += amt;
    else if (CR_TYPES[e.type] && CR_TYPES[e.type].dir === "out") recordedOut += amt;
  }

  return {
    expectedCash: expectedCash, recordedCash: recordedCash, cashGap: expectedCash - recordedCash,
    expectedJuice: expectedJuice, recordedJuice: recordedJuice, juiceGap: expectedJuice - recordedJuice,
    expectedCheque: expectedCheque, recordedCheque: recordedCheque, chequeGap: expectedCheque - recordedCheque,
    totalOut: recordedOut,
    grossProfit: T.grossProfit
  };
}
